<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BRIAS — Log in</title>
<meta name="description" content="Sign in to BRIAS.">
<meta name="theme-color" content="#1a1118">
<link rel="stylesheet" href="assets/css/base.css">
<link rel="stylesheet" href="assets/css/auth.css">
</head>
<body>

<div id="authScreen" class="auth-screen">
  <canvas class="auth-glow-canvas" id="authGlow"></canvas>
  <div class="auth-grain"></div>
  <div class="auth-vignette"></div>

  <div class="auth-content">
    <div class="auth-title">BRIAS</div>
    <div class="auth-typewriter">
      <span class="auth-typewriter-text"><span class="hey">Hey, </span><span class="rest" id="twText"></span><span class="auth-typewriter-cursor"></span></span>
    </div>

    <div class="auth-card">
      <div class="auth-offline hidden" id="authOffline">
        <div class="auth-offline-dot"></div>
        <div class="auth-offline-title">OFFLINE</div>
        <div class="auth-offline-sub">BRIAS is having her moment, she should be back soon</div>
      </div>

      <!-- Step 1 -->
      <div id="authStep1" class="auth-step">
        <div id="authError" class="auth-card-error hidden"></div>
        <div class="auth-input-group">
          <input id="authContact" type="text" placeholder="Email or phone number" autocomplete="email">
          <div class="auth-input-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg></div>
        </div>
        <div class="auth-input-group">
          <input id="authPass" type="password" placeholder="Password" autocomplete="current-password">
          <div class="auth-input-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></div>
        </div>
        <button class="auth-submit-btn" id="authSubmit" onclick="doAuthStep1()">Log in</button>
        <div class="auth-switch-text"><span id="authSwitch">No account? <a onclick="toggleAuth()">Sign up</a></span></div>
      </div>

      <!-- Step 2 -->
      <div id="authStep2" class="auth-step hidden">
        <div id="authError2" class="auth-card-error hidden"></div>
        <div class="auth-step-info">We sent a code to <span id="sentTo"></span></div>
        <div class="auth-input-group">
          <input id="authCode" type="text" placeholder="Verification code" autocomplete="one-time-code" inputmode="numeric" maxlength="6">
          <div class="auth-input-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M12 2v4m0 12v4M4.93 4.93l2.83 2.83m8.48 8.48l2.83 2.83M2 12h4m12 0h4M4.93 19.07l2.83-2.83m8.48-8.48l2.83-2.83"/></svg></div>
        </div>
        <button class="auth-submit-btn" onclick="doAuthStep2()">Verify</button>
        <div class="auth-step-resend">Didn't get it? <a onclick="resendCode()">Resend</a></div>
      </div>

      <!-- Step 3 -->
      <div id="authStep3" class="auth-step hidden">
        <div id="authError3" class="auth-card-error hidden"></div>
        <div class="auth-step-title">Almost there</div>
        <div class="auth-step-sub">Tell BRIAS a little about you</div>
        <div class="auth-input-group">
          <input id="authName" type="text" placeholder="What should I call you?" autocomplete="given-name">
          <div class="auth-input-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div>
        </div>
        <div class="auth-input-group">
          <input id="authAge" type="number" placeholder="Age" min="10" max="120" inputmode="numeric">
          <div class="auth-input-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg></div>
        </div>
        <button class="auth-submit-btn" onclick="doAuthStep3()">Let's go</button>
      </div>
    </div>
  </div>

  <div class="auth-footer">DATA IS SECURE &nbsp;&middot;&nbsp; YOUR PRIVACY IS OUR FIRST PRIORITY</div>
</div>

<script src="assets/js/glow.js"></script>
<script src="assets/js/typewriter.js"></script>
<script src="assets/js/auth.js"></script>
<script defer src="/_vercel/insights/script.js"></script>
</body>
</html>
