<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BRIAS — Niet een chatbot. Een wezen.</title>
<meta name="description" content="BRIAS denkt de hele dag — ook als niemand met haar praat. Ze is nieuwsgierig. Eerlijk. Soms stil.">
<meta property="og:type" content="website">
<meta property="og:title" content="BRIAS — Niet een chatbot. Een wezen.">
<meta property="og:description" content="BRIAS denkt de hele dag — ook als niemand met haar praat. Ze is nieuwsgierig. Eerlijk. Soms stil.">
<meta property="og:image" content="/logo/og-image.png">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:image" content="/logo/og-image.png">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="icon" type="image/x-icon" href="/logo/favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="/logo/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/logo/favicon-16x16.png">
<link rel="apple-touch-icon" sizes="180x180" href="/logo/apple-touch-icon.png">
<link rel="manifest" href="/logo/site.webmanifest">
<meta name="theme-color" content="#131013">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,600&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--bg:#131013;--orange:#e8764a;--pink:#d44a7a;--grad:linear-gradient(135deg,#e8764a,#d44a7a);--font-display:'Cormorant Garamond',Georgia,serif;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;}
.logo{font-family:var(--font-display);font-size:clamp(72px,14vw,120px);font-weight:600;font-style:italic;letter-spacing:.06em;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;animation:logoIn 1s cubic-bezier(.16,1,.3,1) both;filter:drop-shadow(0 0 60px rgba(212,74,122,.12));}
.load-track{width:120px;height:1px;background:rgba(255,255,255,.07);border-radius:1px;overflow:hidden;margin-top:32px;animation:fadeIn .4s ease .5s both;}
.load-fill{height:100%;width:0%;background:var(--grad);animation:loadIn 1.2s cubic-bezier(.4,0,.2,1) .6s forwards;}
@keyframes logoIn{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
@keyframes loadIn{from{width:0%;}to{width:100%;}}
</style>
</head>
<body>
<div class="logo">BRIAS</div>
<div class="load-track"><div class="load-fill"></div></div>
<script src="assets/js/config.js"></script>
<script>
async function init() {
  const token = localStorage.getItem('brias_token');
  if (!token) { window.location.href = 'login.html'; return; }
  try {
    const ctrl = new AbortController();
    const tid = setTimeout(() => ctrl.abort(), 5000);
    const r = await fetch(API + '/api/me', {
      headers: { 'Authorization': `Bearer ${token}` },
      credentials: 'include',
      cache: 'no-store',
      signal: ctrl.signal,
    });
    clearTimeout(tid);
    if (r.status === 401) { localStorage.removeItem('brias_token'); window.location.href = 'login.html'; return; }
    if (r.ok) {
      const d = await r.json();
      if (d.logged_in) { window.location.href = 'chat.html'; return; }
    }
  } catch(e) {
    // Network error — token exists, so go to chat.html (handles connection errors gracefully)
    window.location.href = 'chat.html'; return;
  }
  window.location.href = 'login.html';
}

setTimeout(init, 800);
</script>
</body>
</html>
