// ── Mini calendar (PC sidebar + mobile sheet) ──
let pscMonth=new Date(TODAY.getFullYear(),TODAY.getMonth(),1);
let sheetMonth=new Date(TODAY.getFullYear(),TODAY.getMonth(),1);
let mobileCalSheetOpen=false;

function pscNav(dir){
  pscMonth=new Date(pscMonth.getFullYear(),pscMonth.getMonth()+dir,1);
  renderPscCal();
}
function pscGoToday(){
  pscMonth=new Date(TODAY.getFullYear(),TODAY.getMonth(),1);
  window.mobileCalCenter=new Date(TODAY);
  currentWeek=startOfWeek(TODAY);
  renderCalendar();
  renderPscCal();
}
function renderPscCal(){
  const lbl=document.getElementById('pscMonthLabel');
  const grid=document.getElementById('pscMiniGrid');
  const todayBtn=document.getElementById('pscTodayBtn');
  if(!lbl||!grid)return;
  lbl.textContent=`${MONTHS[pscMonth.getMonth()]} ${pscMonth.getFullYear()}`;
  const isCurMonth=pscMonth.getFullYear()===TODAY.getFullYear()&&pscMonth.getMonth()===TODAY.getMonth();
  if(todayBtn)todayBtn.classList.toggle('active',isCurMonth);
  const days=['M','T','W','T','F','S','S'];
  let h=days.map(d=>`<div class="psc-lbl">${d}</div>`).join('');
  const first=new Date(pscMonth.getFullYear(),pscMonth.getMonth(),1);
  const dow=(first.getDay()+6)%7;
  for(let i=0;i<dow;i++)h+=`<div class="psc-d e"></div>`;
  const dim=new Date(pscMonth.getFullYear(),pscMonth.getMonth()+1,0).getDate();
  // Selected week: currentWeek (Mon) to currentWeek+6 (Sun)
  const weekEnd=addDays(currentWeek,6);
  const weekStartStr=ds(currentWeek);
  const weekEndStr=ds(weekEnd);
  for(let d=1;d<=dim;d++){
    const dd=new Date(pscMonth.getFullYear(),pscMonth.getMonth(),d);
    const dStr=ds(dd);
    const isT=ds(dd)===ds(TODAY);
    // Week day index (0=Mon ... 6=Sun)
    const wdi=(dd.getDay()+6)%7;
    const inWeek=dStr>=weekStartStr&&dStr<=weekEndStr;
    const isWeekStart=dStr===weekStartStr;
    const isWeekEnd=dStr===weekEndStr;
    let cls='psc-d';
    if(isT)cls+=' tod';
    if(inWeek)cls+=' in-week';
    if(inWeek&&isWeekStart)cls+=' week-start';
    if(inWeek&&isWeekEnd)cls+=' week-end';
    h+=`<div class="${cls}" onclick="pscPickDay('${dStr}')">${d}</div>`;
  }
  grid.innerHTML=h;
}
function pscPickDay(dstr){
  const d=new Date(dstr);
  currentWeek=startOfWeek(d);
  renderCalendar();
  renderPscCal();
}

// ── Mobile sheet ──
function toggleMobileCalSheet(){
  mobileCalSheetOpen=!mobileCalSheetOpen;
  const sheet=document.getElementById('calSheet');
  const backdrop=document.getElementById('calBackdropM');
  const btn=document.getElementById('bnCalSheet');
  if(mobileCalSheetOpen){
    sheetMonth=new Date(TODAY.getFullYear(),TODAY.getMonth(),1);
    if(sheet)sheet.classList.add('open');
    if(backdrop)backdrop.classList.add('open');
    if(btn)btn.classList.add('active');
    renderSheetCal();
  } else {
    if(sheet)sheet.classList.remove('open');
    if(backdrop)backdrop.classList.remove('open');
    if(btn)btn.classList.remove('active');
  }
}
function sheetNav(dir){
  sheetMonth=new Date(sheetMonth.getFullYear(),sheetMonth.getMonth()+dir,1);
  renderSheetCal();
}
function renderSheetCal(){
  const lbl=document.getElementById('sheetMonthLabel');
  const grid=document.getElementById('sheetCalGrid');
  if(!lbl||!grid)return;
  lbl.textContent=`${MONTHS[sheetMonth.getMonth()]} ${sheetMonth.getFullYear()}`;
  const days=['M','T','W','T','F','S','S'];
  let h=days.map(d=>`<div class="sheet-lbl">${d}</div>`).join('');
  const first=new Date(sheetMonth.getFullYear(),sheetMonth.getMonth(),1);
  const dow=(first.getDay()+6)%7;
  for(let i=0;i<dow;i++)h+=`<div class="sheet-d e"></div>`;
  const dim=new Date(sheetMonth.getFullYear(),sheetMonth.getMonth()+1,0).getDate();
  const selStr=window.mobileCalCenter?ds(window.mobileCalCenter):ds(TODAY);
  for(let d=1;d<=dim;d++){
    const dd=new Date(sheetMonth.getFullYear(),sheetMonth.getMonth(),d);
    const isT=ds(dd)===ds(TODAY);
    const isSel=ds(dd)===selStr;
    let cls='sheet-d';
    if(isT)cls+=' tod';
    if(isSel)cls+=' sel';
    h+=`<div class="${cls}" onclick="sheetPickDay('${ds(dd)}')">${d}</div>`;
  }
  grid.innerHTML=h;
}
function sheetPickDay(dstr){
  const d=new Date(dstr);
  window.mobileCalCenter=new Date(d);
  renderCalendar();
  toggleMobileCalSheet();
}

// Swipe down to close sheet
(function(){
  let startY=0,dragging=false;
  document.addEventListener('touchstart',e=>{
    const sheet=document.getElementById('calSheet');
    if(!mobileCalSheetOpen||!sheet)return;
    if(sheet.contains(e.target)){startY=e.touches[0].clientY;dragging=true;}
  },{passive:true});
  document.addEventListener('touchmove',e=>{
    if(!dragging||!mobileCalSheetOpen)return;
    const sheet=document.getElementById('calSheet');
    const dy=e.touches[0].clientY-startY;
    if(dy>0&&sheet)sheet.style.transform=`translateY(${dy}px)`;
  },{passive:true});
  document.addEventListener('touchend',e=>{
    if(!dragging)return;dragging=false;
    const sheet=document.getElementById('calSheet');
    const dy=e.changedTouches[0].clientY-startY;
    if(sheet)sheet.style.transform='';
    if(dy>60)toggleMobileCalSheet();
  },{passive:true});
})();

// ── BRIAS Global API ──
window.briasPlannerAddEvent=function(ev){
  // ev: {title, date (ISO string), duration?, color?: 'green'|'yellow', cardId?, notes?}
  if(!ev||!ev.title||!ev.date)return;
  const newEv={
    id:uid(),
    title:ev.title,
    date:ev.date,
    duration:ev.duration||60,
    color:ev.color||'green',
    notes:ev.notes||'',
    cardId:ev.cardId||'',
    briasAdded:true
  };
  events.push(newEv);
  saveEvents(events);
  if(mainView==='calendar')renderCalendar();
  renderContent();
};

window.briasPlannerSuggestCard=function(card){
  // card: {title, type: 'dream'|'problem', plan?}
  if(!card||!card.title)return;
  const newCard={
    id:uid(),
    title:card.title,
    type:card.type||'dream',
    plan:card.plan||'',
    status:'active',
    created:new Date().toISOString(),
    history:[{type:'Suggested by BRIAS',date:new Date().toISOString(),text:'This card was suggested by BRIAS.'}],
    briasAdded:true
  };
  cards.unshift(newCard);
  saveCards(cards);
  renderSidebar();
  renderContent();
};
