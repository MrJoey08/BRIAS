<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BRIAS · Planner</title>
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="icon" type="image/x-icon" href="/logo/favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="/logo/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/logo/favicon-16x16.png">
<link rel="apple-touch-icon" sizes="180x180" href="/logo/apple-touch-icon.png">
<link rel="manifest" href="/logo/site.webmanifest">
<meta name="theme-color" content="#131013">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500;1,600&family=DM+Sans:wght@300;400;500&family=Bitter:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/shell.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
button{outline:none!important;border:none;background:transparent;cursor:pointer;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#131013;
  --sidebar:#151215;
  --border:rgba(255,255,255,.07);
  --border2:rgba(255,255,255,.13);
  --surface:rgba(255,255,255,.05);
  --text:#e4e0e3;
  --text-sub:rgba(228,224,227,.44);
  --text-muted:rgba(228,224,227,.26);
  --text-dim:rgba(228,224,227,.14);
  --input-bg:rgba(255,255,255,.04);
  --input-border:rgba(255,255,255,.08);
  --input-focus:rgba(232,118,74,.28);
  --orange:#e8764a;
  --pink:#d44a7a;
  --grad:linear-gradient(135deg,#e8764a,#d44a7a);
  --font:'DM Sans',-apple-system,sans-serif;
  --font-display:'Cormorant Garamond',Georgia,serif;
  --font-serif:'Bitter',Georgia,serif;

  /* Calendar event colors */
  --cal-blue:rgba(74,140,232,.85);
  --cal-blue-bg:rgba(74,140,232,.1);
  --cal-blue-border:rgba(74,140,232,.3);
  --cal-green:rgba(74,192,128,.85);
  --cal-green-bg:rgba(74,192,128,.1);
  --cal-green-border:rgba(74,192,128,.3);
  --cal-yellow:rgba(232,190,74,.85);
  --cal-yellow-bg:rgba(232,190,74,.1);
  --cal-yellow-border:rgba(232,190,74,.3);
  --cal-red:rgba(232,74,74,.85);
  --cal-red-bg:rgba(232,74,74,.1);
  --cal-red-border:rgba(232,74,74,.3);
}
body.light{
  --bg:#f0e6dc;
  --sidebar:#ede0d5;
  --border:rgba(80,40,20,.1);
  --border2:rgba(80,40,20,.18);
  --surface:rgba(80,40,20,.06);
  --text:#2e1f18;
  --text-sub:rgba(46,31,24,.6);
  --text-muted:rgba(46,31,24,.4);
  --text-dim:rgba(46,31,24,.22);
  --input-bg:rgba(80,40,20,.05);
  --input-border:rgba(80,40,20,.1);
  --input-focus:rgba(232,118,74,.35);
}

html,body{height:100%;overflow:hidden;}
body{font-family:var(--font);background:var(--bg);color:var(--text);transition:background .5s ease,color .4s ease;}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:4px;}
body.light ::-webkit-scrollbar-thumb{background:rgba(80,40,20,.12);}

canvas{position:fixed;inset:0;width:100%;height:100%;z-index:0;pointer-events:none;opacity:.38;transition:opacity .5s ease;}
body.light canvas{opacity:0;}
.noise{position:fixed;inset:0;pointer-events:none;z-index:1;opacity:.028;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-size:200px;}

@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
@keyframes contentSwap{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
@keyframes modalIn{from{opacity:0;transform:translateY(16px) scale(.97);}to{opacity:1;transform:translateY(0) scale(1);}}


/* ── App shell ── */
.app{position:relative;z-index:10;display:flex;flex-direction:column;height:100vh;animation:fadeIn .4s ease both;}

/* ── Topbar ── */
.topbar{height:56px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;position:relative;transition:border-color .45s ease;}
.topbar-logo{font-family:var(--font-display);font-size:22px;font-weight:600;font-style:italic;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:.03em;}

.menu-btn{position:absolute;left:8px;width:40px;height:40px;display:flex;align-items:center;justify-content:center;}
.lns{display:flex;flex-direction:column;gap:5px;align-items:center;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);}
.ln{display:block;width:26px;height:5px;border-radius:100px;background:var(--grad);flex-shrink:0;transition:transform .52s cubic-bezier(.22,1.35,.5,1),opacity .38s ease;}
.menu-btn.open .ln:nth-child(1){transform:translateY(5px) rotate(45deg);}
.menu-btn.open .ln:nth-child(2){transform:translateY(-5px) rotate(-45deg);}

/* Nav switcher in topbar — hidden, already in drawer */
.topbar-nav{display:none;}
.topbar-right{display:none;}
.topbar-icon-btn{display:none;}

/* Sidebar view toggle icons */
.sidebar-view-toggle{
  display:flex;gap:4px;padding:10px 10px 0;flex-shrink:0;
}
.svt{
  flex:1;padding:8px 4px;border-radius:10px;border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;gap:5px;
  font-family:var(--font);font-size:11px;font-weight:300;color:var(--text-muted);
  transition:background .12s,color .12s,border-color .15s;
}
.svt svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
.svt:hover{background:var(--surface);color:var(--text-sub);}
.svt.active{background:rgba(232,118,74,.08);border-color:rgba(232,118,74,.25);color:var(--orange);}
body.light .svt.active{background:rgba(232,118,74,.08);}

/* ── Main layout ── */
.main-body{flex:1;display:flex;overflow:hidden;}

/* ── Left sidebar ── */
.planner-sidebar{
  width:260px;flex-shrink:0;border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;
  background:rgba(14,11,13,.5);
  transition:background .45s ease,border-color .45s ease;
}
body.light .planner-sidebar{background:var(--sidebar);}

.sidebar-header{
  padding:16px 16px 12px;border-bottom:1px solid var(--border);flex-shrink:0;
  display:flex;align-items:center;justify-content:space-between;
}
.sidebar-header-label{font-size:10px;letter-spacing:.09em;text-transform:uppercase;color:var(--text-dim);font-weight:500;}
.new-card-btn{
  display:flex;align-items:center;gap:5px;
  padding:5px 10px;border-radius:8px;border:1px solid rgba(232,118,74,.25);
  background:rgba(232,118,74,.06);color:var(--orange);
  font-family:var(--font);font-size:11px;font-weight:400;
  transition:background .15s,border-color .15s;
}
.new-card-btn:hover{background:rgba(232,118,74,.12);border-color:rgba(232,118,74,.4);}
.new-card-btn svg{width:11px;height:11px;stroke:currentColor;fill:none;stroke-width:2.2;stroke-linecap:round;}

/* Card filter tabs */
.card-filter-tabs{display:flex;padding:10px 10px 0;gap:2px;flex-shrink:0;}
.cft{
  flex:1;padding:6px 4px;border-radius:8px;
  font-family:var(--font);font-size:11px;font-weight:300;color:var(--text-muted);
  transition:background .12s,color .12s;text-align:center;
}
.cft:hover{background:var(--surface);color:var(--text-sub);}
.cft.active{background:rgba(255,255,255,.06);color:var(--text);}
body.light .cft.active{background:rgba(80,40,20,.08);color:var(--text);}

/* Content scroll */
.content-scroll{flex:1;overflow-y:auto;display:flex;flex-direction:column;}

/* Card list */
.card-list{flex:1;overflow-y:auto;padding:8px 8px 20px;}
.card-item{
  border:1px solid var(--border);border-radius:13px;margin-bottom:5px;
  padding:11px 13px;cursor:pointer;transition:background .12s,border-color .15s;
  animation:fadeUp .2s ease;
}
.card-item:hover{background:var(--surface);}
.card-item.active{background:rgba(232,118,74,.07);border-color:rgba(232,118,74,.22);}
body.light .card-item.active{background:rgba(232,118,74,.07);}
.card-item-top{display:flex;align-items:center;gap:7px;margin-bottom:5px;}
.type-badge{
  font-size:9px;letter-spacing:.07em;text-transform:uppercase;font-weight:500;
  padding:2px 7px;border-radius:20px;flex-shrink:0;
}
.type-badge.dream{background:rgba(74,140,232,.12);color:rgba(74,140,232,.9);}
.type-badge.problem{background:rgba(212,74,122,.12);color:rgba(212,74,122,.9);}
.card-item-title{font-size:13px;font-weight:400;color:var(--text-sub);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.card-item-active .card-item-title{color:var(--text);}
.card-item-meta{font-size:11px;color:var(--text-dim);display:flex;align-items:center;gap:5px;}
.status-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;}
.status-dot.active{background:rgba(74,192,128,.7);}
.status-dot.paused{background:rgba(232,190,74,.6);}
.status-dot.achieved{background:rgba(232,118,74,.6);}
.brias-tag{
  font-size:9px;padding:1px 5px;border-radius:6px;
  background:rgba(232,118,74,.1);color:var(--orange);letter-spacing:.04em;
}

/* ── Main content ── */
.content-area{flex:1;display:flex;flex-direction:column;overflow:hidden;}

/* Mobile view tabs — removed, handled by bottom nav */
.mobile-view-tabs{display:none!important;}

/* ── Bottom nav (mobile) — diary style ── */
.bottom-nav{
  display:none;position:fixed;bottom:16px;left:16px;right:16px;z-index:30;
  height:62px;background:rgba(18,13,17,.9);backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);
  border:1px solid rgba(255,255,255,.08);border-radius:22px;
  align-items:center;padding:0 8px;
  box-shadow:0 8px 32px rgba(0,0,0,.45),inset 0 1px 0 rgba(255,255,255,.06);
}
body.light .bottom-nav{background:rgba(237,224,213,.96);border-color:rgba(80,40,20,.1);box-shadow:0 4px 24px rgba(80,40,20,.08),inset 0 1px 0 rgba(255,255,255,.7);}
.bn-spacer{flex:1;}
.bn-who{display:flex;border-radius:13px;border:1px solid var(--border);background:rgba(255,255,255,.03);overflow:hidden;flex-shrink:0;}
body.light .bn-who{border-color:rgba(80,40,20,.1);background:rgba(80,40,20,.04);}
.bn-who-btn{padding:7px 14px;border:none;background:transparent;cursor:pointer;font-family:var(--font);font-size:12px;font-weight:300;color:var(--text-muted);transition:background .15s,color .15s;white-space:nowrap;}
.bn-who-btn.active{background:rgba(255,255,255,.07);color:var(--text);}
body.light .bn-who-btn.active{background:rgba(80,40,20,.08);color:var(--text);}
.bn-btn{
  display:flex;align-items:center;gap:7px;
  padding:7px 13px;border-radius:13px;border:1px solid var(--border);
  background:transparent;cursor:pointer;font-family:var(--font);
  font-size:12px;font-weight:300;color:var(--text-muted);
  transition:border-color .25s,color .25s,background .15s;flex-shrink:0;
}
body.light .bn-btn{border-color:rgba(80,40,20,.12);}
.bn-btn:hover{border-color:rgba(255,255,255,.14);color:var(--text-sub);}
.bn-btn svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;flex-shrink:0;}
.bn-btn.active{border-color:rgba(232,118,74,.35);color:var(--orange);}
.bn-today{
  padding:7px 14px;border-radius:13px;border:1px solid var(--border);
  background:transparent;cursor:pointer;font-family:var(--font);
  font-size:12px;font-weight:300;color:var(--text-muted);
  transition:border-color .25s,color .25s,box-shadow .25s;flex-shrink:0;margin-left:4px;
}
body.light .bn-today{border-color:rgba(80,40,20,.12);}
.bn-today:hover{border-color:rgba(232,118,74,.3);color:var(--orange);}
.bn-today.is-today{border-color:rgba(232,118,74,.35);color:var(--orange);}
.bn-new-btn{
  display:flex;align-items:center;gap:6px;
  padding:8px 18px;border-radius:13px;border:none;
  background:var(--grad);color:#fff;
  font-family:var(--font);font-size:13px;font-weight:500;
  transition:opacity .15s,transform .12s;flex-shrink:0;cursor:pointer;
}
.bn-new-btn:hover{opacity:.88;transform:translateY(-1px);}
.bn-new-btn:active{transform:scale(.97);}
.bn-cal-btn{
  width:38px;height:38px;border-radius:12px;border:1px solid rgba(232,118,74,.3);
  background:rgba(232,118,74,.08);cursor:pointer;display:flex;align-items:center;justify-content:center;
  color:var(--orange);transition:border-color .25s,color .25s,background .15s;flex-shrink:0;
}
body.light .bn-cal-btn{border-color:rgba(232,118,74,.25);background:rgba(232,118,74,.07);}
.bn-cal-btn:hover{background:rgba(232,118,74,.14);border-color:rgba(232,118,74,.45);}
.bn-cal-btn svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;}
.bn-cal-btn.active{border-color:rgba(232,118,74,.5);background:rgba(232,118,74,.15);}

.content-scroll{flex:1;overflow-y:auto;display:flex;flex-direction:column;}

/* ── Card Detail View ── */
.card-detail{flex:1;padding:40px 48px 80px;max-width:780px;width:100%;margin:0 auto;animation:contentSwap .25s ease;}

.card-detail-header{margin-bottom:28px;}
.card-detail-back{
  display:inline-flex;align-items:center;gap:6px;
  font-size:12px;color:var(--text-dim);margin-bottom:18px;
  transition:color .15s;
}
.card-detail-back:hover{color:var(--text-muted);}
.card-detail-back svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;}
.card-title-row{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:10px;}
.card-detail-title{font-family:var(--font-display);font-size:clamp(28px,5vw,40px);font-weight:300;font-style:italic;color:var(--text-sub);letter-spacing:-.01em;line-height:1.1;}
.card-title-badges{display:flex;align-items:center;gap:5px;flex-shrink:0;margin-top:6px;}
.status-badge{
  font-size:10px;padding:4px 10px;border-radius:20px;font-weight:400;
  letter-spacing:.04em;
}
.status-badge.active{background:rgba(74,192,128,.1);color:rgba(74,192,128,.9);border:1px solid rgba(74,192,128,.2);}
.status-badge.paused{background:rgba(232,190,74,.1);color:rgba(232,190,74,.9);border:1px solid rgba(232,190,74,.2);}
.status-badge.achieved{background:rgba(232,118,74,.1);color:var(--orange);border:1px solid rgba(232,118,74,.2);}
.card-detail-meta{font-size:11.5px;color:var(--text-dim);display:flex;align-items:center;gap:12px;}

/* Card sections */
.card-section{
  background:var(--surface);border:1px solid var(--border);border-radius:16px;
  margin-bottom:14px;overflow:hidden;transition:border-color .2s;
}
.card-section:focus-within{border-color:rgba(232,118,74,.18);}
.card-section-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 18px 0;
}
.card-section-label{
  font-size:10px;letter-spacing:.09em;text-transform:uppercase;
  color:var(--text-dim);font-weight:500;
}
.card-section-action{
  font-size:11px;color:var(--text-dim);padding:3px 8px;border-radius:7px;
  border:1px solid var(--border);transition:color .15s,border-color .15s;
}
.card-section-action:hover{color:var(--orange);border-color:rgba(232,118,74,.25);}

/* Plan text */
.plan-area{
  width:100%;min-height:120px;background:transparent;border:none;outline:none;
  color:var(--text-sub);font-family:var(--font-serif);font-size:14px;font-weight:300;
  line-height:1.85;padding:12px 18px 18px;resize:none;caret-color:var(--orange);
}
.plan-area::placeholder{color:var(--text-dim);font-style:italic;}
.plan-ro{
  padding:12px 18px 18px;font-family:var(--font-serif);font-size:14px;
  font-weight:300;line-height:1.85;color:var(--text-sub);
  white-space:pre-wrap;word-break:break-word;min-height:80px;
}
.plan-ro.empty{color:var(--text-dim);font-style:italic;}

/* Linked events in card */
.linked-events{padding:10px 14px 14px;}
.linked-event-item{
  display:flex;align-items:center;gap:10px;padding:8px 10px;
  border-radius:10px;margin-bottom:4px;cursor:pointer;
  transition:background .12s;
}
.linked-event-item:hover{background:rgba(255,255,255,.04);}
.ev-color-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.ev-color-dot.blue{background:var(--cal-blue);}
.ev-color-dot.green{background:var(--cal-green);}
.ev-color-dot.yellow{background:var(--cal-yellow);}
.ev-color-dot.red{background:var(--cal-red);}
.ev-label{font-size:12.5px;color:var(--text-sub);flex:1;}
.ev-date{font-size:11px;color:var(--text-dim);}
.no-events-hint{padding:10px 14px 14px;font-size:12.5px;color:var(--text-dim);font-style:italic;}

/* History log */
.history-list{padding:10px 14px 14px;}
.history-item{padding:10px 12px;border-radius:10px;margin-bottom:5px;background:rgba(255,255,255,.03);}
body.light .history-item{background:rgba(80,40,20,.04);}
.history-item-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px;}
.history-item-type{font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--text-dim);font-weight:500;}
.history-item-date{font-size:10.5px;color:var(--text-dim);}
.history-item-text{font-family:var(--font-serif);font-size:13px;font-weight:300;color:var(--text-sub);line-height:1.7;}
.history-item-text.brias{font-style:italic;color:rgba(232,118,74,.7);}

/* Card action buttons */
.card-actions{display:flex;gap:5px;margin-top:6px;flex-wrap:wrap;}
.card-action-btn{
  display:flex;align-items:center;gap:7px;
  padding:8px 16px;border-radius:11px;border:1px solid var(--border);
  font-family:var(--font);font-size:12px;font-weight:300;color:var(--text-muted);
  transition:all .15s;
}
.card-action-btn:hover{border-color:var(--border2);color:var(--text-sub);}
.card-action-btn.evaluate{border-color:rgba(232,118,74,.25);color:var(--orange);}
.card-action-btn.evaluate:hover{background:rgba(232,118,74,.07);border-color:rgba(232,118,74,.4);}
.card-action-btn.achieve{border-color:rgba(74,192,128,.2);color:rgba(74,192,128,.8);}
.card-action-btn.achieve:hover{background:rgba(74,192,128,.07);border-color:rgba(74,192,128,.35);}
.card-action-btn.pause{border-color:rgba(232,190,74,.2);color:rgba(232,190,74,.8);}
.card-action-btn.pause:hover{background:rgba(232,190,74,.07);border-color:rgba(232,190,74,.35);}
.card-action-btn svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}

/* Empty state */
.empty-state{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:14px;padding:40px;text-align:center;
}
.empty-state-icon{width:56px;height:56px;border-radius:18px;background:var(--surface);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;margin-bottom:4px;}
.empty-state-icon svg{width:22px;height:22px;stroke:var(--text-dim);fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;}
.empty-state-title{font-family:var(--font-display);font-size:22px;font-style:italic;font-weight:300;color:var(--text-muted);}
.empty-state-sub{font-size:13px;font-weight:300;color:var(--text-dim);max-width:280px;line-height:1.65;}

/* ── Calendar View ── */
.calendar-view{flex:1;display:flex;flex-direction:column;overflow:hidden;animation:contentSwap .25s ease;}
.cal-header{
  padding:20px 28px 16px;border-bottom:1px solid var(--border);flex-shrink:0;
  display:flex;align-items:center;justify-content:space-between;gap:16px;
}
.cal-week-nav{display:flex;align-items:center;gap:10px;}
.cal-week-label{
  display:flex;flex-direction:column;align-items:center;gap:1px;
  min-width:200px;
}
.cal-week-label-month{
  font-family:var(--font-display);font-size:22px;font-style:italic;font-weight:500;
  background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  letter-spacing:-.01em;line-height:1.1;
}
.cal-week-label-range{
  font-family:var(--font);font-size:11px;font-weight:300;color:var(--text-dim);
  letter-spacing:.04em;
}
.cal-nav-btn{
  width:32px;height:32px;border-radius:10px;border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;color:var(--text-muted);
  transition:background .15s,color .15s,border-color .15s,transform .1s;
}
.cal-nav-btn:hover{background:var(--surface);color:var(--text-sub);}
.cal-nav-btn:active{transform:scale(.92);}
.cal-nav-btn svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2.2;stroke-linecap:round;}
.cal-today-btn{
  padding:7px 16px;border-radius:10px;border:1px solid var(--border);
  font-family:var(--font);font-size:12px;font-weight:300;color:var(--text-muted);
  transition:all .15s;
}
.cal-today-btn:hover{border-color:rgba(232,118,74,.3);color:var(--orange);}
.cal-today-btn.is-cur-week{border-color:rgba(232,118,74,.4);color:var(--orange);background:rgba(232,118,74,.06);}

/* Cal legend */
.cal-legend{display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text-dim);}
.legend-dot{width:7px;height:7px;border-radius:50%;}
.legend-dot.blue{background:var(--cal-blue);}
.legend-dot.green{background:var(--cal-green);}
.legend-dot.yellow{background:var(--cal-yellow);}
.legend-dot.red{background:var(--cal-red);}

/* Calendar grid */
.cal-grid-wrap{flex:1;overflow:auto;padding:0 0 20px;background:rgba(255,255,255,.012);position:relative;}
body.light .cal-grid-wrap{background:rgba(80,40,20,.018);}
.cal-grid{display:grid;grid-template-columns:52px repeat(7,1fr);min-width:600px;position:relative;}
.cal-day-header{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:14px 4px 14px;position:sticky;top:0;z-index:10;
  background:#161216;border-bottom:1px solid rgba(255,255,255,.09);
  gap:6px;
}
.cal-day-header.today{
  background:linear-gradient(180deg,rgba(232,118,74,.16) 0%,rgba(212,74,122,.10) 100%),#161216;
  border-bottom-color:rgba(232,118,74,.2);
}
body.light .cal-day-header{background:#f0e6dc;border-bottom-color:rgba(80,40,20,.12);}
body.light .cal-day-header.today{background:linear-gradient(180deg,rgba(232,118,74,.13) 0%,rgba(212,74,122,.08) 100%),#ede0d5;border-bottom-color:rgba(232,118,74,.18);}
.cal-time-col{border-bottom:1px solid rgba(255,255,255,.09);position:sticky;top:0;z-index:10;background:#161216;}
body.light .cal-time-col{background:#f0e6dc;border-bottom-color:rgba(80,40,20,.12);}
.cal-day-name{
  font-size:9px;letter-spacing:.1em;text-transform:uppercase;
  color:var(--text-dim);font-weight:500;
}
.cal-day-header.today .cal-day-name{color:rgba(232,118,74,.75);}
.cal-day-num{
  font-family:var(--font-display);font-size:20px;font-weight:400;font-style:italic;
  color:var(--text-muted);line-height:1;
}
.cal-day-header.today .cal-day-num{
  background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  font-weight:600;
}

/* All-day row */
.cal-allday-row{display:contents;}
.cal-allday-cell{
  border-bottom:1px solid rgba(255,255,255,.08);border-right:1px solid rgba(255,255,255,.08);
  padding:6px 4px;min-height:32px;
}
.cal-allday-label{padding:6px 8px 6px 4px;font-size:10px;color:var(--text-dim);border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;}

/* Time slots */
.cal-time-slot{font-size:10px;color:var(--text-dim);text-align:right;padding:0 8px 0 0;height:56px;display:flex;align-items:flex-start;justify-content:flex-end;padding-top:5px;border-right:1px solid rgba(255,255,255,.08);}
body.light .cal-time-slot{border-right-color:rgba(80,40,20,.1);}
.cal-cell{
  border-right:1px solid rgba(255,255,255,.06);border-bottom:1px solid rgba(255,255,255,.06);
  height:56px;position:relative;cursor:pointer;transition:background .1s;
}
body.light .cal-cell{border-right-color:rgba(80,40,20,.08);border-bottom-color:rgba(80,40,20,.08);}
.cal-cell:hover{background:rgba(255,255,255,.04);}
body.light .cal-cell:hover{background:rgba(80,40,20,.04);}
.cal-cell.today-col{background:rgba(232,118,74,.04);}
body.light .cal-cell.today-col{background:rgba(232,118,74,.06);}

/* Events overlay — positioned absolutely over the grid */
.cal-events-overlay{
  position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none;
}
.cal-col-overlay{
  position:absolute;top:0;bottom:0;pointer-events:none;
}
.cal-event{
  position:absolute;left:4px;right:4px;
  border-radius:8px;padding:4px 8px;
  font-size:11px;font-weight:400;line-height:1.4;
  cursor:pointer;z-index:2;
  overflow:hidden;pointer-events:all;
  transition:opacity .12s,filter .12s;
  display:flex;flex-direction:column;justify-content:flex-start;gap:1px;
  border-left:3px solid;
}
.cal-event:hover{opacity:.85;filter:brightness(1.1);}
.cal-event-title{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:400;}
.cal-event-time{font-size:10px;opacity:.7;white-space:nowrap;}
.cal-event.blue{background:var(--cal-blue-bg);border-left-color:var(--cal-blue);color:rgba(74,140,232,.95);}
.cal-event.green{background:var(--cal-green-bg);border-left-color:var(--cal-green);color:rgba(74,192,128,.95);}
.cal-event.yellow{background:var(--cal-yellow-bg);border-left-color:var(--cal-yellow);color:rgba(232,190,74,.95);}
.cal-event.red{background:var(--cal-red-bg);border-left-color:var(--cal-red);color:rgba(232,74,74,.95);}
.brias-ev-icon{width:10px;height:10px;flex-shrink:0;opacity:.7;}

/* Add event btn on cell hover */
.cal-cell-add{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:20px;height:20px;border-radius:6px;background:var(--surface);
  display:none;align-items:center;justify-content:center;
  color:var(--text-dim);font-size:15px;font-weight:300;line-height:1;
}
.cal-cell:hover .cal-cell-add{display:flex;}

/* ── Modal ── */
.modal-backdrop{
  position:fixed;inset:0;z-index:60;background:rgba(8,6,8,.75);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  display:none;align-items:center;justify-content:center;padding:20px;
}
.modal-backdrop.open{display:flex;}
body.light .modal-backdrop{background:rgba(30,12,0,.4);}
.modal{
  background:var(--sidebar);border:1px solid var(--border2);border-radius:20px;
  width:100%;max-width:460px;display:flex;flex-direction:column;
  animation:modalIn .3s cubic-bezier(.16,1,.3,1);
  max-height:90vh;overflow:hidden;
}
.modal-header{padding:20px 22px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.modal-title{font-family:var(--font-display);font-size:20px;font-style:italic;font-weight:400;color:var(--text-sub);}
.modal-close{width:28px;height:28px;border-radius:9px;background:rgba(255,255,255,.05);display:flex;align-items:center;justify-content:center;color:var(--text-muted);transition:background .15s,color .15s;}
.modal-close:hover{background:rgba(255,255,255,.1);color:var(--text-sub);}
.modal-close svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2.2;stroke-linecap:round;}
body.light .modal-close{background:rgba(80,40,20,.06);}
body.light .modal-close:hover{background:rgba(80,40,20,.12);}
.modal-body{padding:20px 22px;overflow-y:auto;}
.modal-footer{padding:14px 22px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:5px;}

/* Form elements */
.form-group{margin-bottom:16px;}
.form-label{font-size:11px;letter-spacing:.07em;text-transform:uppercase;color:var(--text-dim);font-weight:500;margin-bottom:7px;display:block;}
.form-input{
  width:100%;background:var(--input-bg);border:1px solid var(--input-border);
  border-radius:11px;padding:10px 14px;
  color:var(--text);font-family:var(--font);font-size:13.5px;font-weight:300;
  outline:none;transition:border-color .2s;
}
.form-input:focus{border-color:var(--input-focus);}
.form-input::placeholder{color:var(--text-dim);}
textarea.form-input{resize:none;line-height:1.7;font-family:var(--font-serif);}
.form-select{
  width:100%;background:var(--input-bg);border:1px solid var(--input-border);
  border-radius:11px;padding:10px 14px;
  color:var(--text-sub);font-family:var(--font);font-size:13.5px;font-weight:300;
  outline:none;transition:border-color .2s;cursor:pointer;
  -webkit-appearance:none;appearance:none;
}
.form-select:focus{border-color:var(--input-focus);}

/* Custom date/time picker */
.dt-row{display:flex;gap:5px;}
.dt-btn{
  flex:1;display:flex;align-items:center;gap:5px;
  background:var(--input-bg);border:1px solid var(--input-border);
  border-radius:11px;padding:10px 14px;
  color:var(--text-sub);font-family:var(--font);font-size:13px;font-weight:300;
  cursor:pointer;transition:border-color .2s;text-align:left;
}
.dt-btn:hover{border-color:rgba(255,255,255,.14);}
.dt-btn.active{border-color:var(--input-focus);}
.dt-btn svg{flex-shrink:0;stroke:var(--text-dim);}
.dt-picker{
  margin-top:8px;background:var(--input-bg);border:1px solid var(--border2);
  border-radius:13px;padding:14px;animation:fadeUp .15s ease;
}
.dt-picker-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.dt-picker-label{font-family:var(--font-display);font-size:15px;font-style:italic;font-weight:500;color:var(--text-sub);}
.dt-picker-arr{
  width:28px;height:28px;border-radius:8px;background:transparent;border:none;
  display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text-muted);
  transition:background .12s,color .12s;
}
.dt-picker-arr:hover{background:var(--surface);color:var(--text-sub);}
.dt-picker-arr svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2.2;stroke-linecap:round;}
.dt-picker-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.dp-lbl{font-size:9px;color:var(--text-dim);text-align:center;padding-bottom:6px;letter-spacing:.06em;text-transform:uppercase;}
.dp-d{
  aspect-ratio:1;display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:300;color:var(--text-muted);border-radius:7px;
  cursor:pointer;transition:background .1s,color .1s;
}
.dp-d:hover:not(.e){background:var(--surface);color:var(--text-sub);}
.dp-d.e{cursor:default;color:rgba(228,224,227,.08);}
.dp-d.tod{color:var(--orange);font-weight:500;}
.dp-d.sel{background:var(--grad)!important;color:#fff!important;font-weight:500;}
/* Time picker */
.time-picker-inner{display:flex;align-items:center;justify-content:center;gap:4px;margin-bottom:14px;}
.time-col{display:flex;flex-direction:column;align-items:center;gap:4px;}
.time-arr{
  width:32px;height:28px;border-radius:8px;background:transparent;border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text-muted);
  transition:background .12s,color .12s;
}
.time-arr:hover{background:var(--surface);color:var(--text-sub);}
.time-arr svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2.2;stroke-linecap:round;}
.time-val{
  font-family:var(--font-display);font-size:28px;font-weight:400;font-style:italic;
  color:var(--text-sub);min-width:44px;text-align:center;line-height:1;
}
.time-sep{font-family:var(--font-display);font-size:28px;font-weight:300;color:var(--text-dim);line-height:1;margin-bottom:2px;}
.time-presets{display:flex;flex-wrap:wrap;gap:5px;}
.time-preset{
  padding:5px 9px;border-radius:8px;border:1px solid var(--border);
  background:transparent;cursor:pointer;font-family:var(--font);font-size:11px;
  font-weight:300;color:var(--text-muted);transition:background .12s,border-color .15s,color .12s;
}
.time-preset:hover{background:var(--surface);color:var(--text-sub);border-color:var(--border2);}
.time-preset.active{background:rgba(232,118,74,.08);border-color:rgba(232,118,74,.3);color:var(--orange);}
/* Duration picker */
.dur-row{display:flex;align-items:center;gap:12px;margin-bottom:10px;}
.dur-adj{
  width:34px;height:34px;border-radius:10px;border:1px solid var(--border);
  background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;
  color:var(--text-muted);font-size:20px;font-weight:200;line-height:1;
  transition:background .12s,border-color .15s,color .12s;flex-shrink:0;
  font-family:var(--font);
}
.dur-adj:hover{background:var(--surface);color:var(--orange);border-color:rgba(232,118,74,.3);}
.dur-val{
  flex:1;text-align:center;
  font-family:var(--font-display);font-size:22px;
  font-style:italic;font-weight:400;
  background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.dur-presets{display:flex;gap:5px;}
.dur-preset{
  flex:1;padding:6px 4px;border-radius:9px;border:1px solid var(--border);
  background:transparent;cursor:pointer;font-family:var(--font);font-size:11px;
  font-weight:300;color:var(--text-muted);text-align:center;
  transition:background .12s,border-color .15s,color .12s;
}
.dur-preset:hover{background:var(--surface);color:var(--text-sub);}
.dur-preset.active{background:rgba(232,118,74,.08);border-color:rgba(232,118,74,.3);color:var(--orange);}

/* Custom card link picker in modal */
.card-link-picker{position:relative;}
.card-link-trigger{
  width:100%;background:var(--input-bg);border:1px solid var(--input-border);
  border-radius:11px;padding:10px 14px;
  color:var(--text-muted);font-family:var(--font);font-size:13px;font-weight:300;
  display:flex;align-items:center;justify-content:space-between;gap:5px;
  cursor:pointer;transition:border-color .2s;text-align:left;
}
.card-link-trigger:hover{border-color:rgba(255,255,255,.14);}
.card-link-trigger.has-value{color:var(--text-sub);}
.card-link-trigger.open{border-color:var(--input-focus);}
.card-link-trigger svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;flex-shrink:0;transition:transform .2s;}
.card-link-trigger.open svg{transform:rotate(180deg);}
.card-link-dropdown{
  position:absolute;top:calc(100% + 4px);left:0;right:0;z-index:10;
  background:var(--sidebar);border:1px solid var(--border2);border-radius:12px;
  padding:6px;box-shadow:0 8px 32px rgba(0,0,0,.35);
  display:none;animation:fadeUp .15s ease;max-height:200px;overflow-y:auto;
}
.card-link-dropdown.open{display:block;}
.card-link-option{
  display:flex;align-items:center;gap:9px;
  padding:9px 11px;border-radius:8px;cursor:pointer;
  transition:background .1s;width:100%;text-align:left;
}
.card-link-option:hover{background:var(--surface);}
.card-link-option.selected{background:rgba(232,118,74,.07);}
.card-link-option-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;background:var(--cal-blue);}
.card-link-option.none .card-link-option-dot{background:var(--text-dim);}
.card-link-option-name{font-size:12.5px;font-weight:300;color:var(--text-sub);flex:1;}
.card-link-option.selected .card-link-option-name{color:var(--orange);}
body.light .card-link-dropdown{background:var(--sidebar);}
.type-selector{display:flex;gap:5px;}
.type-opt{
  flex:1;padding:9px;border-radius:11px;border:1px solid var(--border);
  font-family:var(--font);font-size:12.5px;font-weight:300;color:var(--text-muted);
  transition:background .3s ease,border-color .3s ease,color .3s ease,transform .18s ease,box-shadow .3s ease;
  text-align:center;
}
.type-opt:hover{border-color:var(--border2);color:var(--text-sub);transform:translateY(-1px);}
.type-opt.dream.selected{background:rgba(74,140,232,.1);border-color:rgba(74,140,232,.35);color:rgba(74,140,232,.9);box-shadow:0 0 0 3px rgba(74,140,232,.07);}
.type-opt.problem.selected{background:rgba(212,74,122,.1);border-color:rgba(212,74,122,.35);color:rgba(212,74,122,.9);box-shadow:0 0 0 3px rgba(212,74,122,.07);}
@keyframes phSlideIn{from{opacity:0;transform:translateY(3px);}to{opacity:1;transform:translateY(0);}}

/* Btn */
.btn-cancel{
  padding:8px 18px;border-radius:11px;border:1px solid var(--border);
  font-family:var(--font);font-size:12.5px;font-weight:300;color:var(--text-muted);
  transition:background .15s,color .15s;
}
.btn-cancel:hover{background:var(--surface);color:var(--text-sub);}
.btn-primary{
  padding:8px 20px;border-radius:11px;border:none;background:var(--grad);
  font-family:var(--font);font-size:12.5px;font-weight:500;color:#fff;
  transition:opacity .15s,transform .12s;
}
.btn-primary:hover{opacity:.85;transform:translateY(-1px);}
.btn-primary:disabled{opacity:.3;cursor:default;transform:none;}
.btn-danger{
  padding:8px 20px;border-radius:11px;border:1px solid rgba(220,70,70,.3);
  background:rgba(220,70,70,.1);color:rgba(220,90,90,.9);
  font-family:var(--font);font-size:12.5px;font-weight:500;cursor:pointer;
  transition:background .15s,border-color .15s;
}
.btn-danger:hover{background:rgba(220,70,70,.18);border-color:rgba(220,70,70,.45);}

/* Event detail popup */
.event-popup{
  position:fixed;z-index:70;background:var(--sidebar);border:1px solid var(--border2);
  border-radius:14px;padding:14px 16px;width:240px;
  box-shadow:0 8px 40px rgba(0,0,0,.4);animation:modalIn .2s cubic-bezier(.16,1,.3,1);
  display:none;
}
.event-popup.open{display:block;}
.event-popup-title{font-size:13.5px;font-weight:400;color:var(--text-sub);margin-bottom:6px;}
.event-popup-meta{font-size:11px;color:var(--text-dim);margin-bottom:10px;}
.event-popup-actions{display:flex;gap:6px;}
.ep-btn{
  flex:1;padding:6px;border-radius:8px;border:1px solid var(--border);
  font-family:var(--font);font-size:11px;font-weight:300;color:var(--text-muted);
  transition:all .15s;text-align:center;
}
.ep-btn:hover{border-color:var(--border2);color:var(--text-sub);}
.ep-btn.danger:hover{border-color:rgba(232,74,74,.3);color:rgba(232,74,74,.8);}
.ep-btn.jump:hover{border-color:rgba(232,118,74,.3);color:var(--orange);}

/* Color picker in event form */
.color-picker{display:flex;gap:5px;}
.color-opt{width:28px;height:28px;border-radius:50%;cursor:pointer;transition:transform .12s,box-shadow .12s;position:relative;}
.color-opt:hover{transform:scale(1.15);}
.color-opt.selected::after{content:'';position:absolute;inset:-3px;border-radius:50%;border:2px solid currentColor;}
.color-opt.blue{background:var(--cal-blue);color:rgba(74,140,232,.7);}
.color-opt.green{background:var(--cal-green);color:rgba(74,192,128,.7);}
.color-opt.yellow{background:var(--cal-yellow);color:rgba(232,190,74,.7);}
.color-opt.red{background:var(--cal-red);color:rgba(232,74,74,.7);}

/* ── Responsive ── */
@media(max-width:700px){
  .planner-sidebar{display:none;}
  .topbar-nav{display:none;}
  .topbar-right{display:none;}
  .bottom-nav{display:flex;}
  .card-detail{padding:20px 16px 120px;}
  .cal-header{padding:10px 14px 10px;flex-wrap:nowrap;gap:5px;}
  .cal-legend{display:none;}
  .cal-grid-wrap{padding:0 0 100px;}
}
@media(min-width:701px){
  .cal-sheet{display:none!important;}
  .cal-backdrop-m{display:none!important;}
  .planner-sidebar-cal{display:flex;}
}
@media(min-width:768px){
  :root{--text-sub:rgba(228,224,227,.62);--text-muted:rgba(228,224,227,.40);--text-dim:rgba(228,224,227,.26);}
  .topbar{height:60px;}
  .menu-btn{left:10px;}
}

/* Sidebar sections */
.sidebar-cards-section{display:flex;flex-direction:column;flex:1;overflow:hidden;}
.sidebar-cal-section{display:none;flex-direction:column;flex:1;overflow:hidden;}
.planner-sidebar.cal-mode .sidebar-cards-section{display:none;}
.planner-sidebar.cal-mode .sidebar-cal-section{display:flex;}
.psc-month-nav{
  display:grid;grid-template-columns:30px 1fr 30px;align-items:center;
  padding:14px 12px 10px;flex-shrink:0;
}
.psc-month-label{
  font-family:var(--font-display);font-size:16px;font-weight:500;font-style:italic;
  color:var(--text-sub);text-align:center;letter-spacing:.01em;
}
.psc-arr{
  width:28px;height:28px;border-radius:8px;border:none;background:transparent;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  color:var(--text-muted);transition:background .12s,color .12s;
}
.psc-arr:hover{background:var(--surface);color:var(--text-sub);}
.psc-arr svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2.2;stroke-linecap:round;}
.psc-today-btn{
  display:flex;align-items:center;justify-content:center;
  margin:0 12px 12px;padding:7px 0;border-radius:10px;border:1px solid var(--border);
  background:transparent;cursor:pointer;font-family:var(--font);
  font-size:11.5px;font-weight:300;color:var(--text-muted);
  transition:border-color .25s,color .25s;width:calc(100% - 24px);
}
body.light .psc-today-btn{border-color:rgba(80,40,20,.1);}
.psc-today-btn:hover{border-color:rgba(232,118,74,.3);color:var(--orange);}
.psc-today-btn.active{border-color:rgba(232,118,74,.35);color:var(--orange);background:rgba(232,118,74,.05);}
.psc-mini-cal{padding:0 12px 0;flex-shrink:0;}
.psc-mini-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.psc-lbl{font-size:9px;color:var(--text-dim);text-align:center;padding-bottom:6px;letter-spacing:.06em;text-transform:uppercase;}
.psc-d{
  aspect-ratio:1;display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:300;color:var(--text-muted);border-radius:7px;
  cursor:pointer;transition:background .1s,color .1s;
}
.psc-d:hover:not(.e){background:var(--surface);color:var(--text-sub);}
.psc-d.e{cursor:default;color:rgba(228,224,227,.08);}
body.light .psc-d.e{color:rgba(46,31,24,.1);}
.psc-d.tod{background:rgba(232,118,74,.1);color:var(--orange);font-weight:500;border:1px solid rgba(232,118,74,.2);}
.psc-d.in-week{background:rgba(232,118,74,.09);color:var(--text-sub);border-radius:0;}
.psc-d.week-start{border-radius:7px 0 0 7px;}
.psc-d.week-end{border-radius:0 7px 7px 0;}
.psc-d.in-week.tod{background:rgba(232,118,74,.22);color:var(--orange);font-weight:500;border:none;}
/* single-day week (shouldn't happen but safe) */
.psc-d.week-start.week-end{border-radius:7px;}
.psc-divider{height:1px;background:var(--border);margin:12px 12px 10px;}
.psc-filter-label{font-size:10px;letter-spacing:.09em;text-transform:uppercase;color:var(--text-dim);font-weight:500;padding:0 16px 8px;}
.psc-card-filters{flex:1;overflow-y:auto;padding:0 8px 20px;}
.psc-card-chip{
  display:flex;align-items:center;gap:5px;
  padding:8px 10px;border-radius:10px;border:1px solid transparent;
  cursor:pointer;transition:background .12s,border-color .15s;margin-bottom:3px;
  width:100%;text-align:left;
}
.psc-card-chip:hover{background:var(--surface);}
.psc-card-chip.active{background:rgba(232,118,74,.07);border-color:rgba(232,118,74,.22);}
.psc-card-chip-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;background:var(--cal-blue);}
.psc-card-chip.active .psc-card-chip-dot{background:var(--orange);}
.psc-card-chip-name{font-size:12px;font-weight:300;color:var(--text-muted);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.psc-card-chip.active .psc-card-chip-name{color:var(--text-sub);}
.psc-card-chip-count{font-size:10px;color:var(--text-dim);flex-shrink:0;}
.psc-all-chip{
  display:flex;align-items:center;justify-content:center;
  padding:7px 10px;border-radius:10px;border:1px solid var(--border);
  cursor:pointer;font-family:var(--font);font-size:11.5px;font-weight:300;color:var(--text-muted);
  transition:background .12s,border-color .15s,color .12s;margin:0 8px 10px;width:calc(100% - 16px);
}
.psc-all-chip:hover{border-color:rgba(255,255,255,.14);color:var(--text-sub);}
.psc-all-chip.active{background:rgba(232,118,74,.06);border-color:rgba(232,118,74,.3);color:var(--orange);}

/* ── Mobile calendar sheet ── */
.cal-backdrop-m{display:none;position:fixed;inset:0;z-index:24;background:rgba(0,0,0,.45);backdrop-filter:blur(4px);}
.cal-backdrop-m.open{display:block;}
.cal-sheet{
  display:none;position:fixed;bottom:88px;left:0;right:0;z-index:25;
  background:rgba(16,12,14,.98);backdrop-filter:blur(32px);-webkit-backdrop-filter:blur(32px);
  border:1px solid var(--border2);border-radius:20px 20px 0 0;
  padding:16px 16px 28px;
}
body.light .cal-sheet{background:var(--sidebar);}
.cal-sheet.open{display:block;animation:slideUp .28s cubic-bezier(.16,1,.3,1);}
@keyframes slideUp{from{transform:translateY(100%);opacity:0;}to{transform:translateY(0);opacity:1;}}
.cal-sheet-handle{width:36px;height:4px;border-radius:2px;background:rgba(255,255,255,.15);margin:0 auto 16px;}
body.light .cal-sheet-handle{background:rgba(80,40,20,.2);}
.sheet-cal-header{
  display:grid;grid-template-columns:44px 1fr 44px;align-items:center;
  height:48px;margin-bottom:12px;
}
.sheet-cal-label{
  font-family:var(--font-display);font-size:22px;font-weight:500;font-style:italic;
  background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  cursor:pointer;text-align:center;padding:4px 8px;border-radius:8px;
}
.sheet-arr{
  width:40px;height:40px;border-radius:12px;border:1px solid var(--border);
  background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;
  color:var(--text-sub);transition:background .12s,border-color .12s,color .12s;margin:0 auto;
}
.sheet-arr:hover{background:var(--surface);border-color:rgba(255,255,255,.12);color:var(--text);}
.sheet-arr svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;}
body.light .sheet-arr{border-color:rgba(80,40,20,.12);color:var(--text-sub);}
.sheet-mini-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;}
.sheet-lbl{font-size:9px;color:var(--text-dim);text-align:center;padding-bottom:6px;letter-spacing:.06em;text-transform:uppercase;}
.sheet-d{
  aspect-ratio:1;display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:300;color:var(--text-muted);border-radius:8px;
  cursor:pointer;transition:background .1s,color .1s;
}
.sheet-d:hover:not(.e){background:var(--surface);color:var(--text-sub);}
.sheet-d.e{cursor:default;color:rgba(228,224,227,.08);}
body.light .sheet-d.e{color:rgba(46,31,24,.1);}
.sheet-d.tod{background:rgba(232,118,74,.1);color:var(--orange);font-weight:500;border:1px solid rgba(232,118,74,.2);}
.sheet-d.sel{background:var(--grad)!important;color:#fff!important;font-weight:500;}

</style>
</head>
<body>
<canvas id="glow"></canvas>
<div class="noise"></div>

<div class="app">

  <!-- Topbar -->
  <div class="topbar">
    <button class="menu-btn" id="menuBtn" onclick="SHELL.toggleDrawer()">
      <div class="lns"><span class="ln"></span><span class="ln"></span></div>
    </button>
    <div class="topbar-logo">Planner</div>
  </div>

  <!-- Body -->
  <div class="main-body">

    <!-- Desktop sidebar -->
    <div class="planner-sidebar">
      <div class="sidebar-header">
        <div class="sidebar-header-label">Cards</div>
        <button class="new-card-btn" onclick="openCardModal()">
          <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          New
        </button>
      </div>

      <!-- View toggle: Cards / Calendar -->
      <div class="sidebar-view-toggle">
        <button class="svt active" id="svtCards" onclick="setMainView('cards')">
          <svg viewBox="0 0 24 24"><rect x="3" y="3" width="8" height="8" rx="2"/><rect x="13" y="3" width="8" height="8" rx="2"/><rect x="3" y="13" width="8" height="8" rx="2"/><rect x="13" y="13" width="8" height="8" rx="2"/></svg>
          Cards
        </button>
        <button class="svt" id="svtCalendar" onclick="setMainView('calendar')">
          <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="3"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          Calendar
        </button>
      </div>

      <!-- Cards section (shown when mainView=cards) -->
      <div class="sidebar-cards-section">
        <div class="card-filter-tabs">
          <button class="cft active" onclick="setFilter('all',this)">All</button>
          <button class="cft" onclick="setFilter('active',this)">Active</button>
          <button class="cft" onclick="setFilter('dream',this)">Dreams</button>
          <button class="cft" onclick="setFilter('problem',this)">Problems</button>
        </div>
        <div class="card-list" id="cardList"></div>
      </div>

      <!-- Calendar section (shown when mainView=calendar) -->
      <div class="sidebar-cal-section">
        <div class="psc-month-nav">
          <button class="psc-arr" onclick="pscNav(-1)">
            <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
          </button>
          <div class="psc-month-label" id="pscMonthLabel"></div>
          <button class="psc-arr" onclick="pscNav(1)">
            <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
          </button>
        </div>
        <button class="psc-today-btn" id="pscTodayBtn" onclick="pscGoToday()">Today</button>
        <div class="psc-mini-cal">
          <div class="psc-mini-grid" id="pscMiniGrid"></div>
        </div>
        <div class="psc-divider"></div>
        <div class="psc-filter-label">Filter by card</div>
        <button class="psc-all-chip active" id="pscAllChip" onclick="setCalCardFilter(null)">All events</button>
        <div class="psc-card-filters" id="pscCardFilters"></div>
      </div>
    </div>

    <!-- Content area -->
    <div class="content-area">

      <!-- Mobile calendar backdrop -->
      <div class="cal-backdrop-m" id="calBackdropM" onclick="toggleMobileCalSheet()"></div>

      <!-- Content scroll -->
      <div class="content-scroll" id="contentScroll">
        <!-- Filled by JS -->
      </div>
    </div>
  </div>
</div>

<!-- Mobile calendar sheet -->
<div class="cal-sheet" id="calSheet">
  <div class="cal-sheet-handle"></div>
  <div class="sheet-cal-header">
    <button class="sheet-arr" onclick="sheetNav(-1)">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <div class="sheet-cal-label" id="sheetMonthLabel"></div>
    <button class="sheet-arr" onclick="sheetNav(1)">
      <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
    </button>
  </div>
  <div class="sheet-mini-grid" id="sheetCalGrid"></div>
</div>

<!-- Mobile bottom bar — diary style -->
<div class="bottom-nav" id="bottomNav">
  <!-- View toggle left -->
  <div class="bn-who">
    <button class="bn-who-btn active" id="bnCards" onclick="setMobileView('cards')">Cards</button>
    <button class="bn-who-btn" id="bnCalendar" onclick="setMobileView('calendar')">Calendar</button>
  </div>
  <div class="bn-spacer"></div>
  <!-- Calendar sheet btn (only shown in calendar view) -->
  <button class="bn-cal-btn" id="bnCalSheet" onclick="toggleMobileCalSheet()" style="display:none;margin-right:8px;">
    <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
  </button>
  <!-- New btn with BRIAS gradient -->
  <button class="bn-new-btn" id="bnNew" onclick="mobileAdd()">
    <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    New
  </button>
</div>

<!-- BRIAS Confirm Modal -->
<div class="modal-backdrop" id="confirmModal">
  <div class="modal" style="max-width:380px;">
    <div class="modal-header" style="border-bottom:none;padding-bottom:8px;">
      <div class="modal-title" id="confirmTitle">Are you sure?</div>
      <button class="modal-close" onclick="confirmCancel()">
        <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body" style="padding-top:0;">
      <p id="confirmMessage" style="font-family:var(--font-serif);font-size:14px;font-weight:300;line-height:1.7;color:var(--text-muted);font-style:italic;"></p>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="confirmCancel()">Cancel</button>
      <button class="btn-danger" id="confirmOkBtn" onclick="confirmOk()">Delete</button>
    </div>
  </div>
</div>

<!-- Card Create/Edit Modal -->
<div class="modal-backdrop" id="cardModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="cardModalTitle">New card</div>
      <button class="modal-close" onclick="closeCardModal()">
        <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Title</label>
        <div style="position:relative;">
          <input type="text" class="form-input" id="cardTitleInput" placeholder="" style="position:relative;z-index:1;background:transparent;" oninput="document.getElementById('cardTitlePlaceholder').style.opacity=this.value?'0':'1'">
          <span id="cardTitlePlaceholder" style="position:absolute;left:14px;top:50%;transform:translateY(-50%);pointer-events:none;color:var(--text-dim);font-size:13.5px;font-weight:300;font-family:var(--font);z-index:0;white-space:nowrap;overflow:hidden;max-width:calc(100% - 28px);text-overflow:ellipsis;">e.g. Start my own business</span>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Type</label>
        <div class="type-selector">
          <button class="type-opt dream selected" id="typeDream" onclick="selectType('dream')">Dream</button>
          <button class="type-opt problem" id="typeProblem" onclick="selectType('problem')">Problem</button>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Initial description</label>
        <textarea class="form-input" id="cardDescInput" rows="3" placeholder="What's on your mind about this?"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeCardModal()">Cancel</button>
      <button class="btn-primary" id="cardModalSave" onclick="saveCard()">Create card</button>
    </div>
  </div>
</div>

<!-- Event Create Modal -->
<div class="modal-backdrop" id="eventModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="eventModalTitle">Add event</div>
      <button class="modal-close" onclick="closeEventModal()">
        <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Title</label>
        <input type="text" class="form-input" id="evTitleInput" placeholder="e.g. Therapy session">
      </div>
      <div class="form-group">
        <label class="form-label">Date & time</label>
        <div class="dt-row">
          <button type="button" class="dt-btn" id="dtDateBtn" onclick="openDatePicker()">
            <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            <span id="dtDateLabel">Today</span>
          </button>
          <button type="button" class="dt-btn" id="dtTimeBtn" onclick="openTimePicker()">
            <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            <span id="dtTimeLabel">10:00</span>
          </button>
        </div>
        <!-- Hidden date picker -->
        <div class="dt-picker" id="datePicker" style="display:none;">
          <div class="dt-picker-header">
            <button type="button" class="dt-picker-arr" onclick="dpNav(-1)"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></button>
            <span class="dt-picker-label" id="dpLabel"></span>
            <button type="button" class="dt-picker-arr" onclick="dpNav(1)"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></button>
          </div>
          <div class="dt-picker-grid" id="dpGrid"></div>
        </div>
        <!-- Time picker -->
        <div class="dt-picker" id="timePicker" style="display:none;">
          <div class="time-picker-inner">
            <div class="time-col">
              <button type="button" class="time-arr" onclick="adjustHour(1)"><svg viewBox="0 0 24 24"><polyline points="18 15 12 9 6 15"/></svg></button>
              <span class="time-val" id="tpHour">10</span>
              <button type="button" class="time-arr" onclick="adjustHour(-1)"><svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg></button>
            </div>
            <div class="time-sep">:</div>
            <div class="time-col">
              <button type="button" class="time-arr" onclick="adjustMin(1)"><svg viewBox="0 0 24 24"><polyline points="18 15 12 9 6 15"/></svg></button>
              <span class="time-val" id="tpMin">00</span>
              <button type="button" class="time-arr" onclick="adjustMin(-1)"><svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg></button>
            </div>
          </div>
          <div class="time-presets">
            <button type="button" class="time-preset" onclick="setTimePreset(8,0)">8:00</button>
            <button type="button" class="time-preset" onclick="setTimePreset(9,0)">9:00</button>
            <button type="button" class="time-preset" onclick="setTimePreset(10,0)">10:00</button>
            <button type="button" class="time-preset" onclick="setTimePreset(12,0)">12:00</button>
            <button type="button" class="time-preset" onclick="setTimePreset(14,0)">14:00</button>
            <button type="button" class="time-preset" onclick="setTimePreset(17,0)">17:00</button>
            <button type="button" class="time-preset" onclick="setTimePreset(19,0)">19:00</button>
            <button type="button" class="time-preset" onclick="setTimePreset(21,0)">21:00</button>
          </div>
        </div>
        <input type="hidden" id="evDateInput">
      </div>
      <div class="form-group">
        <label class="form-label">Duration</label>
        <div class="dur-row">
          <button type="button" class="dur-adj" onclick="adjustDur(-1)">−</button>
          <span class="dur-val" id="durDisplay">60 min</span>
          <button type="button" class="dur-adj" onclick="adjustDur(1)">+</button>
        </div>
        <div class="dur-presets">
          <button type="button" class="dur-preset" onclick="setDur(15)">15m</button>
          <button type="button" class="dur-preset" onclick="setDur(30)">30m</button>
          <button type="button" class="dur-preset active" onclick="setDur(60)">1h</button>
          <button type="button" class="dur-preset" onclick="setDur(90)">1h30</button>
          <button type="button" class="dur-preset" onclick="setDur(120)">2h</button>
        </div>
        <input type="hidden" id="evDurInput" value="60">
      </div>
      <div class="form-group">
        <label class="form-label">Link to card</label>
        <div class="card-link-picker">
          <button type="button" class="card-link-trigger" id="cardLinkTrigger" onclick="toggleCardLinkDropdown()">
            <span id="cardLinkLabel">No card linked</span>
            <svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
          </button>
          <div class="card-link-dropdown" id="cardLinkDropdown"></div>
        </div>
        <input type="hidden" id="evCardLink" value="">
      </div>
      <div class="form-group">
        <label class="form-label">Notes</label>
        <textarea class="form-input" id="evNotesInput" rows="2" placeholder="Optional notes..."></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeEventModal()">Cancel</button>
      <button class="btn-primary" id="evModalSave" onclick="saveEvent()">Add event</button>
    </div>
  </div>
</div>

<!-- Evaluate Modal -->
<div class="modal-backdrop" id="evaluateModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Evaluate</div>
      <button class="modal-close" onclick="closeEvalModal()">
        <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <p style="font-size:13.5px;color:var(--text-sub);font-family:var(--font-serif);font-weight:300;line-height:1.75;margin-bottom:16px;">How has it been going? Write a reflection — BRIAS will read it and help you update the plan.</p>
      <div class="form-group">
        <label class="form-label">Your reflection</label>
        <textarea class="form-input" id="evalTextInput" rows="5" placeholder="What's changed? What's harder than expected? What's working?"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeEvalModal()">Cancel</button>
      <button class="btn-primary" onclick="saveEvaluation()">Save reflection</button>
    </div>
  </div>
</div>

<!-- Event popup -->
<div class="event-popup" id="eventPopup">
  <div class="event-popup-title" id="epTitle"></div>
  <div class="event-popup-meta" id="epMeta"></div>
  <div class="event-popup-actions">

// ── Constants & helpers ──
const TODAY = new Date();
const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

function ds(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2);}
function fmtDate(d){const nd=new Date(d);return `${MONTHS[nd.getMonth()].slice(0,3)} ${nd.getDate()}, ${nd.getFullYear()}`;}
function fmtDateShort(d){const nd=new Date(d);return `${nd.getDate()} ${MONTHS[nd.getMonth()].slice(0,3)}`;}
function fmtTime(d){const nd=new Date(d);const h=nd.getHours(),m=nd.getMinutes();if(clockFormat===12){const ampm=h>=12?'PM':'AM';const h12=h%12||12;return `${h12}:${String(m).padStart(2,'0')} ${ampm}`;}return `${h}:${String(m).padStart(2,'0')}`;}
function getClockFormat(){return parseInt(localStorage.getItem('brias_clock_format')||'24');}
let clockFormat=getClockFormat();
function startOfWeek(d){const r=new Date(d);const day=r.getDay();const diff=r.getDate()-day+(day===0?-6:1);r.setDate(diff);r.setHours(0,0,0,0);return r;}
function addDays(d,n){const r=new Date(d);r.setDate(r.getDate()+n);return r;}
function isToday(d){const nd=new Date(d);return ds(nd)===ds(TODAY);}

// ── Glow canvas (same as diary) ──
(function(){
  const c=document.getElementById('glow');
  if(!c)return;
  const ctx=c.getContext('2d');
  let W,H,pts,t=0;
  function init(){W=c.width=window.innerWidth;H=c.height=window.innerHeight;pts=[{x:W*.25,y:H*.3,r:W*.38,c:'#e8764a'},{x:W*.75,y:H*.7,r:W*.35,c:'#d44a7a'},{x:W*.6,y:H*.2,r:W*.28,c:'#e8764a'}];}
  function draw(){
    ctx.clearRect(0,0,W,H);
    pts.forEach((p,i)=>{
      const ox=Math.sin(t*.0006+i*1.9)*60,oy=Math.cos(t*.0008+i*2.3)*50;
      const g=ctx.createRadialGradient(p.x+ox,p.y+oy,0,p.x+ox,p.y+oy,p.r);
      g.addColorStop(0,p.c+'22');g.addColorStop(1,'transparent');
      ctx.fillStyle=g;ctx.beginPath();ctx.arc(p.x+ox,p.y+oy,p.r,0,Math.PI*2);ctx.fill();
    });
    t++;requestAnimationFrame(draw);
  }
  init();draw();
  window.addEventListener('resize',init);
})();

  dream:'e.g. Start my own business',
  problem:'e.g. Help with my addiction'

function openCardModal(editId){
  editingCardId=editId||null;
  const modal=document.getElementById('cardModal');

  const saveBtn=document.getElementById('cardModalSave');
  if(editId){

    titleEl.textContent='Edit card';
    saveBtn.textContent='Save changes';
  } else {
    document.getElementById('cardTitleInput').value='';
    document.getElementById('cardTitleInput').style.opacity='1';
    document.getElementById('cardTitleInput').style.transform='';
    const lbl=document.getElementById('cardTitlePlaceholder');
    if(lbl){lbl.textContent=PLACEHOLDERS['dream'];lbl.style.opacity='1';}    document.getElementById('cardDescInput').value='';
    selectType('dream');
    titleEl.textContent='New card';
    saveBtn.textContent='Create card';
  }
  modal.classList.add('open');

function closeCardModal(){document.getElementById('cardModal').classList.remove('open');}
function selectType(t){
  activeCardType=t;
  document.getElementById('typeDream').classList.toggle('selected',t==='dream');
  document.getElementById('typeProblem').classList.toggle('selected',t==='problem');

  // Animate only the placeholder label, not the input itself
  const lbl=document.getElementById('cardTitlePlaceholder');
  const inp=document.getElementById('cardTitleInput');
  if(!lbl||!inp)return;
  const next=PLACEHOLDERS[t]||'';
  if(lbl.textContent===next)return;

  lbl.style.transition='opacity .15s ease';
  lbl.style.opacity='0';
  setTimeout(()=>{
    lbl.textContent=next;
    lbl.style.transition='opacity .2s ease';
    lbl.style.opacity='1';
  },150);
  inp.placeholder='';
}
function saveCard(){
  const title=document.getElementById('cardTitleInput').value.trim();
  if(!title)return;
  const desc=document.getElementById('cardDescInput').value.trim();
  if(editingCardId){
    const c=cards.find(x=>x.id===editingCardId);
    c.title=title;c.type=activeCardType;
    if(desc&&desc!==c.plan){c.history=c.history||[];c.history.push({type:'Plan update',date:new Date().toISOString(),text:c.plan||''});}
    c.plan=desc;
    saveCards(cards);
  } else {
    const newCard={id:uid(),title,type:activeCardType,plan:desc,status:'active',created:new Date().toISOString(),history:[]};
    cards.unshift(newCard);
    saveCards(cards);
    activeCardId=newCard.id;
  }
  closeCardModal();renderSidebar();renderContent();
}

  if(!lbl||!grid)return;
  lbl.textContent=`${MONTHS[dpMonth.getMonth()]} ${dpMonth.getFullYear()}`;
  const days=['M','T','W','T','F','S','S'];
  let h=days.map(d=>`<div class="dp-lbl">${d}</div>`).join('');
  const first=new Date(dpMonth.getFullYear(),dpMonth.getMonth(),1);
  const dow=(first.getDay()+6)%7;
  for(let i=0;i<dow;i++)h+=`<div class="dp-d e"></div>`;
  const dim=new Date(dpMonth.getFullYear(),dpMonth.getMonth()+1,0).getDate();
  for(let d=1;d<=dim;d++){
    const dd=new Date(dpMonth.getFullYear(),dpMonth.getMonth(),d);
    const isT=ds(dd)===ds(TODAY);
    const isSel=ds(dd)===ds(pickerDate);
    let cls='dp-d';
    if(isT)cls+=' tod';
    if(isSel)cls+=' sel';
    h+=`<div class="${cls}" onclick="pickDate('${ds(dd)}')">${d}</div>`;
  }
  grid.innerHTML=h;
}
function pickDate(dstr){

function updateDateLabel(){
  const lbl=document.getElementById('dtDateLabel');
  if(!lbl)return;
  const todStr=ds(TODAY);
  const tmrStr=ds(addDays(TODAY,1));
  const dStr=ds(pickerDate);
  if(dStr===todStr)lbl.textContent='Today';
  else if(dStr===tmrStr)lbl.textContent='Tomorrow';
  else lbl.textContent=`${pickerDate.getDate()} ${MONTHS[pickerDate.getMonth()].slice(0,3)} ${pickerDate.getFullYear()}`;

function renderTp(){
  document.getElementById('tpHour').textContent=String(pickerHour).padStart(2,'0');
  document.getElementById('tpMin').textContent=String(pickerMin).padStart(2,'0');
  updateTimeLabel();

  document.querySelectorAll('.time-preset').forEach(b=>{

  });

function adjustHour(dir){pickerHour=(pickerHour+dir+24)%24;renderTp();}
function adjustMin(dir){pickerMin=(pickerMin+dir+60)%60;renderTp();}
function setTimePreset(h,m){pickerHour=h;pickerMin=m;renderTp();}
function updateTimeLabel(){
  const lbl=document.getElementById('dtTimeLabel');
  if(!lbl)return;
  if(clockFormat===12){
    const ampm=pickerHour>=12?'PM':'AM';
    const h12=pickerHour%12||12;
    lbl.textContent=`${h12}:${String(pickerMin).padStart(2,'0')} ${ampm}`;
  } else {
    lbl.textContent=`${String(pickerHour).padStart(2,'0')}:${String(pickerMin).padStart(2,'0')}`;
  }

function syncHiddenDateTime(){
  const hidden=document.getElementById('evDateInput');
  if(!hidden)return;
  const d=pickerDate;
  const str=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}T${String(pickerHour).padStart(2,'0')}:${String(pickerMin).padStart(2,'0')}`;
  hidden.value=str;
}
// Duration
function adjustDur(dir){
  pickerDur=Math.max(15,pickerDur+(dir*15));
  updateDurDisplay();
}
function setDur(min){
  pickerDur=min;
  updateDurDisplay();
}
function updateDurDisplay(){
  const disp=document.getElementById('durDisplay');
  const hidden=document.getElementById('evDurInput');
  if(disp){
    if(pickerDur<60)disp.textContent=`${pickerDur} min`;
    else if(pickerDur%60===0)disp.textContent=`${pickerDur/60}h`;
    else disp.textContent=`${Math.floor(pickerDur/60)}h ${pickerDur%60}m`;
  }
  if(hidden)hidden.value=pickerDur;
  // Update preset active state
  document.querySelectorAll('.dur-preset').forEach(b=>{
    const min=parseInt(b.getAttribute('onclick').match(/\d+/)[0]);
    b.classList.toggle('active',min===pickerDur);
  });
}
function initPickers(dateStr){
  // Parse existing datetime string or default
  if(dateStr){
    const d=new Date(dateStr);
    pickerDate=new Date(d.getFullYear(),d.getMonth(),d.getDate());
    pickerHour=d.getHours();pickerMin=d.getMinutes();
  } else {
    pickerDate=new Date(TODAY.getFullYear(),TODAY.getMonth(),TODAY.getDate());
    pickerHour=10;pickerMin=0;
  }
  closePickers();
  updateDateLabel();
  updateTimeLabel();
  syncHiddenDateTime();
  pickerDur=parseInt(document.getElementById('evDurInput').value)||60;
  updateDurDisplay();

function saveEvent(){

  const dateStr=document.getElementById('evDateInput').value;

// ── Event popup ──

// ── Calendar rendering ──
function renderCalendar(){
  const scroll=document.getElementById('contentScroll');
  if(!scroll)return;
  const isMobile=window.innerWidth<=700;
  if(isMobile&&mobileView!=='calendar')return;

// ── Mobile: 3-day view (yesterday, today, tomorrow) ──
function renderMobileCalendar(scroll){
  const todayStr=ds(TODAY);

  // currentDay tracks the "center" day on mobile
  if(!window.mobileCalCenter) window.mobileCalCenter=new Date(TODAY);
  const center=window.mobileCalCenter;
  const days=[addDays(center,-1),new Date(center),addDays(center,1)];
  const rangeStart=ds(days[0]),rangeEnd=ds(days[2]);

  const isCenterToday=ds(center)===todayStr;

  // Build label — split month + day range
  const centerDay=center.getDate();
  const prev=days[0],next=days[2];
  const mobileMonthStr=MONTHS[center.getMonth()];
  const mobileRangeStr=`${prev.getDate()} – ${next.getDate()}, ${center.getFullYear()}`;

  // Events in range
  const rangeEvents=events.filter(e=>{const d=ds(new Date(e.date));return d>=rangeStart&&d<=rangeEnd;});

  // Hours
  const hours=[];for(let h=0;h<24;h++)hours.push(h);

  const dayShortM=['Su','Mo','Tu','We','Th','Fr','Sa'];
  let headerHtml=`<div class="cal-time-col"></div>`;
  days.forEach(d=>{
    const dStr=ds(d);
    const isT=dStr===todayStr;
    headerHtml+=`<div class="cal-day-header${isT?' today':''}">
      <div class="cal-day-name">${dayShortM[d.getDay()]}</div>
      <div class="cal-day-num${isT?' today':''}">${d.getDate()}</div>
    </div>`;
  });

  let slotsHtml='';
  const SLOT_H_M=56;
  const TOTAL_H_M=24*SLOT_H_M;
  hours.forEach(h=>{
    const hStr=clockFormat===12?(h===0?'12 AM':h<12?`${h} AM`:h===12?'12 PM':`${h-12} PM`):`${String(h).padStart(2,'0')}:00`;
    slotsHtml+=`<div class="cal-time-slot">${hStr}</div>`;
    days.forEach(d=>{
      const dStr=ds(d);
      const isT=dStr===todayStr;
      const cellDt=new Date(d);cellDt.setHours(h,0,0,0);
      const isoStr=cellDt.toISOString().slice(0,16);
      slotsHtml+=`<div class="cal-cell${isT?' today-col':''}" onclick="openEventModal('${isoStr}')"><div class="cal-cell-add">+</div></div>`;
    });
  });

  // Event overlays per column
  const mDayEventsHtml=days.map((d,dayIdx)=>{
    const dStr=ds(d);
    const dayEvs=rangeEvents.filter(e=>ds(new Date(e.date))===dStr);
    dayEvs.sort((a,b)=>new Date(a.date)-new Date(b.date));
    const cols=[];
    dayEvs.forEach(e=>{
      const ed=new Date(e.date);
      const startH=ed.getHours()+ed.getMinutes()/60;
      const endH=startH+(e.duration||60)/60;
      let placed=false;
      for(let c=0;c<cols.length;c++){
        const last=cols[c][cols[c].length-1];
        const le=new Date(last.date);
        const lastEnd=le.getHours()+le.getMinutes()/60+(last.duration||60)/60;
        if(startH>=lastEnd-0.01){cols[c].push(e);placed=true;break;}
      }
      if(!placed)cols.push([e]);
    });
    const numCols=cols.length||1;
    let html='';
    cols.forEach((col,ci)=>{
      col.forEach(e=>{
        const ed=new Date(e.date);
        const startH=ed.getHours()+ed.getMinutes()/60;
        const dur=(e.duration||60)/60;
        const top=startH*SLOT_H_M;
        const height=Math.max(22,dur*SLOT_H_M-3);
        const colW=100/numCols;
        const timeStr=clockFormat===12
          ?(ed.getHours()>=12?`${ed.getHours()%12||12}:${String(ed.getMinutes()).padStart(2,'0')} PM`:`${ed.getHours()||12}:${String(ed.getMinutes()).padStart(2,'0')} AM`)
          :`${String(ed.getHours()).padStart(2,'0')}:${String(ed.getMinutes()).padStart(2,'0')}`;
        html+=`<div class="cal-event ${e.color||'blue'}"
          style="top:${top}px;height:${height}px;left:${ci*colW}%;width:calc(${colW}% - 6px);"
          onclick="showEventPopup('${e.id}',event)">
          <div class="cal-event-title">${esc(e.title)}</div>
          ${height>=32?`<div class="cal-event-time">${timeStr}</div>`:''}
        </div>`;
      });
    });
    return `<div class="cal-day-overlay" data-day="${dayIdx}">${html}</div>`;
  }).join('');

  const calHtml=`<div class="calendar-view">
    <div class="cal-header">
      <div class="cal-week-nav">
        <button class="cal-nav-btn" onclick="mobileDayNav(-1)">
          <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <div class="cal-week-label">
          <div class="cal-week-label-month">${mobileMonthStr}</div>
          <div class="cal-week-label-range">${mobileRangeStr}</div>
        </div>
        <button class="cal-nav-btn" onclick="mobileDayNav(1)">
          <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
      </div>
      <button class="cal-today-btn${isCenterToday?' is-cur-week':''}" onclick="window.mobileCalCenter=new Date(TODAY);renderCalendar()">Today</button>
    </div>
    <div class="cal-grid-wrap" id="calGridWrap" style="padding:0 0 100px;">
      <div class="cal-grid" id="calGrid" style="grid-template-columns:48px repeat(3,1fr);min-width:0;">
        ${headerHtml}${slotsHtml}
      </div>
      <div id="calOverlayWrap" style="display:none;position:absolute;pointer-events:none;">${mDayEventsHtml}</div>
    </div>
  </div>`;

  scroll.innerHTML=calHtml;
  setTimeout(()=>{
    const w=scroll.querySelector('.cal-grid-wrap');
    if(!w)return;
    w.scrollTop=Math.max(0,(isCenterToday?TODAY.getHours():8)*SLOT_H_M-(w.clientHeight/2)+SLOT_H_M/2);
    const grid=scroll.querySelector('#calGrid');
    const ow=scroll.querySelector('#calOverlayWrap');
    if(!grid||!ow)return;
    const headerH=grid.querySelector('.cal-day-header')?.offsetHeight||56;
    const timeColW=grid.querySelector('.cal-time-col')?.offsetWidth||48;
    const gridW=grid.offsetWidth-timeColW;
    const colW=gridW/3;
    ow.style.cssText=`position:absolute;top:${headerH}px;left:${timeColW}px;width:${gridW}px;height:${TOTAL_H_M}px;pointer-events:none;`;
    ow.style.display='block';
    ow.querySelectorAll('.cal-day-overlay').forEach((ov,i)=>{
      ov.style.cssText=`position:absolute;top:0;left:${i*colW}px;width:${colW}px;height:${TOTAL_H_M}px;pointer-events:none;`;
    });
  },0);
}

        <button class="cal-nav-btn" onclick="weekNav(1)">
          <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
      </div>
      <button class="cal-today-btn${isCurWeek?' is-cur-week':''}" style="display:none;" onclick="currentWeek=startOfWeek(TODAY);renderCalendar()">Today</button>
      <div class="cal-legend">
        <div class="legend-item"><div class="legend-dot blue"></div>Your events</div>
        <div class="legend-item"><div class="legend-dot green"></div>Plan steps</div>
        <div class="legend-item"><div class="legend-dot yellow"></div>BRIAS suggestions</div>
        <div class="legend-item"><div class="legend-dot red"></div>Urgent</div>
      </div>
    </div>
    <div class="cal-grid-wrap" id="calGridWrap">
      <div class="cal-grid" id="calGrid">
        ${headerHtml}${slotsHtml}
      </div>
      <div id="calOverlayWrap" style="display:none;position:absolute;pointer-events:none;">${dayEventsHtml}</div>
    </div>
  </div>`;

  scroll.innerHTML=calHtml;
  setTimeout(()=>{
    const w=scroll.querySelector('.cal-grid-wrap');
    if(!w)return;
    w.scrollTop=Math.max(0,(isCurWeek?TODAY.getHours():8)*SLOT_H-(w.clientHeight/2)+SLOT_H/2);
    // Position overlays
    const grid=scroll.querySelector('#calGrid');
    const ow=scroll.querySelector('#calOverlayWrap');
    if(!grid||!ow)return;
    const headerH=grid.querySelector('.cal-day-header')?.offsetHeight||56;
    const timeColW=grid.querySelector('.cal-time-col')?.offsetWidth||52;
    const gridW=grid.offsetWidth-timeColW;
    const colW=gridW/7;
    ow.style.cssText=`position:absolute;top:${headerH}px;left:${timeColW}px;width:${gridW}px;height:${TOTAL_H}px;pointer-events:none;`;
    ow.style.display='block';
    ow.querySelectorAll('.cal-day-overlay').forEach((ov,i)=>{
      ov.style.cssText=`position:absolute;top:0;left:${i*colW}px;width:${colW}px;height:${TOTAL_H}px;pointer-events:none;`;
    });
  },0);
}

  scroll.innerHTML=`<div class="empty-state">
    <div class="empty-state-icon">
      <svg viewBox="0 0 24 24"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
    </div>
    <div class="empty-state-title">${cards.length===0?'Start your first card':'Select a card'}</div>
    <div class="empty-state-sub">${cards.length===0?'Cards are goals, dreams, or problems you\'re working through with BRIAS. Create one to begin.':'Choose a card from the sidebar, or create a new one.'}</div>
    ${cards.length===0?`<button class="card-action-btn evaluate" style="margin-top:8px;" onclick="openCardModal()">
      <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>

function setClockFormat(fmt){
  clockFormat=fmt;
  localStorage.setItem('brias_clock_format',String(fmt));
  const toggle=document.getElementById('clockToggle');
  if(toggle)toggle.classList.toggle('pill-right',fmt===12);
  document.querySelectorAll('#clockToggle .theme-opt').forEach(btn=>{
