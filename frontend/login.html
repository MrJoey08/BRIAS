<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BRIAS — Inloggen</title>
  <link rel="stylesheet" href="/assets/css/main.css">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    /* Subtiele achtergrond glow */
    body::before {
      content: '';
      position: fixed;
      top: -20%;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(ellipse, rgba(244,114,182,0.06) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .auth-wrap {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 400px;
    }

    /* Logo */
    .auth-logo {
      text-align: center;
      margin-bottom: 36px;
    }
    .auth-logo-title {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: 0.1em;
      background: var(--gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
    }
    .auth-logo-sub {
      font-size: 0.83rem;
      color: var(--text-dimmer);
      margin-top: 8px;
      line-height: 1.5;
    }

    /* Card */
    .auth-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px;
      box-shadow: var(--shadow);
    }

    /* Tabs */
    .auth-tabs {
      display: flex;
      background: var(--bg3);
      border-radius: var(--radius-pill);
      padding: 4px;
      margin-bottom: 28px;
    }
    .auth-tab {
      flex: 1;
      padding: 9px 12px;
      border-radius: var(--radius-pill);
      background: transparent;
      color: var(--text-dim);
      font-size: 0.88rem;
      font-weight: 500;
      transition: var(--trans);
      text-align: center;
    }
    .auth-tab.active {
      background: var(--bg2);
      color: var(--text);
      box-shadow: 0 1px 6px rgba(0,0,0,0.35);
    }

    /* Form */
    .auth-form { display: flex; flex-direction: column; gap: 16px; }

    /* Input styling voor login */
    .auth-form .input {
      border-radius: var(--radius-sm);
      background: var(--bg3);
      border-color: var(--border);
    }

    /* Footer */
    .auth-footer {
      text-align: center;
      margin-top: 22px;
      font-size: 0.82rem;
      color: var(--text-dimmer);
    }
    .auth-footer a {
      color: var(--text-dim);
      transition: var(--trans);
    }
    .auth-footer a:hover { color: var(--pink); }
  </style>
</head>
<body>

<div class="auth-wrap">
  <!-- Logo -->
  <div class="auth-logo">
    <div class="auth-logo-title">BRIAS</div>
    <p class="auth-logo-sub" id="auth-subtitle">Welkom terug.</p>
  </div>

  <!-- Card -->
  <div class="auth-card">
    <!-- Tabs -->
    <div class="auth-tabs">
      <button class="auth-tab" id="tab-login"    onclick="showTab('login')">Inloggen</button>
      <button class="auth-tab" id="tab-register" onclick="showTab('register')">Account aanmaken</button>
    </div>

    <!-- Login panel -->
    <div id="panel-login">
      <form class="auth-form" onsubmit="handleLogin(event)">
        <div class="input-group">
          <label>E-mailadres</label>
          <input class="input" id="login-email" type="email"
            placeholder="jouw@email.nl" required autocomplete="email">
        </div>
        <div class="input-group">
          <label>Wachtwoord</label>
          <input class="input" id="login-password" type="password"
            placeholder="••••••••" required autocomplete="current-password">
        </div>
        <div id="login-error" class="error-msg hidden"></div>
        <button type="submit" class="btn btn-primary w-full" id="login-btn">
          Inloggen
        </button>
      </form>
    </div>

    <!-- Register panel -->
    <div id="panel-register" class="hidden">
      <form class="auth-form" onsubmit="handleRegister(event)">
        <div class="input-group">
          <label>Hoe heet je?</label>
          <input class="input" id="reg-name" type="text"
            placeholder="Jouw naam" required autocomplete="name">
        </div>
        <div class="input-group">
          <label>E-mailadres</label>
          <input class="input" id="reg-email" type="email"
            placeholder="jouw@email.nl" required autocomplete="email">
        </div>
        <div class="input-group">
          <label>Wachtwoord</label>
          <input class="input" id="reg-password" type="password"
            placeholder="Minimaal 6 tekens" required autocomplete="new-password">
        </div>
        <div id="reg-error" class="error-msg hidden"></div>
        <button type="submit" class="btn btn-primary w-full" id="reg-btn">
          Account aanmaken
        </button>
      </form>
    </div>
  </div>

  <div class="auth-footer">
    <a href="/">← Terug naar de startpagina</a>
  </div>
</div>

<div id="toast-container"></div>
<script src="/assets/js/api.js"></script>
<script>
  // Al ingelogd?
  if (API.isLoggedIn()) window.location.href = '/app';

  function showTab(tab) {
    const isLogin = tab === 'login';
    document.getElementById('panel-login').classList.toggle('hidden', !isLogin);
    document.getElementById('panel-register').classList.toggle('hidden', isLogin);
    document.getElementById('tab-login').classList.toggle('active', isLogin);
    document.getElementById('tab-register').classList.toggle('active', !isLogin);
    document.getElementById('auth-subtitle').textContent =
      isLogin ? 'Welkom terug.' : 'Maak een account aan.';
    history.replaceState(null, '', !isLogin ? '?tab=register' : '/login');
  }

  const tab = new URLSearchParams(location.search).get('tab');
  showTab(tab === 'register' ? 'register' : 'login');

  async function handleLogin(e) {
    e.preventDefault();
    const btn = document.getElementById('login-btn');
    const err = document.getElementById('login-error');
    err.classList.add('hidden');
    btn.disabled = true;
    btn.textContent = 'Even geduld...';
    try {
      const res = await API.login(
        document.getElementById('login-email').value,
        document.getElementById('login-password').value,
      );
      API.saveSession(res.token, res.user, res.is_admin);
      window.location.href = '/app';
    } catch (ex) {
      err.textContent = ex.message;
      err.classList.remove('hidden');
      btn.disabled = false;
      btn.textContent = 'Inloggen';
    }
  }

  async function handleRegister(e) {
    e.preventDefault();
    const btn = document.getElementById('reg-btn');
    const err = document.getElementById('reg-error');
    err.classList.add('hidden');
    btn.disabled = true;
    btn.textContent = 'Account aanmaken...';
    try {
      const res = await API.register(
        document.getElementById('reg-email').value,
        document.getElementById('reg-name').value,
        document.getElementById('reg-password').value,
      );
      API.saveSession(res.token, res.user, res.is_admin);
      window.location.href = '/app';
    } catch (ex) {
      err.textContent = ex.message;
      err.classList.remove('hidden');
      btn.disabled = false;
      btn.textContent = 'Account aanmaken';
    }
  }
</script>
</body>
</html>
