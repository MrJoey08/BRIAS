<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BRIAS · Journal</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500;1,600&family=DM+Sans:wght@300;400;500&family=Bitter:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#0f0c0e;
  --surface:rgba(255,255,255,.035);
  --border:rgba(255,255,255,.07);
  --border2:rgba(255,255,255,.13);
  --text:#e4e0e3;
  --text-sub:rgba(228,224,227,.5);
  --text-muted:rgba(228,224,227,.3);
  --text-dim:rgba(228,224,227,.14);
  --orange:#e8764a;
  --pink:#d44a7a;
  --grad:linear-gradient(135deg,#e8764a,#d44a7a);
  --font:'DM Sans',sans-serif;
  --font-display:'Cormorant Garamond',Georgia,serif;
  --font-serif:'Bitter',Georgia,serif;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--font);}

canvas{position:fixed;inset:0;width:100%;height:100%;z-index:0;pointer-events:none;opacity:.48;}
.noise{position:fixed;inset:0;z-index:1;pointer-events:none;opacity:.025;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-size:200px;}
.vignette{position:fixed;inset:0;z-index:1;pointer-events:none;background:radial-gradient(ellipse at 50% 0%,transparent 40%,rgba(8,5,7,.7) 100%);}

@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
@keyframes slideDown{from{opacity:0;transform:translateY(-6px);}to{opacity:1;transform:translateY(0);}}
@keyframes contentSwap{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}

.hidden{display:none!important;}

/* ── Layout ── */
.app{position:relative;z-index:10;height:100vh;display:grid;grid-template-columns:260px 1fr;overflow:hidden;}

/* ── SIDEBAR ── */
.sidebar{
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  overflow:hidden;
  background:rgba(14,11,13,.6);
}

.sidebar-top{
  padding:20px 16px 16px;
  border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.sidebar-logo{
  font-family:var(--font-display);font-size:28px;font-weight:600;font-style:italic;
  background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;
  letter-spacing:.04em;display:block;margin-bottom:4px;
}
.sidebar-sub{font-size:11px;font-weight:300;color:var(--text-dim);letter-spacing:.06em;text-transform:uppercase;}

/* Month nav */
.month-nav{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 20px 12px;flex-shrink:0;
}
.month-label{font-family:var(--font-display);font-size:15px;font-weight:500;font-style:italic;color:var(--text-sub);}
.month-arrows{display:flex;gap:4px;}
.arr-btn{
  width:26px;height:26px;border-radius:8px;border:none;background:transparent;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  color:var(--text-muted);transition:background .12s,color .12s;
}
.arr-btn:hover:not(:disabled){background:var(--surface);color:var(--text-sub);}
.arr-btn:disabled{opacity:.2;cursor:default;}

/* Mini calendar */
.mini-cal{padding:0 14px 16px;flex-shrink:0;}
.mini-cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.mini-lbl{font-size:9px;color:var(--text-dim);text-align:center;padding-bottom:6px;letter-spacing:.06em;text-transform:uppercase;}
.mini-d{
  aspect-ratio:1;display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:300;color:var(--text-muted);border-radius:7px;
  cursor:pointer;transition:background .1s,color .1s;position:relative;
}
.mini-d:hover:not(.e):not(.f){background:var(--surface);color:var(--text-sub);}
.mini-d.e,.mini-d.f{cursor:default;color:rgba(228,224,227,.08);}
.mini-d.has::after{
  content:'';position:absolute;bottom:3px;left:50%;transform:translateX(-50%);
  width:3px;height:3px;border-radius:50%;background:rgba(232,118,74,.45);
}
.mini-d.tod{
  background:rgba(232,118,74,.1);color:var(--orange);font-weight:500;
  border:1px solid rgba(232,118,74,.2);
}
.mini-d.sel{background:var(--grad)!important;color:#fff!important;font-weight:500;}

/* Year list */
.year-section{flex:1;overflow-y:auto;padding:0 14px 20px;}
.year-group{margin-bottom:20px;}
.year-label-btn{
  display:flex;align-items:center;justify-content:space-between;
  font-size:10px;font-weight:500;color:var(--text-dim);letter-spacing:.1em;
  text-transform:uppercase;padding:4px 8px 6px;cursor:pointer;
  border-radius:8px;transition:background .1s,color .12s;margin-bottom:2px;
}
.year-label-btn:hover{background:var(--surface);color:var(--text-muted);}
.year-label-btn.open{color:var(--text-sub);}
.year-dot{width:4px;height:4px;border-radius:50%;background:rgba(232,118,74,.5);}
.month-chip{
  display:flex;align-items:center;justify-content:space-between;
  padding:7px 10px;border-radius:9px;cursor:pointer;
  font-size:13px;font-weight:300;color:var(--text-muted);
  transition:background .1s,color .1s;margin-bottom:1px;
}
.month-chip:hover{background:var(--surface);color:var(--text-sub);}
.month-chip.active{background:rgba(232,118,74,.08);color:var(--orange);}
.month-chip-dot{
  width:5px;height:5px;border-radius:50%;
  background:rgba(232,118,74,.4);display:none;
}
.month-chip.has-entries .month-chip-dot{display:block;}

/* ── MAIN ── */
.main{display:flex;flex-direction:column;overflow:hidden;}

/* Topbar */
.topbar{
  height:52px;flex-shrink:0;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;padding:0 28px;
  position:relative;
}
.topbar .page-switch{
  position:absolute;left:50%;transform:translateX(-50%);
}
.date-display{
  font-family:var(--font-display);font-size:16px;font-weight:400;font-style:italic;
  color:var(--text-muted);user-select:none;
}
.date-display.tod{background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}

.desktop-only{display:flex;}

/* Today btn */
.today-btn{
  padding:6px 14px;border-radius:10px;border:1px solid var(--border);
  background:transparent;cursor:pointer;font-family:var(--font);
  font-size:12px;font-weight:300;color:var(--text-muted);transition:all .15s;
}
.today-btn:hover{border-color:rgba(232,118,74,.3);color:var(--orange);}

/* Page switch */
.page-switch{
  display:flex;align-items:center;gap:2px;
  border-radius:12px;border:1px solid rgba(255,255,255,.08);
  background:rgba(255,255,255,.03);padding:3px;
}
.page-btn{
  display:flex;align-items:center;justify-content:center;gap:7px;
  padding:6px 20px;border:none;border-radius:9px;background:transparent;cursor:pointer;
  font-family:var(--font);font-size:13px;font-weight:300;color:var(--text-muted);
  transition:background .18s,color .18s;white-space:nowrap;
}
.page-btn:hover{color:var(--text-sub);}
.page-btn.active{
  background:rgba(255,255,255,.07);color:var(--text);
  box-shadow:0 1px 6px rgba(0,0,0,.25);
}
.page-btn svg{opacity:.5;transition:opacity .18s;}
.page-btn.active svg{opacity:1;}
.page-btn:hover svg{opacity:.7;}

/* Who toggle */
.who-toggle{
  display:flex;border-radius:10px;border:1px solid var(--border);
  background:rgba(255,255,255,.02);overflow:hidden;
}
.who-btn{
  flex:1;padding:7px 0;border:none;background:transparent;cursor:pointer;
  font-family:var(--font);font-size:12px;font-weight:300;color:var(--text-muted);
  transition:background .15s,color .15s;
}
.who-btn.active{background:rgba(255,255,255,.06);color:var(--text);}
.who-btn.active.brias-active{background:rgba(232,118,74,.08);color:var(--orange);}

/* Content */
.content{flex:1;overflow-y:auto;padding:48px 0 80px;}
.content-inner{max-width:640px;margin:0 auto;padding:0 32px;animation:contentSwap .25s ease;}

/* Day header */
.day-header{margin-bottom:36px;}
.day-big{
  font-family:var(--font-display);
  font-size:clamp(80px,13vw,120px);
  font-weight:300;font-style:italic;line-height:.88;
  color:rgba(228,224,227,.1);letter-spacing:-.02em;
}
.day-big.tod{background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.day-name{
  font-family:var(--font-display);font-size:22px;font-style:italic;
  font-weight:400;color:var(--text-muted);margin-top:4px;
}
.day-full{font-size:12px;font-weight:300;color:var(--text-dim);letter-spacing:.07em;text-transform:uppercase;margin-top:3px;}
.day-lock{
  display:inline-flex;align-items:center;gap:6px;margin-top:12px;
  font-size:12px;font-weight:300;color:var(--text-dim);font-style:italic;
}

/* Entry */
.entry-wrap{border-top:1px solid var(--border);padding-top:28px;}

.entry-body{
  background:var(--surface);border:1px solid var(--border);
  border-radius:16px;overflow:hidden;
}
.entry-body.editable:focus-within{border-color:rgba(232,118,74,.2);}
.entry-body.brias{background:rgba(232,118,74,.03);border-color:rgba(232,118,74,.07);}

.entry-ta{
  width:100%;min-height:200px;background:transparent;border:none;outline:none;
  color:var(--text);font-family:var(--font-serif);font-size:15px;font-weight:300;
  line-height:1.9;padding:26px 28px;resize:none;
}
.entry-ta::placeholder{color:var(--text-dim);font-style:italic;}
.entry-ta.brias-ta{font-style:italic;color:var(--text-sub);}

.entry-ro{
  padding:26px 28px;font-family:var(--font-serif);font-size:15px;font-weight:300;
  line-height:1.9;color:var(--text-sub);white-space:pre-wrap;word-break:break-word;min-height:80px;
}
.entry-ro.empty{color:var(--text-dim);font-style:italic;}
.entry-ro.brias{font-style:italic;}

.entry-foot{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 20px 14px;border-top:1px solid var(--border);
}
.entry-hint{font-size:11px;font-weight:300;color:var(--text-dim);font-style:italic;}
.save-btn{
  padding:7px 20px;border-radius:10px;border:none;background:var(--grad);
  color:#fff;font-family:var(--font);font-size:12px;font-weight:500;cursor:pointer;
  transition:opacity .15s,transform .12s;
}
.save-btn:hover{opacity:.85;transform:translateY(-1px);}
.save-btn:disabled{opacity:.25;cursor:default;transform:none;}

/* scrollbar */
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.07);border-radius:4px;}

@media(max-width:700px){
  .app{grid-template-columns:1fr;}
  .desktop-only{display:none!important;}
  .sidebar{display:none;}
  .topbar{padding:0 12px;}
  .content-inner{padding:0 16px;}
  .date-display{display:none;}
  .topbar-right-btns{display:flex;align-items:center;gap:6px;}
  .main{padding-bottom:96px;}
  .content{padding-top:24px;}

  /* Bottom nav */
  .bottom-nav{
    display:flex;position:fixed;bottom:16px;left:20px;right:20px;z-index:30;
    height:62px;background:rgba(22,16,20,.88);backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);
    border:1px solid rgba(255,255,255,.08);border-radius:22px;
    align-items:center;justify-content:space-around;padding:0 12px;
    box-shadow:0 8px 32px rgba(0,0,0,.45),inset 0 1px 0 rgba(255,255,255,.06);
  }
  .bottom-btn{
    display:flex;flex-direction:column;align-items:center;gap:5px;
    flex:1;padding:8px 0;border:none;background:transparent;cursor:pointer;
    font-family:var(--font);font-size:10px;font-weight:400;letter-spacing:.05em;
    color:rgba(228,224,227,.18);transition:color .15s;
  }
  .bottom-btn span{color:inherit;transition:color .15s;}
  .bottom-btn svg{width:20px;height:20px;stroke:rgba(212,74,122,.25);transition:stroke .15s;}
  .bottom-btn.active span{color:var(--orange);}
  .bottom-btn.active svg{stroke:var(--pink);}

  /* Mobile who toggle — shown in topbar on mobile */
  .mobile-who{
    display:flex;border-radius:10px;border:1px solid var(--border);
    background:var(--surface);overflow:hidden;
  }
  .mobile-who-btn{
    flex:1;padding:6px 16px;border:none;background:transparent;cursor:pointer;
    font-family:var(--font);font-size:13px;font-weight:300;color:var(--text-muted);
    transition:background .15s,color .15s;
  }
  .mobile-who-btn.active{background:rgba(255,255,255,.07);color:var(--text);}
  .mobile-who-btn.active.ba{background:rgba(232,118,74,.1);color:var(--orange);}

  /* Calendar sheet */
  .cal-backdrop-m{
    display:none;position:fixed;inset:0;z-index:24;
    background:rgba(0,0,0,.4);
  }
  .cal-backdrop-m.open{display:block;}
  .cal-sheet{
    display:none;position:fixed;bottom:64px;left:0;right:0;z-index:25;
    background:rgba(16,12,14,.98);backdrop-filter:blur(32px);
    border-top:1px solid var(--border2);border-radius:20px 20px 0 0;
    padding:20px 16px 24px;
  }
  .cal-sheet.open{display:block;animation:slideUp .25s cubic-bezier(.16,1,.3,1);}
  @keyframes slideUp{from{transform:translateY(100%);}to{transform:translateY(0);}}
  .cal-sheet-handle{
    width:36px;height:4px;border-radius:2px;background:rgba(255,255,255,.15);
    margin:0 auto 16px;cursor:grab;
  }
}
@media(min-width:701px){
  .bottom-nav{display:none;}
  .mobile-who{display:none;}
  .cal-sheet{display:none;}
  .topbar-right-btns{display:none;}
}
</style>
</head>
<body>
<canvas id="glow"></canvas>
<div class="noise"></div>
<div class="vignette"></div>

<div class="app">

  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-top">
      <span class="sidebar-logo">BRIAS</span>
      <div class="who-toggle">
        <button class="who-btn active" id="btnUser" onclick="setWho('user')"></button>
        <button class="who-btn" id="btnBrias" onclick="setWho('brias')">BRIAS</button>
      </div>
    </div>

    <div class="month-nav">
      <div class="month-label" id="sideMonthLabel"></div>
      <div class="month-arrows">
        <button class="arr-btn" id="sidePrevBtn" onclick="sideNav(-1)">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <button class="arr-btn" id="sideNextBtn" onclick="sideNav(1)">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
      </div>
    </div>

    <div class="mini-cal">
      <div class="mini-cal-grid" id="miniCalGrid"></div>
    </div>

    <div class="year-section" id="yearSection"></div>
  </div>

  <!-- Main -->
  <div class="main">
    <div class="topbar">
      <div class="mobile-who">
        <button class="mobile-who-btn active" id="mBtnUser" onclick="setWho('user')"></button>
        <button class="mobile-who-btn" id="mBtnBrias" onclick="setWho('brias')">BRIAS</button>
      </div>
      <!-- Desktop page switch — center of topbar -->
      <div class="page-switch desktop-only">
        <button class="page-btn" onclick="window.location.href='app.html'">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          Chat
        </button>
        <button class="page-btn active">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
          Journal
        </button>
      </div>
      <div class="topbar-right-btns">
        <button class="today-btn" id="mCalBtn" onclick="toggleMobileCal()">Calendar</button>
        <button class="today-btn" onclick="goToday()">Today</button>
      </div>
    </div>

    <!-- Mobile calendar backdrop -->
    <div class="cal-backdrop-m" id="calBackdropM" onclick="toggleMobileCal()"></div>

    <!-- Mobile calendar sheet -->
    <div class="cal-sheet" id="calSheet">
      <div class="cal-sheet-handle" id="calHandle"></div>

      <!-- Year/month picker (hidden by default) -->
      <div id="sheetPicker" style="display:none;">
        <div id="sheetPickerInner"></div>
      </div>

      <!-- Normal calendar view -->
      <div id="sheetCalView">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
          <button class="arr-btn" id="sheetPrevBtn" onclick="sheetNav(-1)" style="width:36px;height:36px;border-radius:10px;">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
          </button>
          <div id="sheetMonthLabel" onclick="openSheetPicker()"
            style="font-family:var(--font-display);font-size:20px;font-weight:500;font-style:italic;color:var(--text-sub);cursor:pointer;padding:4px 12px;border-radius:8px;transition:background .15s;"
            onmouseover="this.style.background='rgba(255,255,255,.05)'" onmouseout="this.style.background=''">
          </div>
          <button class="arr-btn" id="sheetNextBtn" onclick="sheetNav(1)" style="width:36px;height:36px;border-radius:10px;">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>
          </button>
        </div>
        <div class="mini-cal-grid" id="sheetCalGrid" style="display:grid;grid-template-columns:repeat(7,1fr);gap:5px;"></div>
      </div>
    </div>

    <div class="content" id="contentScroll">
      <div class="content-inner" id="contentInner"></div>
    </div>
  </div>

</div>

<!-- Mobile bottom nav -->
<div class="bottom-nav">
  <button class="bottom-btn" onclick="window.location.href='app.html'">
    <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
    <span>Chat</span>
  </button>
  <button class="bottom-btn active">
    <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
    <span>Journal</span>
  </button>
</div>

<script>
// ── Auth check ──
if (!localStorage.getItem('brias_token')) { window.location.href = 'auth.html'; }

// ── State ──
const TODAY = new Date(); TODAY.setHours(0,0,0,0);
let viewDate  = new Date(TODAY);
let sideMonth = new Date(TODAY.getFullYear(), TODAY.getMonth(), 1);
let who = 'user';
let editingMode = false;

// ── Helpers ──
const MONTHS     = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const WEEKDAYS   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const MONTHS_SH  = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function ds(d){ return `${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}` }
function p2(n){ return String(n).padStart(2,'0') }
function isToday(d){ return ds(d)===ds(TODAY) }
function isFuture(d){ const c=new Date(d);c.setHours(0,0,0,0);return c>TODAY }
function esc(s){ const d=document.createElement('div');d.textContent=s;return d.innerHTML }
function getUsername(){ return localStorage.getItem('brias_username')||'You' }
function skey(w,d){ const u=localStorage.getItem('brias_username')||'anon'; return `brias_diary_${u}_${w}_${d}` }
function getEntry(w,d){ return localStorage.getItem(skey(w,ds(d)))||'' }
function setEntry(w,d,v){ if(v.trim()) localStorage.setItem(skey(w,ds(d)),v.trim()); else localStorage.removeItem(skey(w,ds(d))) }
function hasEntry(d){ return !!(localStorage.getItem(skey('user',ds(d)))||localStorage.getItem(skey('brias',ds(d)))) }

// ── WebGL glow ──
(function(){
  const c=document.getElementById('glow');
  const gl=c.getContext('webgl')||c.getContext('experimental-webgl');if(!gl)return;
  const vs=gl.createShader(gl.VERTEX_SHADER);
  gl.shaderSource(vs,'attribute vec2 p;void main(){gl_Position=vec4(p,0.,1.);}');gl.compileShader(vs);
  const fs=gl.createShader(gl.FRAGMENT_SHADER);
  gl.shaderSource(fs,'precision mediump float;uniform float t;uniform vec2 res;void main(){vec2 uv=gl_FragCoord.xy/res;float x=uv.x,y=uv.y;float w1=sin(x*3.1+t*.5+sin(y*2.4+t*.35)*1.2)*.5+.5;float w2=sin(y*2.8-t*.6+sin(x*3.6-t*.4)*1.1)*.5+.5;float w3=sin((x+y)*2.5+t*.55+sin(x*1.8+t*.3)*.9)*.5+.5;float w4=sin((x-y)*3.2-t*.45+sin(y*2.1-t*.5)*1.)*.5+.5;float b=(w1*w2+w2*w3+w3*w4)/3.;vec3 og=vec3(.91,.388,.29);vec3 pk=vec3(.831,.353,.447);vec3 dk=vec3(.075,.05,.06);float ar=res.x/res.y;float ys=mix(ar<1.?.2:.26,ar<1.?.02:.08,y*y);float i=ys*mix(.45,.9,pow(b,1.5));gl_FragColor=vec4(mix(dk,mix(og,pk,w2),i),1.);}');
  gl.compileShader(fs);
  const prog=gl.createProgram();gl.attachShader(prog,vs);gl.attachShader(prog,fs);gl.linkProgram(prog);
  if(!gl.getProgramParameter(prog,gl.LINK_STATUS))return;
  gl.useProgram(prog);
  const buf=gl.createBuffer();gl.bindBuffer(gl.ARRAY_BUFFER,buf);
  gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,1,-1,-1,1,1,1]),gl.STATIC_DRAW);
  const pLoc=gl.getAttribLocation(prog,'p');gl.enableVertexAttribArray(pLoc);gl.vertexAttribPointer(pLoc,2,gl.FLOAT,false,0,0);
  const tLoc=gl.getUniformLocation(prog,'t'),rLoc=gl.getUniformLocation(prog,'res'),start=performance.now();
  function resize(){c.width=innerWidth;c.height=innerHeight;gl.viewport(0,0,c.width,c.height);}
  resize();window.addEventListener('resize',resize);
  (function tick(){gl.uniform1f(tLoc,(performance.now()-start)/1000);gl.uniform2f(rLoc,c.width||1,c.height||1);gl.drawArrays(gl.TRIANGLE_STRIP,0,4);requestAnimationFrame(tick);})();
})();

// ── Who toggle ──
function setWho(w){
  who=w;editingMode=false;
  renderTopbar();
  // Desktop
  const bu=document.getElementById('btnUser');
  const bb=document.getElementById('btnBrias');
  if(bu) bu.className='who-btn'+(w==='user'?' active':'');
  if(bb) bb.className='who-btn'+(w==='brias'?' active brias-active':'');
  // Mobile
  const mu=document.getElementById('mBtnUser');
  const mb=document.getElementById('mBtnBrias');
  if(mu) mu.className='mobile-who-btn'+(w==='user'?' active':'');
  if(mb) mb.className='mobile-who-btn'+(w==='brias'?' active ba':'');
  renderContent();
}

// ── Day navigation ──
function navDay(dir){
  const d=new Date(viewDate);d.setDate(d.getDate()+dir);
  if(isFuture(d))return;
  viewDate=d;sideMonth=new Date(d.getFullYear(),d.getMonth(),1);
  editingMode=false;renderAll();
}
function goToday(){
  viewDate=new Date(TODAY);sideMonth=new Date(TODAY.getFullYear(),TODAY.getMonth(),1);
  editingMode=false;renderAll();
}
function pickDay(dstr){
  const d=new Date(dstr+'T00:00:00');if(isFuture(d))return;
  viewDate=d;sideMonth=new Date(d.getFullYear(),d.getMonth(),1);
  editingMode=false;renderAll();
}

// ── Sidebar calendar ──
function sideNav(dir){
  sideMonth=new Date(sideMonth.getFullYear(),sideMonth.getMonth()+dir,1);
  const todayFirst=new Date(TODAY.getFullYear(),TODAY.getMonth(),1);
  if(sideMonth>todayFirst)sideMonth=new Date(todayFirst);
  renderSide();
}

function renderSide(){
  const todayFirst=new Date(TODAY.getFullYear(),TODAY.getMonth(),1);
  document.getElementById('sideMonthLabel').textContent=`${MONTHS[sideMonth.getMonth()]} ${sideMonth.getFullYear()}`;
  document.getElementById('sideNextBtn').disabled=sideMonth.getTime()>=todayFirst.getTime();

  // Mini calendar
  const grid=document.getElementById('miniCalGrid');
  const days=['M','T','W','T','F','S','S'];
  let h=days.map(d=>`<div class="mini-lbl">${d}</div>`).join('');
  const first=new Date(sideMonth.getFullYear(),sideMonth.getMonth(),1);
  const dow=(first.getDay()+6)%7;
  for(let i=0;i<dow;i++)h+=`<div class="mini-d e"></div>`;
  const dim=new Date(sideMonth.getFullYear(),sideMonth.getMonth()+1,0).getDate();
  for(let d=1;d<=dim;d++){
    const dd=new Date(sideMonth.getFullYear(),sideMonth.getMonth(),d);
    const f=isFuture(dd);
    let cls='mini-d';
    if(f)cls+=' f';
    else{
      if(isToday(dd))cls+=' tod';
      if(ds(dd)===ds(viewDate))cls+=' sel';
      if(hasEntry(dd))cls+=' has';
    }
    const click=f?'':`onclick="pickDay('${ds(dd)}')"`;
    h+=`<div class="${cls}" ${click}>${d}</div>`;
  }
  grid.innerHTML=h;

  // Year overview
  renderYearSection();
}

let openYears = new Set([TODAY.getFullYear()]);

function renderYearSection(){
  const sec=document.getElementById('yearSection');
  const startYear=2025;
  const endYear=TODAY.getFullYear();
  let h='';
  for(let y=endYear;y>=startYear;y--){
    const isOpen=openYears.has(y);
    const yearHasEntry=(()=>{
      const endM=(y===endYear)?TODAY.getMonth():11;
      for(let m=0;m<=endM;m++) if(monthHasAnyEntry(y,m)) return true;
      return false;
    })();
    h+=`<div class="year-group">
      <div class="year-label-btn${isOpen?' open':''}" onclick="toggleYear(${y})">
        <span>${y}</span>
        <div style="display:flex;align-items:center;gap:6px;">
          ${yearHasEntry?'<div class="year-dot"></div>':''}
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="transition:transform .2s;transform:rotate(${isOpen?'90':'0'}deg)"><polyline points="9 18 15 12 9 6"/></svg>
        </div>
      </div>`;
    if(isOpen){
      const endM=(y===endYear)?TODAY.getMonth():11;
      for(let m=endM;m>=0;m--){
        const monthHasEntry=monthHasAnyEntry(y,m);
        const isActive=sideMonth.getFullYear()===y&&sideMonth.getMonth()===m;
        h+=`<div class="month-chip${isActive?' active':''}${monthHasEntry?' has-entries':''}" onclick="jumpMonth(${y},${m})">
          ${MONTHS[m]}
          <div class="month-chip-dot"></div>
        </div>`;
      }
    }
    h+='</div>';
  }
  sec.innerHTML=h;
}

function toggleYear(y){
  if(openYears.has(y)) openYears.delete(y);
  else openYears.add(y);
  renderYearSection();
}

function monthHasAnyEntry(y,m){
  const dim=new Date(y,m+1,0).getDate();
  for(let d=1;d<=dim;d++){
    const dd=new Date(y,m,d);
    if(hasEntry(dd))return true;
  }
  return false;
}

function jumpMonth(y,m){
  sideMonth=new Date(y,m,1);
  // Also navigate viewDate to first day of that month (or today if current month)
  const target=new Date(y,m,1);
  const todayFirst=new Date(TODAY.getFullYear(),TODAY.getMonth(),1);
  if(target.getTime()===todayFirst.getTime()){
    viewDate=new Date(TODAY);
  } else {
    viewDate=new Date(y,m,1);
  }
  renderAll();
}

// ── Main content ──
function renderTopbar(){
  // Date
  const dd=document.getElementById('dateDisplay');
  if(dd){
    dd.textContent=`${viewDate.getDate()} ${MONTHS[viewDate.getMonth()]} ${viewDate.getFullYear()}`;
    dd.className='date-display'+(isToday(viewDate)?' tod':'');
  }
  const uname=getUsername();
  // Desktop who toggle (sidebar — may be hidden but exists in DOM)
  const bu=document.getElementById('btnUser');
  const bb=document.getElementById('btnBrias');
  if(bu){
    bu.textContent=uname;
    bu.className='who-btn'+(who==='user'?' active':'');
  }
  if(bb){
    bb.className='who-btn'+(who==='brias'?' active brias-active':'');
  }
  // Mobile who toggle
  const mu=document.getElementById('mBtnUser');
  const mb=document.getElementById('mBtnBrias');
  if(mu){
    mu.textContent=uname;
    mu.className='mobile-who-btn'+(who==='user'?' active':'');
  }
  if(mb){
    mb.className='mobile-who-btn'+(who==='brias'?' active ba':'');
  }
}

function renderContent(){
  const ci=document.getElementById('contentInner');
  const editable=isToday(viewDate);
  const isBrias=who==='brias';
  const saved=getEntry(who,viewDate);

  const dayNum=p2(viewDate.getDate());
  const wday=WEEKDAYS[viewDate.getDay()];
  const mo=MONTHS[viewDate.getMonth()];
  const yr=viewDate.getFullYear();

  // Day header
  let header=`<div class="day-header">
    <div class="day-big${isToday(viewDate)?' tod':''}">${dayNum}</div>
    <div class="day-name">${wday}</div>
    <div class="day-full">${mo.toUpperCase()} ${yr}</div>
    ${!editable?`<div class="day-lock">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      Read only — past entries cannot be changed
    </div>`:''}
  </div>`;

  // Entry
  let entry='';
  if(isBrias){
    const empty=!saved;
    entry=`<div class="entry-wrap">
      <div class="entry-body brias">
        <div class="entry-ro brias${empty?' empty':''}">${empty?"BRIAS hasn't written anything here yet.":esc(saved)}</div>
      </div>
    </div>`;
  } else if(editable){
    if(saved && !editingMode){
      // Saved state: show as diary page with edit button
      entry=`<div class="entry-wrap">
        <div class="entry-body" style="position:relative;">
          <div class="entry-ro" id="entryReadView">${esc(saved)}</div>
          <div class="entry-foot" style="border-top:1px solid var(--border);">
            <div></div>
            <button class="save-btn" style="background:transparent;border:1px solid var(--border2);color:var(--text-muted);font-size:12px;padding:6px 16px;" onclick="startEditing()">Edit</button>
          </div>
        </div>
      </div>`;
    } else {
      // Empty or editing: textarea
      entry=`<div class="entry-wrap">
        <div class="entry-body editable">
          <textarea class="entry-ta" id="mainTa" placeholder="Write something for today…">${esc(saved)}</textarea>
          <div class="entry-foot">
            <div></div>
            <button class="save-btn" id="saveBtn" onclick="doSave()">Save</button>
          </div>
        </div>
      </div>`;
    }
  } else {
    const empty=!saved;
    entry=`<div class="entry-wrap">
      <div class="entry-body">
        <div class="entry-ro${empty?' empty':''}">${empty?"Nothing written that day.":esc(saved)}</div>
      </div>
    </div>`;
  }

  ci.innerHTML=header+entry;
  document.getElementById('contentScroll').scrollTop=0;

  const ta=document.getElementById('mainTa');
  if(ta){
    ta.addEventListener('input',()=>{ta.style.height='auto';ta.style.height=Math.max(200,ta.scrollHeight)+'px';});
    if(ta.value)ta.style.height=Math.max(200,ta.scrollHeight)+'px';
    ta.focus();
  }
}

function startEditing(){
  editingMode=true;
  renderContent();
}

function doSave(){
  const ta=document.getElementById('mainTa');if(!ta)return;
  setEntry(who,viewDate,ta.value);
  editingMode=false;
  renderContent();
  renderSide();
}

// ── Render all ──
function renderAll(){
  if(mobileCalOpen) renderSheetCal();
  renderTopbar();
  renderContent();
  renderSide();
}

// ── Mobile calendar sheet ──
let mobileCalOpen = false;
let sheetPickerMode = null; // null | 'year' | 'month'
let sheetPickerYear = null;

function sheetNav(dir){
  const todayFirst=new Date(TODAY.getFullYear(),TODAY.getMonth(),1);
  const next=new Date(sideMonth.getFullYear(),sideMonth.getMonth()+dir,1);
  if(next>todayFirst) return;
  sideMonth=next;
  renderSheetCal();
  renderSide();
}

function openSheetPicker(){
  sheetPickerMode='year';
  sheetPickerYear=null;
  renderSheetPicker();
  document.getElementById('sheetPicker').style.display='block';
  document.getElementById('sheetCalView').style.display='none';
}

function closeSheetPicker(){
  sheetPickerMode=null;
  document.getElementById('sheetPicker').style.display='none';
  document.getElementById('sheetCalView').style.display='block';
}

function renderSheetPicker(){
  const inner=document.getElementById('sheetPickerInner');
  if(!inner) return;
  const todayFirst=new Date(TODAY.getFullYear(),TODAY.getMonth(),1);

  if(sheetPickerMode==='year'){
    const startY=2025, endY=TODAY.getFullYear();
    let h=`<div style="font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--text-dim);margin-bottom:14px;">Select year</div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;">`;
    for(let y=endY;y>=startY;y--){
      const active=sideMonth.getFullYear()===y;
      h+=`<button onclick="pickSheetYear(${y})" style="padding:12px 0;border:1px solid ${active?'rgba(232,118,74,.4)':'rgba(255,255,255,.07)'};border-radius:12px;background:${active?'rgba(232,118,74,.1)':'transparent'};color:${active?'var(--orange)':'var(--text-muted)'};font-family:var(--font);font-size:15px;font-weight:${active?'500':'300'};cursor:pointer;">${y}</button>`;
    }
    h+='</div>';
    inner.innerHTML=h;
  } else if(sheetPickerMode==='month'){
    let h=`<div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;">
      <button onclick="sheetPickerMode='year';renderSheetPicker()" style="border:none;background:transparent;color:var(--text-muted);cursor:pointer;font-size:13px;padding:4px 0;">← ${sheetPickerYear}</button>
    </div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;">`;
    for(let m=0;m<=11;m++){
      const d=new Date(sheetPickerYear,m,1);
      const future=d>todayFirst;
      const active=sideMonth.getFullYear()===sheetPickerYear&&sideMonth.getMonth()===m;
      h+=`<button ${future?'disabled':''} onclick="pickSheetMonth(${m})" style="padding:12px 0;border:1px solid ${active?'rgba(232,118,74,.4)':'rgba(255,255,255,.07)'};border-radius:12px;background:${active?'rgba(232,118,74,.1)':'transparent'};color:${future?'rgba(228,224,227,.1)':(active?'var(--orange)':'var(--text-muted)')};font-family:var(--font);font-size:13px;font-weight:${active?'500':'300'};cursor:${future?'default':'pointer'};">${MONTHS[m].slice(0,3)}</button>`;
    }
    h+='</div>';
    inner.innerHTML=h;
  }
}

function pickSheetYear(y){
  sheetPickerYear=y;
  sheetPickerMode='month';
  renderSheetPicker();
}

function pickSheetMonth(m){
  sideMonth=new Date(sheetPickerYear,m,1);
  closeSheetPicker();
  renderSheetCal();
  renderSide();
}
function toggleMobileCal(){
  mobileCalOpen = !mobileCalOpen;
  const sheet = document.getElementById('calSheet');
  const backdrop = document.getElementById('calBackdropM');
  const btn = document.getElementById('mCalBtn');
  if(mobileCalOpen){
    sheet.classList.add('open');
    if(backdrop) backdrop.classList.add('open');
    if(btn) btn.style.color = 'var(--orange)';
    renderSheetCal();
  } else {
    sheet.classList.remove('open');
    if(backdrop) backdrop.classList.remove('open');
    if(btn) btn.style.color = '';
  }
}

// Swipe down to close calendar sheet
(function(){
  let startY = 0, dragging = false;
  document.addEventListener('touchstart', e => {
    const handle = document.getElementById('calHandle');
    const sheet = document.getElementById('calSheet');
    if(!mobileCalOpen || !sheet) return;
    // Allow swipe anywhere on the sheet
    if(sheet.contains(e.target)){
      startY = e.touches[0].clientY;
      dragging = true;
    }
  }, {passive:true});
  document.addEventListener('touchmove', e => {
    if(!dragging || !mobileCalOpen) return;
    const sheet = document.getElementById('calSheet');
    const dy = e.touches[0].clientY - startY;
    if(dy > 0 && sheet) sheet.style.transform = `translateY(${dy}px)`;
  }, {passive:true});
  document.addEventListener('touchend', e => {
    if(!dragging) return;
    dragging = false;
    const sheet = document.getElementById('calSheet');
    const dy = e.changedTouches[0].clientY - startY;
    if(sheet) sheet.style.transform = '';
    if(dy > 60) toggleMobileCal();
  }, {passive:true});
})();

function renderSheetCal(){
  const label = document.getElementById('sheetMonthLabel');
  const grid = document.getElementById('sheetCalGrid');
  const nextBtn = document.getElementById('sheetNextBtn');
  const prevBtn = document.getElementById('sheetPrevBtn');
  if(!label || !grid) return;
  const todayFirst = new Date(TODAY.getFullYear(), TODAY.getMonth(), 1);
  label.textContent = `${MONTHS[sideMonth.getMonth()]} ${sideMonth.getFullYear()}`;
  if(nextBtn) nextBtn.disabled = sideMonth.getTime() >= todayFirst.getTime();
  if(prevBtn) prevBtn.disabled = false;
  const days=['M','T','W','T','F','S','S'];
  let h = days.map(d=>`<div class="mini-lbl">${d}</div>`).join('');
  const first = new Date(sideMonth.getFullYear(), sideMonth.getMonth(), 1);
  const dow = (first.getDay()+6)%7;
  for(let i=0;i<dow;i++) h+=`<div class="mini-d e"></div>`;
  const dim = new Date(sideMonth.getFullYear(), sideMonth.getMonth()+1, 0).getDate();
  for(let d=1;d<=dim;d++){
    const dd = new Date(sideMonth.getFullYear(), sideMonth.getMonth(), d);
    const f = isFuture(dd);
    let cls='mini-d';
    if(f) cls+=' f';
    else {
      if(isToday(dd)) cls+=' tod';
      if(ds(dd)===ds(viewDate)) cls+=' sel';
      if(hasEntry(dd)) cls+=' has';
    }
    const click = f ? '' : `onclick="pickDayMobile('${ds(dd)}')"`;
    h += `<div class="${cls}" ${click}>${d}</div>`;
  }
  grid.innerHTML = h;
}

function pickDayMobile(dstr){
  pickDay(dstr);
  toggleMobileCal();
}

// ── BRIAS API hook ──
// Call this from the backend after a conversation ends:
// window.briasDiaryWrite("BRIAS her reflection")
window.briasDiaryWrite=function(text){
  setEntry('brias',TODAY,text);
  if(isToday(viewDate))renderContent();
  renderSide();
};

// ── Init ──
renderAll();
</script>
