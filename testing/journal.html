<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BRIAS · Journal</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500;1,600&family=DM+Sans:wght@300;400;500&family=Bitter:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
button{outline:none!important;border:none;background:transparent;cursor:pointer;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#131013;
  --sidebar:#151215;
  --border:rgba(255,255,255,.07);
  --border2:rgba(255,255,255,.13);
  --surface:rgba(255,255,255,.05);
  --text:#e4e0e3;
  --text-sub:rgba(228,224,227,.44);
  --text-muted:rgba(228,224,227,.26);
  --text-dim:rgba(228,224,227,.14);
  --input-bg:rgba(255,255,255,.04);
  --input-border:rgba(255,255,255,.08);
  --input-focus:rgba(232,118,74,.28);
  --orange:#e8764a;
  --pink:#d44a7a;
  --grad:linear-gradient(135deg,#e8764a,#d44a7a);
  --font:'DM Sans',-apple-system,sans-serif;
  --font-display:'Cormorant Garamond',Georgia,serif;
  --font-serif:'Bitter',Georgia,serif;
}
/* Light mode */
body.light{
  --bg:#f0e6dc;
  --sidebar:#ede0d5;
  --border:rgba(80,40,20,.1);
  --border2:rgba(80,40,20,.18);
  --surface:rgba(80,40,20,.06);
  --text:#2e1f18;
  --text-sub:rgba(46,31,24,.6);
  --text-muted:rgba(46,31,24,.4);
  --text-dim:rgba(46,31,24,.22);
  --input-bg:rgba(80,40,20,.05);
  --input-border:rgba(80,40,20,.1);
  --input-focus:rgba(232,118,74,.35);
}

html,body{height:100%;overflow:hidden;}
body{font-family:var(--font);background:var(--bg);color:var(--text);transition:background .5s ease,color .4s ease;}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:4px;}
body.light ::-webkit-scrollbar-thumb{background:rgba(80,40,20,.12);}

/* Noise + glow */
canvas{position:fixed;inset:0;width:100%;height:100%;z-index:0;pointer-events:none;opacity:.38;transition:opacity .5s ease;}
body.light canvas{opacity:0;}
.noise{position:fixed;inset:0;pointer-events:none;z-index:1;opacity:.028;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-size:200px;}

@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
@keyframes contentSwap{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
@keyframes logoReveal{from{opacity:0;transform:translateY(12px) scale(.96);}to{opacity:1;transform:translateY(0) scale(1);}}

/* ── App shell ── */
.app{position:relative;z-index:10;display:flex;flex-direction:column;height:100vh;animation:fadeIn .4s ease both;}

/* ── Topbar ── */
.topbar{height:56px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;position:relative;transition:border-color .45s ease;}
.topbar-logo{font-family:var(--font-display);font-size:22px;font-weight:600;font-style:italic;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:.03em;}

/* Hamburger */
.menu-btn{position:absolute;left:16px;width:40px;height:40px;display:flex;align-items:center;justify-content:center;}
.lns{display:flex;flex-direction:column;gap:4px;align-items:center;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);}
.ln{display:block;width:26px;height:5px;border-radius:100px;background:var(--grad);flex-shrink:0;transition:transform .52s cubic-bezier(.22,1.35,.5,1),opacity .38s ease;}
.menu-btn.open .ln:nth-child(1){transform:translateY(9px) rotate(45deg);}
.menu-btn.open .ln:nth-child(2){opacity:0;transform:scaleX(0);}
.menu-btn.open .ln:nth-child(3){transform:translateY(-9px) rotate(-45deg);}

/* Topbar right area */
.topbar-right{position:absolute;right:16px;display:flex;align-items:center;gap:6px;}
.today-btn{
  padding:6px 14px;border-radius:10px;border:1px solid var(--border);
  background:transparent;cursor:pointer;font-family:var(--font);
  font-size:12px;font-weight:300;color:var(--text-muted);transition:all .15s;
}
.today-btn:hover{border-color:rgba(232,118,74,.3);color:var(--orange);}

/* ── Main layout ── */
.main-body{flex:1;display:flex;overflow:hidden;}

/* ── Left sidebar (desktop) ── */
.diary-sidebar{
  width:248px;flex-shrink:0;border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;
  background:rgba(14,11,13,.5);
  transition:background .45s ease,border-color .45s ease;
}
body.light .diary-sidebar{background:var(--sidebar);}

.sidebar-top{
  padding:18px 16px 14px;
  border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.sidebar-top-label{font-size:10px;letter-spacing:.09em;text-transform:uppercase;color:var(--text-dim);margin-bottom:10px;font-weight:500;}

/* Who toggle */
.who-toggle{
  display:flex;border-radius:10px;border:1px solid var(--border);
  background:rgba(255,255,255,.02);overflow:hidden;
}
body.light .who-toggle{background:rgba(80,40,20,.04);border-color:rgba(80,40,20,.1);}
.who-btn{
  flex:1;padding:7px 0;border:none;background:transparent;cursor:pointer;
  font-family:var(--font);font-size:12px;font-weight:300;color:var(--text-muted);
  transition:background .15s,color .15s;
}
.who-btn.active{background:rgba(255,255,255,.06);color:var(--text);}
body.light .who-btn.active{background:rgba(80,40,20,.08);color:var(--text);}
.who-btn.active.brias-active{background:rgba(232,118,74,.08);color:var(--orange);}

/* Month nav */
.month-nav{
  display:grid;grid-template-columns:28px 1fr 28px;align-items:center;gap:4px;
  padding:14px 12px 10px;flex-shrink:0;
}
.month-label{font-family:var(--font-display);font-size:16px;font-weight:500;font-style:italic;color:var(--text-sub);text-align:center;cursor:default;letter-spacing:.01em;}
.month-arrows{display:contents;}
.arr-btn{
  width:28px;height:28px;border-radius:8px;border:none;background:transparent;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  color:var(--text-muted);transition:background .12s,color .12s;
}
.arr-btn:hover:not(:disabled){background:var(--surface);color:var(--text-sub);}
.arr-btn:disabled{opacity:.2;cursor:default;}

/* Sidebar Today button */
.sidebar-today{
  display:flex;align-items:center;justify-content:center;
  margin:0 12px 12px;padding:7px 0;
  border-radius:10px;border:1px solid var(--border);
  background:transparent;cursor:pointer;font-family:var(--font);
  font-size:11.5px;font-weight:300;color:var(--text-muted);
  transition:border-color .25s,color .25s,box-shadow .25s;width:calc(100% - 24px);
}
body.light .sidebar-today{border-color:rgba(80,40,20,.1);}
.sidebar-today:hover{border-color:rgba(232,118,74,.3);color:var(--orange);}
@keyframes sidebarTodayPulse{0%,100%{box-shadow:0 0 0 0 rgba(232,118,74,.0);}50%{box-shadow:0 0 14px 2px rgba(232,118,74,.18);}}
.sidebar-today.is-today{
  border-color:rgba(232,118,74,.3);color:var(--orange);
  box-shadow:0 0 10px rgba(232,118,74,.14);
  animation:sidebarTodayPulse 2.8s ease-in-out infinite;
}

/* Mini calendar */
.mini-cal{padding:0 12px 14px;flex-shrink:0;}
.mini-cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.mini-lbl{font-size:9px;color:var(--text-dim);text-align:center;padding-bottom:6px;letter-spacing:.06em;text-transform:uppercase;}
.mini-d{
  aspect-ratio:1;display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:300;color:var(--text-muted);border-radius:7px;
  cursor:pointer;transition:background .1s,color .1s;position:relative;
}
.mini-d:hover:not(.e):not(.f){background:var(--surface);color:var(--text-sub);}
.mini-d.e,.mini-d.f{cursor:default;color:rgba(228,224,227,.08);}
body.light .mini-d.e,body.light .mini-d.f{color:rgba(46,31,24,.1);}
.mini-d.has::after{
  content:'';position:absolute;bottom:3px;left:50%;transform:translateX(-50%);
  width:3px;height:3px;border-radius:50%;background:rgba(232,118,74,.45);
}
.mini-d.tod{background:rgba(232,118,74,.1);color:var(--orange);font-weight:500;border:1px solid rgba(232,118,74,.2);}
.mini-d.sel{background:var(--grad)!important;color:#fff!important;font-weight:500;}

/* Year list */
.year-section{flex:1;overflow-y:auto;padding:0 12px 20px;}
.year-group{margin-bottom:18px;}
.year-label-btn{
  display:flex;align-items:center;justify-content:space-between;
  font-size:10px;font-weight:500;color:var(--text-dim);letter-spacing:.1em;
  text-transform:uppercase;padding:4px 8px 6px;cursor:pointer;
  border-radius:8px;transition:background .1s,color .12s;margin-bottom:2px;
}
.year-label-btn:hover{background:var(--surface);color:var(--text-muted);}
.year-label-btn.open{color:var(--text-sub);}
.year-dot{width:4px;height:4px;border-radius:50%;background:rgba(232,118,74,.5);}
.month-chip{
  display:flex;align-items:center;justify-content:space-between;
  padding:7px 10px;border-radius:9px;cursor:pointer;
  font-size:12.5px;font-weight:300;color:var(--text-muted);
  transition:background .1s,color .1s;margin-bottom:1px;
}
.month-chip:hover{background:var(--surface);color:var(--text-sub);}
.month-chip.active{background:rgba(232,118,74,.08);color:var(--orange);}
.month-chip-dot{width:5px;height:5px;border-radius:50%;background:rgba(232,118,74,.4);display:none;}
.month-chip.has-entries .month-chip-dot{display:block;}

/* ── Content area ── */
.content-area{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.content-scroll{flex:1;overflow-y:auto;padding:48px 0 80px;}
.content-inner{max-width:640px;margin:0 auto;padding:0 32px;animation:contentSwap .25s ease;}

/* Day header */
.day-header{margin-bottom:36px;}
.day-big{
  font-family:var(--font-display);
  font-size:clamp(80px,13vw,120px);
  font-weight:300;font-style:italic;line-height:.88;
  color:rgba(228,224,227,.1);letter-spacing:-.02em;
}
body.light .day-big{color:rgba(46,31,24,.08);}
.day-big.tod{background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.day-name{font-family:var(--font-display);font-size:22px;font-style:italic;font-weight:400;color:var(--text-muted);margin-top:4px;}
.day-full{font-size:12px;font-weight:300;color:var(--text-dim);letter-spacing:.07em;text-transform:uppercase;margin-top:3px;}
.day-lock{
  display:inline-flex;align-items:center;gap:6px;margin-top:12px;
  font-size:12px;font-weight:300;color:var(--text-dim);font-style:italic;
}

/* Entry */
.entry-wrap{border-top:1px solid var(--border);padding-top:28px;}
.entry-body{
  background:var(--surface);border:1px solid var(--border);
  border-radius:16px;overflow:hidden;
  transition:border-color .2s,background .45s ease;
}
.entry-body.editable:focus-within{border-color:rgba(232,118,74,.2);}
.entry-body.brias{background:rgba(232,118,74,.03);border-color:rgba(232,118,74,.07);}
.entry-ta{
  width:100%;min-height:200px;background:transparent;border:none;outline:none;
  color:var(--text);font-family:var(--font-serif);font-size:15px;font-weight:300;
  line-height:1.9;padding:26px 28px;resize:none;
  caret-color:var(--orange);
}
.entry-ta::placeholder{color:var(--text-dim);font-style:italic;}
.entry-ta.brias-ta{font-style:italic;color:var(--text-sub);}
.entry-ro{
  padding:26px 28px;font-family:var(--font-serif);font-size:15px;font-weight:300;
  line-height:1.9;color:var(--text-sub);white-space:pre-wrap;word-break:break-word;min-height:80px;
}
.entry-ro.empty{color:var(--text-dim);font-style:italic;}
.entry-ro.brias{font-style:italic;}
.entry-foot{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 20px 14px;border-top:1px solid var(--border);
}
.entry-hint{font-size:11px;font-weight:300;color:var(--text-dim);font-style:italic;}
.save-btn{
  padding:7px 20px;border-radius:10px;border:none;background:var(--grad);
  color:#fff;font-family:var(--font);font-size:12px;font-weight:500;cursor:pointer;
  transition:opacity .15s,transform .12s;
}
.save-btn:hover{opacity:.85;transform:translateY(-1px);}
.save-btn:disabled{opacity:.25;cursor:default;transform:none;}

/* ── Drawer ── */
.drawer{position:fixed;inset:0;z-index:40;pointer-events:none;}
.drawer-backdrop{position:absolute;inset:0;background:rgba(8,6,8,.82);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);opacity:0;transition:opacity .38s ease;}
.drawer-panel{position:absolute;top:0;left:0;bottom:0;width:280px;background:var(--sidebar);border-radius:0 28px 28px 0;transform:translateX(-100%);transition:transform .42s cubic-bezier(.16,1,.3,1),background .45s ease;display:flex;flex-direction:column;overflow:hidden;border-right:1px solid rgba(255,255,255,.04);}
.drawer.open{pointer-events:all;}
.drawer.open .drawer-backdrop{opacity:1;}
.drawer.open .drawer-panel{transform:translateX(0);}
body.light .drawer-panel{background:var(--sidebar);}
body.light .drawer-backdrop{background:rgba(30,12,0,.38);backdrop-filter:blur(10px);}
.drawer-top{padding:28px 20px 18px;flex-shrink:0;}
.drawer-logo{font-family:var(--font-display);font-size:30px;font-weight:600;font-style:italic;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.drawer-nav{flex:1;padding:0 10px;display:flex;flex-direction:column;gap:2px;overflow-y:auto;}
.nav-section-label{font-size:10px;letter-spacing:.09em;text-transform:uppercase;color:var(--text-dim);padding:4px 12px 6px;font-weight:500;}
.nav-item{display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:16px;transition:background .15s;width:100%;text-align:left;}
.nav-item:hover{background:rgba(255,255,255,.05);}
body.light .nav-item:hover{background:rgba(80,40,20,.06);}
.nav-item.active{background:linear-gradient(135deg,rgba(232,118,74,.1),rgba(212,74,122,.08));}
body.light .nav-item.active{background:linear-gradient(135deg,rgba(232,118,74,.12),rgba(212,74,122,.09));}
.nav-icon{width:34px;height:34px;border-radius:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.nav-item:not(.active) .nav-icon{background:rgba(255,255,255,.04);}
body.light .nav-item:not(.active) .nav-icon{background:rgba(80,40,20,.06);}
body.light .nav-item:not(.active) .nav-icon svg{stroke:rgba(80,40,20,.4)!important;}
.nav-item.active .nav-icon{background:linear-gradient(135deg,rgba(232,118,74,.18),rgba(212,74,122,.16));}
.nav-texts{flex:1;min-width:0;}
.nav-name{font-size:13px;font-weight:400;color:var(--text-sub);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.nav-item.active .nav-name{font-weight:500;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.nav-sub{font-size:11px;color:var(--text-dim);margin-top:2px;}
.soon-badge{font-size:9px;padding:2px 7px;border-radius:20px;background:rgba(255,255,255,.05);color:var(--text-dim);letter-spacing:.03em;margin-left:4px;vertical-align:middle;-webkit-text-fill-color:var(--text-dim);}
body.light .soon-badge{background:rgba(80,40,20,.07);color:var(--text-dim);-webkit-text-fill-color:var(--text-dim);}
.drawer-divider{height:1px;background:rgba(255,255,255,.05);margin:8px 10px 10px;}
body.light .drawer-divider{background:rgba(80,40,20,.1);}
.drawer-footer{padding:10px 14px 22px;display:flex;align-items:center;gap:10px;flex-shrink:0;}
.footer-av{width:32px;height:32px;border-radius:50%;background:var(--grad);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.footer-av span{font-family:var(--font-display);font-size:13px;color:#fff;font-style:italic;font-weight:600;}
.footer-info{flex:1;min-width:0;}
.footer-name{font-size:13px;font-weight:400;color:var(--text-sub);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.footer-handle{font-size:11px;color:var(--text-dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.drawer-settings-btn{width:30px;height:30px;border-radius:10px;background:rgba(255,255,255,.04);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .18s;}
.drawer-settings-btn:hover{background:rgba(255,255,255,.08);}
body.light .drawer-settings-btn{background:rgba(80,40,20,.07);}
body.light .drawer-settings-btn:hover{background:rgba(80,40,20,.12);}
body.light .drawer-settings-btn svg{stroke:rgba(80,40,20,.45)!important;}

/* ── Settings overlay ── */
.settings-overlay{
  position:fixed;inset:0;z-index:50;display:flex;flex-direction:column;
  background:rgba(10,7,9,.96);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  opacity:0;pointer-events:none;
  transform:translateY(12px) scale(.99);
  transition:opacity .32s ease,transform .38s cubic-bezier(.16,1,.3,1),background .45s ease;
}
.settings-overlay.open{opacity:1;pointer-events:all;transform:translateY(0) scale(1);}
body.light .settings-overlay{background:rgba(228,214,199,.97);}
.settings-header{height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 28px;flex-shrink:0;border-bottom:1px solid var(--border);}
.settings-title{font-family:var(--font-display);font-size:22px;font-weight:600;font-style:italic;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.settings-close-btn{width:30px;height:30px;border-radius:10px;background:rgba(255,255,255,.06);display:flex;align-items:center;justify-content:center;transition:background .15s;}
.settings-close-btn:hover{background:rgba(255,255,255,.1);}
body.light .settings-close-btn{background:rgba(80,40,20,.07);}
body.light .settings-close-btn:hover{background:rgba(80,40,20,.13);}
body.light .settings-close-btn svg{stroke:rgba(80,40,20,.5)!important;}
.settings-tabs{display:flex;gap:0;padding:0 24px;flex-shrink:0;border-bottom:1px solid var(--border);overflow-x:auto;}
.settings-tabs::-webkit-scrollbar{display:none;}
.stab{
  flex:1;padding:14px 6px 13px;min-width:0;border-radius:0;font-size:11px;font-weight:400;
  color:var(--text-muted);transition:color .2s;white-space:nowrap;text-align:center;
  background:transparent;position:relative;border-bottom:2px solid transparent;margin-bottom:-1px;
}
.stab:hover{color:var(--text-sub);}
.stab.active{color:var(--orange);font-weight:500;border-bottom:2px solid var(--orange);}
.settings-content{flex:1;overflow-y:auto;display:flex;justify-content:center;padding:28px 20px;}
.settings-body{width:100%;max-width:560px;}
.s-section{margin-bottom:24px;}
.s-section-title{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);margin-bottom:10px;font-weight:500;}
.s-row{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;background:rgba(255,255,255,.03);border-radius:14px;margin-bottom:5px;gap:16px;transition:background .45s ease;}
body.light .s-row{background:rgba(80,40,20,.05);}
.s-row-left{display:flex;flex-direction:column;gap:3px;flex:1;min-width:0;}
.s-row-label{font-size:13.5px;color:var(--text-sub);font-weight:400;letter-spacing:.01em;}
.s-row-sub{font-size:11.5px;color:var(--text-dim);margin-top:2px;line-height:1.4;}
.s-row-val{font-size:13px;color:var(--text-muted);flex-shrink:0;}
.s-btn{
  padding:7px 15px;border-radius:10px;font-size:12.5px;font-weight:400;
  color:var(--text-sub);background:rgba(255,255,255,.055);border:1px solid rgba(255,255,255,.07);
  transition:background .18s,color .18s,border-color .18s;white-space:nowrap;flex-shrink:0;
}
.s-btn:hover{background:rgba(255,255,255,.09);color:var(--text);border-color:rgba(255,255,255,.11);}
.s-btn.danger{color:rgba(220,90,90,.65);background:transparent;border-color:rgba(220,90,90,.15);}
.s-btn.danger:hover{background:rgba(220,70,70,.07);color:rgba(220,90,90,.85);border-color:rgba(220,90,90,.25);}
body.light .s-btn{color:var(--text-sub);background:rgba(80,40,20,.07);border-color:rgba(80,40,20,.1);}
body.light .s-btn:hover{background:rgba(80,40,20,.13);color:var(--text);border-color:rgba(80,40,20,.16);}
body.light .s-btn.danger{color:rgba(160,40,40,.8);background:transparent;border-color:rgba(160,40,40,.18);}
body.light .s-btn.danger:hover{background:rgba(160,40,40,.07);}
.toggle{width:42px;height:23px;border-radius:12px;background:rgba(255,255,255,.1);position:relative;transition:background .28s;flex-shrink:0;}
.toggle.on{background:var(--grad);}
.toggle::after{content:'';position:absolute;width:17px;height:17px;border-radius:50%;background:#fff;top:3px;left:3px;transition:left .26s cubic-bezier(.34,1.4,.6,1),background .28s,box-shadow .28s;box-shadow:0 1px 4px rgba(0,0,0,.3);}
.toggle.on::after{left:22px;background:#1a161a;box-shadow:none;}
body.light .toggle{background:rgba(80,40,20,.16);}
body.light .toggle.on{background:var(--grad);}
body.light .toggle::after{background:#fff;}
body.light .toggle.on::after{left:22px;background:#ddc9b3;box-shadow:none;}
.theme-toggle{
  display:flex;position:relative;
  background:rgba(255,255,255,.05);border:1px solid var(--border);
  border-radius:12px;padding:3px;gap:0;transition:background .45s ease,border-color .45s ease;
}
body.light .theme-toggle{background:rgba(80,40,20,.06);border-color:rgba(80,40,20,.1);}
.theme-toggle-pill{
  position:absolute;top:3px;bottom:3px;width:calc(50% - 3px);
  background:var(--grad);border-radius:9px;
  transition:left .35s cubic-bezier(.34,1.2,.6,1);pointer-events:none;
}
body:not(.light) .theme-toggle-pill{left:3px;}
.theme-toggle.pill-right .theme-toggle-pill{left:calc(50%);}
.theme-opt{
  flex:1;padding:8px 14px;border-radius:9px;font-size:12.5px;font-weight:400;
  color:var(--text-muted);background:transparent;transition:color .3s ease;
  display:flex;align-items:center;justify-content:center;gap:6px;position:relative;z-index:1;
}
.theme-opt.active{color:#fff;font-weight:500;}
body.light .theme-opt:not(.active){color:var(--text-sub);}
.about-logo{font-family:var(--font-display);font-size:42px;font-weight:600;font-style:italic;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;display:block;}
.sub-intro{font-family:var(--font-serif);font-size:14px;font-weight:300;font-style:italic;line-height:1.65;color:var(--text-muted);margin-bottom:20px;}
.sub-cards{display:flex;flex-direction:column;gap:10px;}
.sub-card{border:1px solid var(--border);border-radius:18px;padding:18px 20px;background:rgba(255,255,255,.03);}
body.light .sub-card{background:rgba(80,40,20,.05);border-color:rgba(80,40,20,.1);}
.sub-card-name{font-family:var(--font-display);font-size:17px;font-weight:600;font-style:italic;color:var(--text-sub);margin-bottom:4px;}
.sub-card-price{font-size:20px;font-weight:500;color:var(--text-sub);margin-bottom:8px;font-family:var(--font-display);font-style:italic;}
.sub-card-price span{font-size:12px;font-weight:300;color:var(--text-dim);font-family:var(--font);font-style:normal;}
.sub-card-perks{list-style:none;display:flex;flex-direction:column;gap:5px;margin-top:8px;padding-top:10px;border-top:1px solid var(--border);}
body.light .sub-card-perks{border-top-color:rgba(80,40,20,.1);}
.sub-card-perks li{font-family:var(--font-serif);font-size:12.5px;font-weight:300;font-style:italic;color:var(--text-muted);line-height:1.45;padding-left:14px;position:relative;}
.sub-card-perks li::before{content:'–';position:absolute;left:0;color:var(--text-dim);}

/* ── Mobile calendar sheet ── */
.cal-backdrop-m{display:none;position:fixed;inset:0;z-index:24;background:rgba(0,0,0,.4);}
.cal-backdrop-m.open{display:block;}
.cal-sheet{
  display:none;position:fixed;bottom:72px;left:0;right:0;z-index:25;
  background:rgba(16,12,14,.98);backdrop-filter:blur(32px);
  border-top:1px solid var(--border2);border-radius:20px 20px 0 0;
  padding:16px 16px 28px;
}
body.light .cal-sheet{background:var(--sidebar);}
.cal-sheet.open{display:block;animation:slideUp .25s cubic-bezier(.16,1,.3,1);}
@keyframes slideUp{from{transform:translateY(100%);}to{transform:translateY(0);}}
.cal-sheet-handle{width:36px;height:4px;border-radius:2px;background:rgba(255,255,255,.15);margin:0 auto 14px;cursor:grab;}
body.light .cal-sheet-handle{background:rgba(80,40,20,.2);}

/* Fixed-height calendar header — arrows never shift between months */
.sheet-cal-header{
  display:grid;grid-template-columns:44px 1fr 44px;align-items:center;
  height:48px;margin-bottom:12px;
}
.sheet-cal-label{
  font-family:var(--font-display);font-size:22px;font-weight:500;font-style:italic;
  color:var(--text-sub);cursor:pointer;text-align:center;
  padding:4px 8px;border-radius:8px;transition:background .15s;
}
.sheet-cal-label:hover{background:rgba(255,255,255,.05);}
body.light .sheet-cal-label:hover{background:rgba(80,40,20,.06);}
.sheet-arr{
  width:40px;height:40px;border-radius:12px;border:1px solid var(--border);
  background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;
  color:var(--text-sub);transition:background .12s,border-color .12s,color .12s;margin:0 auto;
}
.sheet-arr:hover:not(:disabled){background:var(--surface);border-color:rgba(255,255,255,.12);color:var(--text);}
.sheet-arr:disabled{opacity:.18;cursor:default;}
.sheet-arr svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;}
body.light .sheet-arr{border-color:rgba(80,40,20,.12);color:var(--text-sub);}

/* ── Mobile bottom bar (journal-specific) ── */
.bottom-nav{
  display:none;position:fixed;bottom:16px;left:16px;right:16px;z-index:30;

.bn-who{
  display:flex;border-radius:13px;border:1px solid var(--border);

}
body.light .bn-who{border-color:rgba(80,40,20,.1);background:rgba(80,40,20,.04);}
.bn-who-btn{

}
.bn-who-btn.active{background:rgba(255,255,255,.07);color:var(--text);}
body.light .bn-who-btn.active{background:rgba(80,40,20,.08);color:var(--text);}
.bn-who-btn.active.ba{background:rgba(232,118,74,.1);color:var(--orange);}

.bn-spacer{flex:1;}

.bn-btn{
  display:flex;align-items:center;gap:7px;
  padding:7px 13px;border-radius:13px;border:1px solid var(--border);
  background:transparent;cursor:pointer;font-family:var(--font);
  font-size:12px;font-weight:300;color:var(--text-muted);
  transition:border-color .25s,color .25s,background .15s;flex-shrink:0;
}
body.light .bn-btn{border-color:rgba(80,40,20,.12);}
.bn-btn:hover{border-color:rgba(255,255,255,.14);color:var(--text-sub);}
.bn-btn svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;flex-shrink:0;}
.bn-btn.cal-active{border-color:rgba(232,118,74,.35);color:var(--orange);}

.bn-today{
  padding:7px 14px;border-radius:13px;border:1px solid var(--border);
  background:transparent;cursor:pointer;font-family:var(--font);
  font-size:12px;font-weight:300;color:var(--text-muted);
  transition:border-color .25s,color .25s,box-shadow .25s;flex-shrink:0;margin-left:4px;
}
body.light .bn-today{border-color:rgba(80,40,20,.12);}
.bn-today:hover{border-color:rgba(232,118,74,.3);color:var(--orange);}
@keyframes todayPulse{0%,100%{box-shadow:0 0 0 0 rgba(232,118,74,.0);}50%{box-shadow:0 0 12px 2px rgba(232,118,74,.22);}}
.bn-today.is-today{
  border-color:rgba(232,118,74,.35);color:var(--orange);
  box-shadow:0 0 10px rgba(232,118,74,.18);
  animation:todayPulse 2.8s ease-in-out infinite;
}

.mobile-who{display:none;}
.mobile-who-btn{}

/* ── Responsive ── */
/* ── Responsive ── */
@media(max-width:700px){
  .diary-sidebar{display:none;}
  .topbar-right{display:none;}

  .topbar{height:60px;}

<script>
// ── Apply saved theme immediately ──
if (localStorage.getItem('brias_theme') === 'light') document.body.classList.add('light');

const API = 'https://api.brias.eu';
let meData = null;

// ── Auth ──
(async function() {
  const token = localStorage.getItem('brias_token');
  if (!token) { window.location.href = 'auth.html'; return; }
  try {
    const r = await fetch(API + '/api/me', { headers: { 'Authorization': 'Bearer ' + token }, signal: AbortSignal.timeout(3000) });
    const d = await r.json();
    if (!d.logged_in) { localStorage.removeItem('brias_token'); localStorage.removeItem('brias_username'); window.location.href = 'auth.html'; return; }
    meData = d;
    const name = d.display_name || d.username || localStorage.getItem('brias_username') || '—';
    document.getElementById('drawerName').textContent = name;
    document.getElementById('drawerHandle').textContent = d.email || d.username || '—';
    document.getElementById('drawerInitial').textContent = name.charAt(0).toUpperCase();
  } catch { window.location.href = 'auth.html'; }
})();

function doLogout() {
  localStorage.removeItem('brias_token'); localStorage.removeItem('brias_username');
  window.location.href = 'auth.html';
}

// ── Drawer ──
function toggleDrawer() { document.getElementById('drawer').classList.contains('open') ? closeDrawer() : openDrawer(); }
function openDrawer() { document.getElementById('drawer').classList.add('open'); document.getElementById('menuBtn').classList.add('open'); }
function closeDrawer() { document.getElementById('drawer').classList.remove('open'); document.getElementById('menuBtn').classList.remove('open'); }

// ── Settings ──
const tabs = [
  ()=>`
    <div class="s-section">
      <div class="s-section-title">Profile</div>
      <div class="s-row"><div class="s-row-left"><div class="s-row-label">Name</div></div><button class="s-btn">${esc(meData?.display_name||meData?.username||'—')}</button></div>
      <div class="s-row"><div class="s-row-left"><div class="s-row-label">Age</div></div><button class="s-btn">${esc(String(meData?.age||'—'))}</button></div>
      <div class="s-row"><div class="s-row-left"><div class="s-row-label">Email</div></div><div class="s-row-val">${esc(meData?.email||'—')}</div></div>
    </div>

// ── WebGL glow ──
(function(){
  const c=document.getElementById('glow');
  const gl=c.getContext('webgl')||c.getContext('experimental-webgl');if(!gl)return;
  const vs=gl.createShader(gl.VERTEX_SHADER);
  gl.shaderSource(vs,'attribute vec2 p;void main(){gl_Position=vec4(p,0.,1.);}');gl.compileShader(vs);
  const fs=gl.createShader(gl.FRAGMENT_SHADER);
  gl.shaderSource(fs,'precision mediump float;uniform float t;uniform vec2 res;void main(){vec2 uv=gl_FragCoord.xy/res;float x=uv.x,y=uv.y;float w1=sin(x*3.1+t*.5+sin(y*2.4+t*.35)*1.2)*.5+.5;float w2=sin(y*2.8-t*.6+sin(x*3.6-t*.4)*1.1)*.5+.5;float w3=sin((x+y)*2.5+t*.55+sin(x*1.8+t*.3)*.9)*.5+.5;float w4=sin((x-y)*3.2-t*.45+sin(y*2.1-t*.5)*1.)*.5+.5;float b=(w1*w2+w2*w3+w3*w4)/3.;vec3 og=vec3(.91,.388,.29);vec3 pk=vec3(.831,.353,.447);vec3 dk=vec3(.075,.05,.06);float ar=res.x/res.y;float ys=mix(ar<1.?.2:.26,ar<1.?.02:.08,y*y);float i=ys*mix(.45,.9,pow(b,1.5));gl_FragColor=vec4(mix(dk,mix(og,pk,w2),i),1.);}');
  gl.compileShader(fs);
  const prog=gl.createProgram();gl.attachShader(prog,vs);gl.attachShader(prog,fs);gl.linkProgram(prog);
  if(!gl.getProgramParameter(prog,gl.LINK_STATUS))return;
  gl.useProgram(prog);
  const buf=gl.createBuffer();gl.bindBuffer(gl.ARRAY_BUFFER,buf);
  gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,1,-1,-1,1,1,1]),gl.STATIC_DRAW);
  const pLoc=gl.getAttribLocation(prog,'p');gl.enableVertexAttribArray(pLoc);gl.vertexAttribPointer(pLoc,2,gl.FLOAT,false,0,0);
  const tLoc=gl.getUniformLocation(prog,'t'),rLoc=gl.getUniformLocation(prog,'res'),start=performance.now();
  function resize(){c.width=innerWidth;c.height=innerHeight;gl.viewport(0,0,c.width,c.height);}
  resize();window.addEventListener('resize',resize);
  (function tick(){gl.uniform1f(tLoc,(performance.now()-start)/1000);gl.uniform2f(rLoc,c.width||1,c.height||1);gl.drawArrays(gl.TRIANGLE_STRIP,0,4);requestAnimationFrame(tick);})();
})();

// ── State ──
const TODAY = new Date(); TODAY.setHours(0,0,0,0);
let viewDate  = new Date(TODAY);
let sideMonth = new Date(TODAY.getFullYear(), TODAY.getMonth(), 1);
let who = 'user';
let editingMode = false;

// ── Helpers ──
const MONTHS   = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const WEEKDAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
function ds(d){ return `${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}` }
function p2(n){ return String(n).padStart(2,'0') }
function isToday(d){ return ds(d)===ds(TODAY) }
function isFuture(d){ const c=new Date(d);c.setHours(0,0,0,0);return c>TODAY }
function esc(s){ const d=document.createElement('div');d.textContent=s;return d.innerHTML }
function getUsername(){ return localStorage.getItem('brias_username')||'You' }
function skey(w,d){ const u=localStorage.getItem('brias_username')||'anon'; return `brias_diary_${u}_${w}_${d}` }
function getEntry(w,d){ return localStorage.getItem(skey(w,ds(d)))||'' }
function setEntry(w,d,v){ if(v.trim()) localStorage.setItem(skey(w,ds(d)),v.trim()); else localStorage.removeItem(skey(w,ds(d))) }
function hasEntry(d){ return !!(localStorage.getItem(skey('user',ds(d)))||localStorage.getItem(skey('brias',ds(d)))) }

// ── Who toggle ──
function setWho(w){
  who=w; editingMode=false;
  const uname=getUsername();
  // Desktop sidebar who-toggle
  const bu=document.getElementById('btnUser'); const bb=document.getElementById('btnBrias');
  if(bu){ bu.textContent=uname; bu.className='who-btn'+(w==='user'?' active':''); }
  if(bb) bb.className='who-btn'+(w==='brias'?' active brias-active':'');
  // Bottom bar who-toggle
  const bnu=document.getElementById('bnUser'); const bnb=document.getElementById('bnBrias');
  if(bnu){ bnu.textContent=uname; bnu.className='bn-who-btn'+(w==='user'?' active':''); }
  if(bnb) bnb.className='bn-who-btn'+(w==='brias'?' active ba':'');
  renderContent();
}

// ── Day navigation ──
function navDay(dir){
  const d=new Date(viewDate);d.setDate(d.getDate()+dir);
  if(isFuture(d))return;
  viewDate=d;sideMonth=new Date(d.getFullYear(),d.getMonth(),1);
  editingMode=false;renderAll();
}
function goToday(){
  viewDate=new Date(TODAY);sideMonth=new Date(TODAY.getFullYear(),TODAY.getMonth(),1);
  editingMode=false;renderAll();
}
function pickDay(dstr){
  const d=new Date(dstr+'T00:00:00');if(isFuture(d))return;
  viewDate=d;sideMonth=new Date(d.getFullYear(),d.getMonth(),1);
  editingMode=false;renderAll();
}

// ── Sidebar calendar ──
function sideNav(dir){
  sideMonth=new Date(sideMonth.getFullYear(),sideMonth.getMonth()+dir,1);
  const todayFirst=new Date(TODAY.getFullYear(),TODAY.getMonth(),1);
  if(sideMonth>todayFirst)sideMonth=new Date(todayFirst);
  renderSide();
}

function renderSide(){
  const todayFirst=new Date(TODAY.getFullYear(),TODAY.getMonth(),1);
  document.getElementById('sideMonthLabel').textContent=`${MONTHS[sideMonth.getMonth()]} ${sideMonth.getFullYear()}`;
  document.getElementById('sideNextBtn').disabled=sideMonth.getTime()>=todayFirst.getTime();
  const grid=document.getElementById('miniCalGrid');
  const days=['M','T','W','T','F','S','S'];
  let h=days.map(d=>`<div class="mini-lbl">${d}</div>`).join('');
  const first=new Date(sideMonth.getFullYear(),sideMonth.getMonth(),1);
  const dow=(first.getDay()+6)%7;
  for(let i=0;i<dow;i++)h+=`<div class="mini-d e"></div>`;
  const dim=new Date(sideMonth.getFullYear(),sideMonth.getMonth()+1,0).getDate();
  for(let d=1;d<=dim;d++){
    const dd=new Date(sideMonth.getFullYear(),sideMonth.getMonth(),d);
    const f=isFuture(dd);
    let cls='mini-d';
    if(f)cls+=' f';
    else{ if(isToday(dd))cls+=' tod'; if(ds(dd)===ds(viewDate))cls+=' sel'; if(hasEntry(dd))cls+=' has'; }
    const click=f?'':`onclick="pickDay('${ds(dd)}')"`;
    h+=`<div class="${cls}" ${click}>${d}</div>`;
  }
  grid.innerHTML=h;
  renderYearSection();
}

let openYears = new Set([TODAY.getFullYear()]);

function renderYearSection(){
  const sec=document.getElementById('yearSection');
  const startYear=2025, endYear=TODAY.getFullYear();
  let h='';
  for(let y=endYear;y>=startYear;y--){
    const isOpen=openYears.has(y);
    const yearHasEntry=(()=>{ const endM=(y===endYear)?TODAY.getMonth():11; for(let m=0;m<=endM;m++) if(monthHasAnyEntry(y,m)) return true; return false; })();
    h+=`<div class="year-group">
      <div class="year-label-btn${isOpen?' open':''}" onclick="toggleYear(${y})">
        <span>${y}</span>
        <div style="display:flex;align-items:center;gap:6px;">
          ${yearHasEntry?'<div class="year-dot"></div>':''}
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="transition:transform .2s;transform:rotate(${isOpen?'90':'0'}deg)"><polyline points="9 18 15 12 9 6"/></svg>
        </div>
      </div>`;
    if(isOpen){
      const endM=(y===endYear)?TODAY.getMonth():11;
      for(let m=endM;m>=0;m--){
        const monthHasEntry=monthHasAnyEntry(y,m);
        const isActive=sideMonth.getFullYear()===y&&sideMonth.getMonth()===m;
        h+=`<div class="month-chip${isActive?' active':''}${monthHasEntry?' has-entries':''}" onclick="jumpMonth(${y},${m})">
          ${MONTHS[m]}<div class="month-chip-dot"></div>
        </div>`;
      }
    }
    h+='</div>';
  }
  sec.innerHTML=h;
}

function toggleYear(y){ if(openYears.has(y)) openYears.delete(y); else openYears.add(y); renderYearSection(); }
function monthHasAnyEntry(y,m){ const dim=new Date(y,m+1,0).getDate(); for(let d=1;d<=dim;d++){ if(hasEntry(new Date(y,m,d)))return true; } return false; }
function jumpMonth(y,m){
  sideMonth=new Date(y,m,1);
  const target=new Date(y,m,1), todayFirst=new Date(TODAY.getFullYear(),TODAY.getMonth(),1);
  viewDate = target.getTime()===todayFirst.getTime() ? new Date(TODAY) : new Date(y,m,1);
  renderAll();
}

// ── Content ──
function renderContent(){
  const ci=document.getElementById('contentInner');
  const editable=isToday(viewDate), isBrias=who==='brias', saved=getEntry(who,viewDate);
  const dayNum=p2(viewDate.getDate()), wday=WEEKDAYS[viewDate.getDay()], mo=MONTHS[viewDate.getMonth()], yr=viewDate.getFullYear();

  let header=`<div class="day-header">
    <div class="day-big${isToday(viewDate)?' tod':''}">${dayNum}</div>
    <div class="day-name">${wday}</div>
    <div class="day-full">${mo.toUpperCase()} ${yr}</div>
    ${!editable?`<div class="day-lock">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      Read only — past entries cannot be changed
    </div>`:''}
  </div>`;

  let entry='';
  if(isBrias){
    const empty=!saved;
    entry=`<div class="entry-wrap">
      <div class="entry-body brias">
        <div class="entry-ro brias${empty?' empty':''}">${empty?"BRIAS hasn't written anything here yet.":esc(saved)}</div>
      </div>
    </div>`;
  } else if(editable){
    if(saved && !editingMode){
      entry=`<div class="entry-wrap">
        <div class="entry-body" style="position:relative;">
          <div class="entry-ro" id="entryReadView">${esc(saved)}</div>
          <div class="entry-foot" style="border-top:1px solid var(--border);">
            <div></div>
            <button class="save-btn" style="background:transparent;border:1px solid var(--border2);color:var(--text-muted);font-size:12px;padding:6px 16px;" onclick="startEditing()">Edit</button>
          </div>
        </div>
      </div>`;
    } else {
      entry=`<div class="entry-wrap">
        <div class="entry-body editable">
          <textarea class="entry-ta" id="mainTa" placeholder="Write something for today…">${esc(saved)}</textarea>
          <div class="entry-foot">
            <div></div>
            <button class="save-btn" id="saveBtn" onclick="doSave()">Save</button>
          </div>
        </div>
      </div>`;
    }
  } else {
    const empty=!saved;
    entry=`<div class="entry-wrap">
      <div class="entry-body">
        <div class="entry-ro${empty?' empty':''}">${empty?"Nothing written that day.":esc(saved)}</div>
      </div>
    </div>`;
  }

  ci.innerHTML=header+entry;
  document.getElementById('contentScroll').scrollTop=0;

  const ta=document.getElementById('mainTa');
  if(ta){
    ta.addEventListener('input',()=>{ta.style.height='auto';ta.style.height=Math.max(200,ta.scrollHeight)+'px';});
    if(ta.value)ta.style.height=Math.max(200,ta.scrollHeight)+'px';
    ta.focus();
  }
}

function startEditing(){ editingMode=true; renderContent(); }
function doSave(){
  const ta=document.getElementById('mainTa');if(!ta)return;
  setEntry(who,viewDate,ta.value);
  editingMode=false; renderContent(); renderSide();
}

  let h=days.map(d=>`<div class="mini-lbl">${d}</div>`).join('');
  const first=new Date(sideMonth.getFullYear(),sideMonth.getMonth(),1);
  const dow=(first.getDay()+6)%7;
  for(let i=0;i<dow;i++) h+=`<div class="mini-d e"></div>`;
  const dim=new Date(sideMonth.getFullYear(),sideMonth.getMonth()+1,0).getDate();
  for(let d=1;d<=dim;d++){
    const dd=new Date(sideMonth.getFullYear(),sideMonth.getMonth(),d);
    const f=isFuture(dd);
    let cls='mini-d';
    if(f) cls+=' f';
    else { if(isToday(dd))cls+=' tod'; if(ds(dd)===ds(viewDate))cls+=' sel'; if(hasEntry(dd))cls+=' has'; }
    const click=f?'':`onclick="pickDayMobile('${ds(dd)}')"`;
    h+=`<div class="${cls}" ${click}>${d}</div>`;
  }
  grid.innerHTML=h;
}
function pickDayMobile(dstr){ pickDay(dstr); toggleMobileCal(); }

// ── BRIAS API hook ──
window.briasDiaryWrite=function(text){
  setEntry('brias',TODAY,text);
  if(isToday(viewDate)) renderContent();
  renderSide();
};

// ── Init ──
renderAll();
