<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BRIAS — Offline</title>
<meta name="theme-color" content="#1a1118">
<link rel="stylesheet" href="assets/css/base.css">
<link rel="stylesheet" href="assets/css/offline.css">
</head>
<body>

<div class="offline-screen">
  <canvas class="auth-glow-canvas" id="offlineGlow"></canvas>
  <div class="auth-grain"></div>
  <div class="auth-vignette"></div>

  <div class="offline-content">
    <div class="offline-pulse"><div class="offline-dot"></div></div>
    <div class="offline-title">BRIAS</div>
    <div class="offline-heading">Offline</div>
    <div class="offline-message">BRIAS is having her moment.<br>She should be back soon.</div>
    <button class="offline-retry-btn" id="retryBtn" onclick="retryConnection()">Try again</button>
  </div>

  <div class="offline-footer">BRIAS &nbsp;&middot;&nbsp; MADE FROM SOMETHING REAL</div>
</div>

<script src="assets/js/glow.js"></script>
<script>
var API='https://api.brias.eu';
initGlow('offlineGlow');

var autoRetry=setInterval(checkAndRedirect,8000);
async function checkAndRedirect(){
  try{var r=await fetch(API+'/api/me',{method:'GET',signal:AbortSignal.timeout(3000)});if(r.ok){clearInterval(autoRetry);window.location.replace('index.html');}}
  catch(e){}
}

async function retryConnection(){
  var btn=document.getElementById('retryBtn');
  btn.classList.add('is-checking');btn.textContent='Checking...';
  try{var r=await fetch(API+'/api/me',{method:'GET',signal:AbortSignal.timeout(4000)});
    if(r.ok){btn.textContent='Connected!';setTimeout(function(){window.location.replace('index.html');},400);return;}}
  catch(e){}
  btn.textContent='Still offline...';btn.classList.remove('is-checking');
  setTimeout(function(){btn.textContent='Try again';},2000);
}
</script>
</body>
</html>
