<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>BRIAS</title>
<meta name="theme-color" content="#1a1118">
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="assets/css/base.css">
<link rel="stylesheet" href="assets/css/offline.css">
</head>
<body>
<noscript><div class="noscript-msg">BRIAS needs JavaScript to work.<br>Please enable it in your browser settings.</div></noscript>

<div class="offline-screen">
  <canvas class="auth-glow-canvas" id="offlineGlow"></canvas>
  <div class="auth-grain"></div>
  <div class="auth-vignette"></div>

  <div class="offline-content">
    <div class="offline-logo">BRIAS</div>
    <div class="offline-divider"></div>
    <div class="offline-message">
      I'll be right back.<br>
      Just give me a moment.
    </div>
    <div class="offline-retry">
      <button class="offline-retry-btn" id="retryBtn" onclick="retryConnection()">Try again</button>
      <div class="offline-status" id="statusText"></div>
    </div>
  </div>
</div>

<script src="assets/js/config.js"></script>
<script src="assets/js/glow.js"></script>
<script>
initGlow('offlineGlow');

/* Silent auto-retry every 8s */
var autoRetry = setInterval(function() {
  briasCheckOnline().then(function(online) {
    if (online) {
      clearInterval(autoRetry);
      document.getElementById('statusText').textContent = 'reconnected';
      document.getElementById('statusText').className = 'offline-status is-connected';
      setTimeout(function() { window.location.replace('index.html'); }, 600);
    }
  });
}, 8000);

/* Manual retry */
async function retryConnection() {
  var btn = document.getElementById('retryBtn');
  var status = document.getElementById('statusText');
  btn.classList.add('is-checking');
  status.textContent = 'checking...';

  var online = await briasCheckOnline();
  if (online) {
    status.textContent = 'reconnected';
    status.className = 'offline-status is-connected';
    setTimeout(function() { window.location.replace('index.html'); }, 600);
    return;
  }

  status.textContent = 'still waiting';
  btn.classList.remove('is-checking');
  setTimeout(function() { status.textContent = ''; }, 3000);
}
</script>
</body>
</html>
