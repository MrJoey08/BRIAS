<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>BRIAS — Offline</title>
<meta name="description" content="BRIAS is temporarily unavailable.">
<meta name="theme-color" content="#1a1118">
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="assets/css/base.css">
<link rel="stylesheet" href="assets/css/offline.css">
</head>
<body>
<noscript><div class="noscript-msg">BRIAS needs JavaScript to work.<br>Please enable it in your browser settings.</div></noscript>

<div class="offline-screen">
  <canvas class="auth-glow-canvas" id="offlineGlow"></canvas>
  <div class="auth-grain"></div>
  <div class="auth-vignette"></div>

  <div class="offline-content">
    <div class="offline-pulse"><div class="offline-dot"></div></div>
    <div class="offline-title">BRIAS</div>
    <div class="offline-heading">Offline</div>
    <div class="offline-message">BRIAS is having her moment.<br>She should be back soon.</div>
    <button class="offline-retry-btn" id="retryBtn" onclick="retryConnection()">Try again</button>
  </div>

  <div class="offline-footer">BRIAS &nbsp;&middot;&nbsp; MADE FROM SOMETHING REAL</div>
</div>

<script src="assets/js/config.js"></script>
<script src="assets/js/glow.js"></script>
<script>
initGlow('offlineGlow');

var autoRetry = setInterval(checkAndRedirect, 8000);

async function checkAndRedirect() {
  var online = await briasCheckOnline();
  if (online) { clearInterval(autoRetry); window.location.replace('index.html'); }
}

async function retryConnection() {
  var btn = document.getElementById('retryBtn');
  btn.classList.add('is-checking');
  btn.textContent = 'Checking...';

  var online = await briasCheckOnline();
  if (online) {
    btn.textContent = 'Connected!';
    setTimeout(function() { window.location.replace('index.html'); }, 400);
    return;
  }

  btn.textContent = 'Still offline...';
  btn.classList.remove('is-checking');
  setTimeout(function() { btn.textContent = 'Try again'; }, 2000);
}
</script>
</body>
</html>
