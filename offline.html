<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>BRIAS</title>
<meta name="theme-color" content="#1a1118">
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="assets/css/base.css">
<link rel="stylesheet" href="assets/css/offline.css">
</head>
<body>
<noscript><div class="noscript-msg">BRIAS needs JavaScript to work.<br>Please enable it in your browser settings.</div></noscript>

<div class="offline-screen">
  <canvas class="glow-canvas" id="offlineGlow"></canvas>
  <div class="grain-overlay"></div>
  <div class="vignette-overlay"></div>

  <div class="offline-content">
    <div class="offline-logo">BRIAS</div>
    <div class="offline-line"></div>
    <div class="offline-text">I'll be right back.<br>Just give me a moment.</div>
    <div class="offline-action">
      <button class="offline-btn" id="retryBtn" onclick="retryConnection()">Try again</button>
      <div class="offline-note" id="statusText"></div>
    </div>
  </div>
</div>

<script src="assets/js/config.js"></script>
<script src="assets/js/glow.js"></script>
<script>
initGlow('offlineGlow');

var autoRetry = setInterval(function() {
  briasCheckOnline().then(function(ok) {
    if (ok) {
      clearInterval(autoRetry);
      var s = document.getElementById('statusText');
      s.textContent = 'reconnected';
      s.className = 'offline-note ok';
      setTimeout(function() { window.location.replace('index.html'); }, 600);
    }
  });
}, 8000);

async function retryConnection() {
  var btn = document.getElementById('retryBtn');
  var s = document.getElementById('statusText');
  btn.classList.add('is-checking');
  s.textContent = 'checking...';

  var ok = await briasCheckOnline();
  if (ok) {
    s.textContent = 'reconnected';
    s.className = 'offline-note ok';
    setTimeout(function() { window.location.replace('index.html'); }, 600);
    return;
  }

  s.textContent = 'still waiting';
  btn.classList.remove('is-checking');
  setTimeout(function() { s.textContent = ''; }, 3000);
}
</script>
</body>
</html>
