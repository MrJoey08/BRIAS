<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>BRIAS</title>
<meta name="description" content="Chat with BRIAS — your emotionally intelligent companion.">
<meta name="theme-color" content="#2a2a2a">
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="assets/css/base.css">
<link rel="stylesheet" href="assets/css/app.css">
</head>
<body>
<noscript><div class="noscript-msg">BRIAS needs JavaScript to work.<br>Please enable it in your browser settings.</div></noscript>

<div id="appScreen" class="app" style="visibility:hidden;">
  <!-- Sidebar -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <button class="sb-btn" onclick="toggleSidebar()" aria-label="Toggle sidebar"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="18" x2="20" y2="18"/></svg></button>
      <div class="logo"><span>BRIAS</span></div>
      <button class="sb-btn new-chat" onclick="newChat()" aria-label="New chat"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
    </div>
    <div class="chat-list"><div class="chat-list-label">Conversations</div><div id="chatList"></div></div>
    <div class="sidebar-footer">
      <div class="sf-avatar"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#9a9a9a" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div>
      <div style="flex:1"><div class="sf-name" id="sfName">&mdash;</div><div class="sf-sub">local &middot; llama.cpp</div></div>
      <button class="sb-btn" onclick="doLogout()" aria-label="Log out"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#4e4e4e" stroke-width="1.5" stroke-linecap="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></button>
    </div>
  </div>

  <!-- Main -->
  <div class="main">
    <div class="topbar">
      <button class="sb-btn" id="topbarToggle" onclick="toggleSidebar()" style="position:absolute;left:12px;display:none;" aria-label="Toggle sidebar"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="18" x2="20" y2="18"/></svg></button>
    </div>
    <div class="messages" id="msgContainer">
      <div class="messages-inner" id="msgInner">
        <div class="welcome" id="welcomeScreen">
          <div class="welcome-logo" id="welcomeLogo"></div>
          <div class="welcome-sub">What can I help you with?</div>
        </div>
      </div>
    </div>
    <div class="input-area">
      <div class="input-box">
        <textarea id="msgInput" rows="1" placeholder="Send a message..." oninput="autoResize(this);updateBtn();" onkeydown="handleKey(event)" enterkeyhint="send"></textarea>
        <button class="action-btn send-inactive" id="actionBtn" onclick="handleActionBtn()" aria-label="Send message">
          <svg id="iconSend" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
          <div id="iconStop" class="stop-sq" style="display:none;"></div>
        </button>
      </div>
      <div class="input-footer">Brias can make mistakes. Everything runs locally on your hardware.</div>
    </div>
  </div>
</div>

<script src="assets/js/config.js"></script>
<script src="assets/js/app.js"></script>
<script defer src="/_vercel/insights/script.js"></script>
</body>
</html>
