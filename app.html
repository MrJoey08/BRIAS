<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BRIAS</title>
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="icon" type="image/x-icon" href="/logo/favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="/logo/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/logo/favicon-16x16.png">
<link rel="apple-touch-icon" sizes="180x180" href="/logo/apple-touch-icon.png">
<link rel="manifest" href="/logo/site.webmanifest">
<meta name="theme-color" content="#131013">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&family=Bitter:ital,wght@0,300;0,400;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
button{outline:none!important;border:none;background:transparent;cursor:pointer;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#131013;
  --sidebar:#151215;
  --border:rgba(255,255,255,.07);
  --surface:rgba(255,255,255,.05);
  --text:#e4e0e3;
  --text-sub:rgba(228,224,227,.44);
  --text-muted:rgba(228,224,227,.26);
  --text-dim:rgba(228,224,227,.14);
  --input-bg:rgba(255,255,255,.04);
  --input-border:rgba(255,255,255,.08);
  --input-focus:rgba(232,118,74,.28);
  --orange:#e8764a;
  --pink:#d44a7a;
  --grad:linear-gradient(135deg,#e8764a,#d44a7a);
  --font:'DM Sans',-apple-system,sans-serif;
  --font-display:'Cormorant Garamond',Georgia,serif;
  --font-serif:'Bitter',Georgia,serif;
}
/* Light mode — warm cream, designed for mental wellness */
body.light{
  --bg:#f0e6dc;
  --sidebar:#ede0d5;
  --border:rgba(80,40,20,.1);
  --surface:rgba(80,40,20,.06);
  --text:#2e1f18;
  --text-sub:rgba(46,31,24,.6);
  --text-muted:rgba(46,31,24,.4);
  --text-dim:rgba(46,31,24,.22);
  --input-bg:rgba(80,40,20,.05);
  --input-border:rgba(80,40,20,.1);
  --input-focus:rgba(232,118,74,.35);
}

body.light .drawer-panel{background:var(--sidebar);}
body.light ::-webkit-scrollbar-thumb{background:rgba(80,40,20,.12);}
html,body{height:100%;overflow:hidden;}
body{font-family:var(--font);background:var(--bg);color:var(--text);transition:background .5s ease,color .4s ease;}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:4px;}
textarea::placeholder{color:var(--text-dim);}
.noise{position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.028;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-size:200px;}
@keyframes bDot{0%,60%,100%{opacity:.2;transform:scale(.8);}30%{opacity:.7;transform:scale(1.1);}}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0;}}
@keyframes logoReveal{from{opacity:0;transform:translateY(12px) scale(.96);}to{opacity:1;transform:translateY(0) scale(1);}}

.app{position:relative;z-index:10;display:flex;flex-direction:column;height:100vh;animation:fadeIn .4s ease both;}
.topbar{height:56px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;position:relative;}
.topbar-logo{font-family:var(--font-display);font-size:22px;font-weight:600;font-style:italic;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:.03em;}

.menu-btn{position:absolute;left:8px;width:40px;height:40px;display:flex;align-items:center;justify-content:center;}
.lns{display:flex;flex-direction:column;gap:5px;align-items:center;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);}
.ln{display:block;width:26px;height:5px;border-radius:100px;background:var(--grad);flex-shrink:0;transition:transform .52s cubic-bezier(.22,1.35,.5,1),opacity .38s ease;}
.menu-btn.open .ln:nth-child(1){transform:translateY(5px) rotate(45deg);}
.menu-btn.open .ln:nth-child(2){transform:translateY(-5px) rotate(-45deg);}

.messages{flex:1;overflow-y:auto;padding:32px 20px;}
.messages-inner{max-width:700px;margin:0 auto;}
.welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:14px;animation:fadeUp .5s ease;}
.welcome-logo{font-family:var(--font-display);font-size:56px;font-weight:600;font-style:italic;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:.03em;line-height:1;filter:drop-shadow(0 0 40px rgba(212,74,122,.15));animation:logoReveal .8s cubic-bezier(.16,1,.3,1) both;}
.welcome-sub{font-family:var(--font-serif);font-size:15px;font-weight:300;font-style:italic;color:var(--text-muted);animation:fadeUp .6s ease .2s both;}
.msg{display:flex;margin-bottom:10px;animation:fadeUp .22s ease;}
.msg.user{justify-content:flex-end;}
.msg-inner{display:flex;gap:10px;max-width:74%;align-items:flex-start;}
.msg.user .msg-inner{flex-direction:row-reverse;}
.msg-avatar{width:28px;height:28px;border-radius:50%;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;}
.msg.assistant .msg-avatar{background:var(--grad);}
.msg.user .msg-avatar{display:none;}
.msg-avatar span{font-family:var(--font-display);font-size:11px;color:#fff;font-weight:600;font-style:italic;}
.msg-body{display:flex;flex-direction:column;gap:4px;min-width:0;}
.msg-bubble{padding:10px 16px;font-family:var(--font-serif);font-size:14px;font-weight:300;line-height:1.5;word-break:break-word;color:var(--text);}
.msg.user .msg-bubble{background:var(--surface);border:1px solid var(--border);border-radius:20px 20px 6px 20px;}
.msg.assistant .msg-bubble{border:1px solid var(--border);border-radius:20px 20px 20px 6px;}
.msg-actions{display:flex;gap:3px;opacity:0;transition:opacity .15s;padding:0 4px;}
.msg:hover .msg-actions{opacity:1;}
.msg.user .msg-actions{justify-content:flex-end;}
.msg-act-btn{width:22px;height:22px;border-radius:7px;display:flex;align-items:center;justify-content:center;color:var(--text-dim);transition:background .1s,color .1s;}
.msg-act-btn:hover{background:var(--surface);color:var(--text-sub);}
.typing-dots{display:flex;gap:5px;align-items:center;padding:2px 0;}
.typing-dots span{width:4px;height:4px;border-radius:50%;background:var(--text-muted);}
.typing-dots span:nth-child(1){animation:bDot 1.4s ease-in-out 0s infinite;}
.typing-dots span:nth-child(2){animation:bDot 1.4s ease-in-out .16s infinite;}
.typing-dots span:nth-child(3){animation:bDot 1.4s ease-in-out .32s infinite;}
.cursor{display:inline-block;width:1.5px;height:13px;background:var(--orange);margin-left:2px;vertical-align:middle;animation:blink .7s step-end infinite;}

.offline-state{display:none;flex-direction:column;align-items:center;text-align:center;gap:16px;margin-bottom:32px;}
.offline-state.visible{display:flex;}
.offline-sweep{width:100%;height:1px;background:rgba(255,255,255,.06);overflow:hidden;position:relative;}
.offline-sweep-fill{position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(232,118,74,.5),transparent);animation:sweep 2.4s ease-in-out infinite;}
@keyframes sweep{0%{left:-100%;}100%{left:200%;}}
.offline-title{font-family:var(--font-display);font-size:22px;font-weight:500;font-style:italic;color:var(--text-sub);}
.offline-sub{font-family:var(--font-serif);font-size:14px;font-weight:300;color:var(--text-muted);line-height:1.65;}
.input-area{padding:12px 20px 24px;flex-shrink:0;}
.input-box{display:flex;align-items:flex-end;gap:10px;background:var(--input-bg);border:1px solid var(--input-border);border-radius:20px;padding:12px 14px;max-width:700px;margin:0 auto;transition:border-color .2s;}
.input-box:focus-within{border-color:var(--input-focus);}
.input-box textarea{flex:1;background:transparent;border:none;outline:none;color:var(--text);font-family:var(--font-serif);font-size:14px;font-weight:300;line-height:24px;resize:none;height:24px;max-height:140px;align-self:center;caret-color:transparent;}
.input-box textarea:focus{caret-color:var(--orange);}
.input-footer{text-align:center;font-size:11px;color:var(--text-dim);margin-top:10px;font-weight:300;letter-spacing:.02em;max-width:700px;margin:10px auto 0;opacity:.4;}
.send-btn{width:32px;height:32px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;}
.send-btn.active{background:var(--grad);box-shadow:0 2px 16px rgba(212,74,122,.2);}
.send-btn.inactive{background:var(--surface);opacity:.3;cursor:default;}
.stop-btn{width:32px;height:32px;border-radius:12px;border:1px solid rgba(255,255,255,.14);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.stop-sq{width:9px;height:9px;border-radius:3px;background:rgba(255,255,255,.4);}

/* ── Drawer ── */
.drawer{position:fixed;inset:0;z-index:40;pointer-events:none;}
.drawer-backdrop{position:absolute;inset:0;background:rgba(8,6,8,.82);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);opacity:0;transition:opacity .38s ease;}
.drawer-panel{position:absolute;top:0;left:0;bottom:0;width:280px;background:var(--sidebar);border-radius:0 28px 28px 0;transform:translateX(-100%);transition:transform .42s cubic-bezier(.16,1,.3,1);display:flex;flex-direction:column;overflow:hidden;border-right:1px solid rgba(255,255,255,.04);}
.drawer.open{pointer-events:all;}
.drawer.open .drawer-backdrop{opacity:1;}
.drawer.open .drawer-panel{transform:translateX(0);}
.drawer-top{padding:28px 20px 18px;flex-shrink:0;}
.drawer-logo{font-family:var(--font-display);font-size:30px;font-weight:600;font-style:italic;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.drawer-nav{flex:1;padding:0 10px;display:flex;flex-direction:column;gap:2px;overflow-y:auto;}
.nav-section-label{font-size:10px;letter-spacing:.09em;text-transform:uppercase;color:var(--text-dim);padding:4px 12px 6px;font-weight:500;}
.nav-item{display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:16px;transition:background .15s;width:100%;text-align:left;}
.nav-item:hover{background:rgba(255,255,255,.05);}
.nav-item.active{background:linear-gradient(135deg,rgba(232,118,74,.1),rgba(212,74,122,.08));}
.nav-icon{width:34px;height:34px;border-radius:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.nav-item:not(.active) .nav-icon{background:rgba(255,255,255,.04);}
.nav-item.active .nav-icon{background:linear-gradient(135deg,rgba(232,118,74,.18),rgba(212,74,122,.16));}
.nav-texts{flex:1;min-width:0;}
.nav-name{font-size:13px;font-weight:400;color:var(--text-sub);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.nav-item.active .nav-name{font-weight:500;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.nav-sub{font-size:11px;color:var(--text-dim);margin-top:2px;}
.soon-badge{font-size:9px;padding:2px 7px;border-radius:20px;background:rgba(255,255,255,.05);color:var(--text-dim);letter-spacing:.03em;margin-left:4px;vertical-align:middle;-webkit-text-fill-color:var(--text-dim);}
.drawer-divider{height:1px;background:rgba(255,255,255,.05);margin:8px 10px 10px;}
.drawer-footer{padding:10px 14px 22px;display:flex;align-items:center;gap:10px;flex-shrink:0;}
.footer-av{width:32px;height:32px;border-radius:50%;background:var(--grad);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.footer-av span{font-family:var(--font-display);font-size:13px;color:#fff;font-style:italic;font-weight:600;}
.footer-info{flex:1;min-width:0;}
.footer-name{font-size:13px;font-weight:400;color:var(--text-sub);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.footer-handle{font-size:11px;color:var(--text-dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.drawer-settings-btn{width:30px;height:30px;border-radius:10px;background:rgba(255,255,255,.04);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .18s;}
.drawer-settings-btn:hover{background:rgba(255,255,255,.08);}

/* ── Settings ── */
.settings-overlay{
  position:fixed;inset:0;z-index:50;display:flex;flex-direction:column;
  background:rgba(10,7,9,.96);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  opacity:0;pointer-events:none;
  transform:translateY(12px) scale(.99);
  transition:opacity .32s ease, transform .38s cubic-bezier(.16,1,.3,1), background .45s ease;
}
.settings-overlay.open{opacity:1;pointer-events:all;transform:translateY(0) scale(1);}
body.light .settings-overlay{background:rgba(228,214,199,.97);}
.settings-header{height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 28px;flex-shrink:0;border-bottom:1px solid var(--border);}
.settings-title{font-family:var(--font-display);font-size:22px;font-weight:600;font-style:italic;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.settings-close-btn{width:30px;height:30px;border-radius:10px;background:rgba(255,255,255,.06);display:flex;align-items:center;justify-content:center;transition:background .15s;}
.settings-close-btn:hover{background:rgba(255,255,255,.1);}

/* tabs — clean underline indicator */
.settings-tabs{display:flex;gap:0;padding:0 24px;flex-shrink:0;border-bottom:1px solid var(--border);overflow-x:auto;}
.settings-tabs::-webkit-scrollbar{display:none;}
.stab{
  flex:1;padding:14px 6px 13px;min-width:0;
  border-radius:0;font-size:11px;font-weight:400;
  color:var(--text-muted);
  transition:color .2s;
  white-space:nowrap;text-align:center;
  background:transparent;
  position:relative;
  border-bottom:2px solid transparent;
  margin-bottom:-1px;
}
.stab:hover{color:var(--text-sub);}
.stab.active{
  color:var(--orange);
  font-weight:500;
  border-bottom:2px solid var(--orange);
}

.settings-content{flex:1;overflow-y:auto;display:flex;justify-content:center;padding:28px 20px;}
.settings-body{width:100%;max-width:560px;}

.s-section{margin-bottom:24px;}
.s-section-title{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);margin-bottom:10px;font-weight:500;}
.s-row{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;background:rgba(255,255,255,.03);border-radius:14px;margin-bottom:5px;gap:16px;}
.s-row-left{display:flex;flex-direction:column;gap:3px;flex:1;min-width:0;}
.s-row-label{font-size:13.5px;color:var(--text-sub);font-weight:400;letter-spacing:.01em;}
.s-row-sub{font-size:11.5px;color:var(--text-dim);margin-top:2px;line-height:1.4;}
.s-row-val{font-size:13px;color:var(--text-muted);flex-shrink:0;}

/* Settings buttons — warm grey, fits the palette */
.s-btn{
  padding:7px 15px;border-radius:10px;font-size:12.5px;font-weight:400;
    color:var(--text-sub);
  background:rgba(255,255,255,.055);
  border:1px solid rgba(255,255,255,.07);
  transition:background .18s,color .18s,border-color .18s;
  white-space:nowrap;flex-shrink:0;
  letter-spacing:.01em;
}
.s-btn:hover{
  background:rgba(255,255,255,.09);
    color:var(--text);
  border-color:rgba(255,255,255,.11);
}
.s-btn.danger{
  color:rgba(220,90,90,.65);
  background:transparent;
  border-color:rgba(220,90,90,.15);
}
.s-btn.danger:hover{
  background:rgba(220,70,70,.07);
  color:rgba(220,90,90,.85);
  border-color:rgba(220,90,90,.25);
}

/* toggle:
   OFF = white knob, dim track
   ON  = knob matches track colour exactly (same grey as the box bg), gradient track */
.toggle{
  width:42px;height:23px;border-radius:12px;
  background:rgba(255,255,255,.1);
  position:relative;transition:background .28s;flex-shrink:0;
}
.toggle.on{background:var(--grad);}
/* off knob: white */
.toggle::after{
  content:'';position:absolute;
  width:17px;height:17px;border-radius:50%;
  background:#fff;
  top:3px;left:3px;
  transition:left .26s cubic-bezier(.34,1.4,.6,1),background .28s,box-shadow .28s;
  box-shadow:0 1px 4px rgba(0,0,0,.3);
}
/* on knob: matches s-row bg so it blends into the gradient track */
.toggle.on::after{
  left:22px;
  background:#1a161a;
  box-shadow:none;
}
body.light .toggle.on::after{
  left:22px;
  background:#ddc9b3;
  box-shadow:none;
}

/* Theme toggle — two-option selector */
.theme-toggle{display:flex;gap:3px;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:12px;overflow:hidden;padding:3px;transition:background .45s ease,border-color .45s ease;}
body.light .theme-toggle{background:rgba(80,40,20,.06);}
.theme-toggle{
  display:flex;position:relative;
  background:rgba(255,255,255,.05);border:1px solid var(--border);
  border-radius:12px;padding:3px;gap:0;
  transition:background .45s ease,border-color .45s ease;
}
body.light .theme-toggle{background:rgba(80,40,20,.06);border-color:rgba(80,40,20,.1);}
.theme-toggle-pill{
  position:absolute;top:3px;bottom:3px;
  width:calc(50% - 3px);
  background:var(--grad);
  border-radius:9px;
  transition:left .35s cubic-bezier(.34,1.2,.6,1);
  pointer-events:none;
}
body.light .theme-toggle-pill{left:3px;}
body:not(.light) .theme-toggle-pill{left:3px;}
.theme-toggle.pill-right .theme-toggle-pill{left:calc(50%);}
.theme-opt{
  flex:1;padding:8px 14px;border-radius:9px;font-size:12.5px;font-weight:400;
  color:var(--text-muted);background:transparent;
  transition:color .3s ease;
  display:flex;align-items:center;justify-content:center;gap:6px;
  position:relative;z-index:1;
}
.theme-opt.active{color:#fff;font-weight:500;}
body.light .theme-opt:not(.active){color:var(--text-sub);}

/* Smooth transition on all major elements for theme switch */
.topbar,.s-row,.s-btn,.toggle,.msg-bubble,.input-box,.nav-item,.drawer-backdrop{transition:background .45s ease,border-color .45s ease,color .35s ease;}
.drawer-panel{transition:transform .42s cubic-bezier(.16,1,.3,1),background .45s ease,border-color .45s ease;}
.drawer-panel{transition:transform .42s cubic-bezier(.16,1,.3,1),background .45s ease,border-color .45s ease;}

/* About */
.about-logo{font-family:var(--font-display);font-size:42px;font-weight:600;font-style:italic;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;display:block;}

/* Subscription cards */
.sub-intro{font-family:var(--font-serif);font-size:14px;font-weight:300;font-style:italic;line-height:1.65;color:var(--text-muted);margin-bottom:20px;}
.sub-cards{display:flex;flex-direction:column;gap:10px;}
.sub-card{border:1px solid var(--border);border-radius:18px;padding:18px 20px;background:rgba(255,255,255,.03);}
.sub-card-name{font-family:var(--font-display);font-size:17px;font-weight:600;font-style:italic;color:var(--text-sub);margin-bottom:4px;}
.sub-card-price{font-size:20px;font-weight:500;color:var(--text-sub);margin-bottom:8px;font-family:var(--font-display);font-style:italic;}
.sub-card-price span{font-size:12px;font-weight:300;color:var(--text-dim);font-family:var(--font);font-style:normal;}
.sub-card-perks{list-style:none;display:flex;flex-direction:column;gap:5px;margin-top:8px;padding-top:10px;border-top:1px solid var(--border);}
.sub-card-perks li{font-family:var(--font-serif);font-size:12.5px;font-weight:300;font-style:italic;color:var(--text-muted);line-height:1.45;padding-left:14px;position:relative;}
.sub-card-perks li::before{content:'–';position:absolute;left:0;color:var(--text-dim);}

/* Light mode — comprehensive overrides for all hardcoded dark colors */

body.light .drawer-panel{background:var(--sidebar);}
body.light ::-webkit-scrollbar-thumb{background:rgba(80,40,20,.14);}
body.light .msg.assistant .msg-bubble{border-color:rgba(80,40,20,.12);}
body.light .nav-item:hover{background:rgba(80,40,20,.06);}
body.light .nav-item.active{background:linear-gradient(135deg,rgba(232,118,74,.12),rgba(212,74,122,.09));}
body.light .nav-item:not(.active) .nav-icon{background:rgba(80,40,20,.06);}
/* drawer icons — override hardcoded white stroke */
body.light .nav-item:not(.active) .nav-icon svg{stroke:rgba(80,40,20,.4)!important;}
body.light .drawer-settings-btn svg{stroke:rgba(80,40,20,.45)!important;}
body.light .settings-close-btn svg{stroke:rgba(80,40,20,.5)!important;}
body.light .drawer-divider{background:rgba(80,40,20,.1);}
body.light .drawer-backdrop{background:rgba(30,12,0,.38);backdrop-filter:blur(10px);}
body.light .drawer-settings-btn{background:rgba(80,40,20,.07);}
body.light .drawer-settings-btn:hover{background:rgba(80,40,20,.12);}
body.light .soon-badge{background:rgba(80,40,20,.07);color:var(--text-dim);-webkit-text-fill-color:var(--text-dim);}
body.light .s-row{background:rgba(80,40,20,.05);}
body.light .s-btn{color:var(--text-sub);background:rgba(80,40,20,.07);border-color:rgba(80,40,20,.1);}
body.light .s-btn:hover{background:rgba(80,40,20,.13);color:var(--text);border-color:rgba(80,40,20,.16);}
body.light .s-btn.danger{color:rgba(160,40,40,.8);background:transparent;border-color:rgba(160,40,40,.18);}
body.light .s-btn.danger:hover{background:rgba(160,40,40,.07);}
body.light .toggle{background:rgba(80,40,20,.16);}
body.light .toggle.on{background:var(--grad);}
body.light .toggle::after{background:#fff;}
body.light .toggle.on::after{background:#ddc9b3;}
body.light .settings-close-btn{background:rgba(80,40,20,.07);}
body.light .settings-close-btn:hover{background:rgba(80,40,20,.13);}
body.light .send-btn.inactive{background:rgba(80,40,20,.08);}
body.light .stop-btn{border-color:rgba(80,40,20,.2);}
body.light .stop-sq{background:rgba(30,12,0,.4);}
body.light .sub-card{background:rgba(80,40,20,.05);border-color:rgba(80,40,20,.1);}
body.light .sub-card-perks{border-top-color:rgba(80,40,20,.1);}
body.light .theme-toggle{background:rgba(80,40,20,.06);border-color:rgba(80,40,20,.1);}
body.light .theme-opt:not(.active){color:var(--text-sub);}

/* ── Profile edit modal ── */
.pmodal{position:fixed;inset:0;z-index:60;display:flex;align-items:center;justify-content:center;padding:20px;background:rgba(8,5,7,.7);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);opacity:0;pointer-events:none;transition:opacity .25s ease;}
.pmodal.open{opacity:1;pointer-events:all;}
body.light .pmodal{background:rgba(228,214,199,.7);}
.pmodal-card{width:100%;max-width:380px;background:rgba(19,15,17,.96);border:1px solid var(--border);border-radius:20px;padding:24px;box-shadow:0 24px 80px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.04);transform:translateY(8px) scale(.98);transition:transform .3s cubic-bezier(.16,1,.3,1);}
body.light .pmodal-card{background:rgba(240,230,220,.98);}
.pmodal.open .pmodal-card{transform:translateY(0) scale(1);}
.pmodal-title{font-family:var(--font-display);font-size:22px;font-weight:500;font-style:italic;color:var(--text);margin-bottom:4px;}
.pmodal-sub{font-family:var(--font-serif);font-size:13px;font-weight:300;font-style:italic;color:var(--text-muted);margin-bottom:18px;line-height:1.5;}
.pmodal-input{width:100%;padding:13px 16px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:14px;color:var(--text);font-family:var(--font);font-size:14px;font-weight:300;outline:none;transition:border-color .25s,background .25s;}
.pmodal-input:focus{border-color:rgba(232,118,74,.55);background:rgba(232,118,74,.06);}
body.light .pmodal-input{background:rgba(80,40,20,.05);border-color:rgba(80,40,20,.1);}
body.light .pmodal-input:focus{border-color:rgba(232,118,74,.55);background:rgba(232,118,74,.07);}
.pmodal-err{font-size:13px;color:#e06060;margin-top:10px;display:none;}
.pmodal-err.visible{display:block;}
.pmodal-actions{display:flex;gap:10px;margin-top:20px;justify-content:flex-end;}
.pmodal-btn{padding:10px 18px;border-radius:11px;font-size:13px;font-weight:400;font-family:var(--font);cursor:pointer;transition:opacity .18s,transform .15s,background .18s;letter-spacing:.02em;}
.pmodal-cancel{color:var(--text-sub);background:transparent;border:1px solid rgba(255,255,255,.08);}
.pmodal-cancel:hover{background:rgba(255,255,255,.05);}
body.light .pmodal-cancel{border-color:rgba(80,40,20,.12);}
body.light .pmodal-cancel:hover{background:rgba(80,40,20,.06);}
.pmodal-save{color:#fff;background:var(--grad);border:none;box-shadow:0 4px 20px rgba(212,74,122,.18);}
.pmodal-save:hover{opacity:.92;transform:translateY(-1px);}
.pmodal-save:disabled{opacity:.5;cursor:default;transform:none;}

/* Mobile — full width, no wasted space */
@media (max-width:600px){
  .settings-tabs{padding:0;overflow-x:auto;}
  .settings-tabs::-webkit-scrollbar{display:none;}
  .stab{flex:1;padding:12px 8px 11px;font-size:10.5px;}
  .settings-content{padding:14px 0;}
  .settings-body{max-width:100%;padding:0 14px;}
  .s-row{padding:11px 12px;gap:10px;border-radius:12px;}
  .s-row-label{font-size:13px;}
  .s-row-sub{font-size:11px;}
  .s-btn{padding:6px 11px;font-size:11.5px;}
  .sub-card{padding:14px 15px;border-radius:14px;}
  .messages{padding:16px 14px;}
  .messages-inner{max-width:100%;}
  .msg-inner{max-width:88%;}
  .input-area{padding:8px 14px 20px;}
}

/* ── Desktop (≥768px): focused chat layout, no persistent sidebar ── */
@media (min-width: 768px) {

  /* lift text readability across the board */
  :root {
    --text-sub:   rgba(228,224,227,.62);
    --text-muted: rgba(228,224,227,.40);
    --text-dim:   rgba(228,224,227,.26);
  }

  /* wider, centered content column */
  .messages { padding: 48px 40px; }
  .messages-inner { max-width: 680px; }
  .input-area { padding: 16px 40px 32px; }
  .input-box { max-width: 680px; }
  .input-footer { max-width: 680px; }

  /* topbar — give menu btn more breathing room */
  .topbar { height: 60px; }
  .topbar-logo { font-size: 24px; }
  .menu-btn { left: 10px; }

  /* welcome screen */
  .welcome-logo { font-size: 76px; }
  .welcome-sub { font-size: 16px; letter-spacing: .02em; }

  /* chat messages */
  .msg-bubble { font-size: 15px; line-height: 1.78; }
  .msg { margin-bottom: 14px; }

  /* input */
  .input-box textarea { font-size: 15px; line-height: 26px; }

  /* settings overlay — centered, narrower, more refined */
  .settings-header { padding: 0 36px; height: 60px; }
  .settings-title  { font-size: 24px; }
  .settings-tabs   { padding: 0 32px; gap: 0; }
  .stab { font-size: 12.5px; padding: 16px 8px 14px; letter-spacing: .01em; }
  .settings-content { padding: 36px 32px; }
  .settings-body { max-width: 600px; }
  .s-section-title { font-size: 10.5px; letter-spacing: .11em; }
  .s-row { padding: 15px 18px; border-radius: 16px; }
  .s-row-label { font-size: 14px; }
  .s-row-sub { font-size: 12px; }

  /* nav labels in drawer (still used as overlay on desktop) */
  .nav-name { font-size: 13.5px; }
  .nav-sub  { font-size: 11.5px; }
}
</style>
</head>
<body>
<div class="noise"></div>
<div class="app">
  <div class="topbar">
    <button class="menu-btn" id="menuBtn" onclick="toggleDrawer()">
      <div class="lns"><span class="ln"></span><span class="ln"></span></div>

    <div class="topbar-logo">BRIAS</div>

<!-- Drawer -->

<script>
const API = 'https://api.brias.eu';
let token = localStorage.getItem('brias_token');
let username = localStorage.getItem('brias_username');
let activeChatId = null, isStreaming = false, meData = null;
// Apply saved theme immediately
if (localStorage.getItem('brias_theme')==='light') document.body.classList.add('light');

function api(path, opts={}) {
  return fetch(API+path, {...opts, headers:{'Content-Type':'application/json',...(token?{'Authorization':'Bearer '+token}:{}),...(opts.headers||{})}});
}

async function init() {
  // Immediately render whatever we have cached so the drawer never looks empty.
  applyMeToDrawer();
  try {
    const r = await fetch(API+'/api/me', {headers:token?{'Authorization':'Bearer '+token}:{}});
    if (!r.ok && r.status !== 401) return; // server error, stay offline

    if (!token || r.status === 401) { window.location.href='auth.html'; return; }
    meData = await r.json();
    if (!meData.logged_in) { doLogout(); return; }
    if (meData.email) localStorage.setItem('brias_email', meData.email);
    if (meData.display_name) localStorage.setItem('brias_display_name', meData.display_name);
    if (meData.age!=null) localStorage.setItem('brias_age', String(meData.age));
    if (meData.username) localStorage.setItem('brias_username', meData.username);
  } catch(e) { return; } // server unreachable, stay offline
  applyMeToDrawer();
  try {
    const chats = await api('/api/chats').then(r=>r.json());
    if (chats.length > 0) {
      activeChatId = chats[0].id;
      const msgs = await api('/api/chats/'+activeChatId+'/messages').then(r=>r.json());
      if (msgs.length > 0) renderMessages(msgs);
    } else {
      const c = await api('/api/chats',{method:'POST',body:JSON.stringify({title:'Chat'})}).then(r=>r.json());
      activeChatId = c.id;
    }
  } catch(e) {}
}

function doLogout() {
  localStorage.removeItem('brias_token'); localStorage.removeItem('brias_username');
  window.location.href='auth.html';
}

function profileName(){ return meData?.display_name || localStorage.getItem('brias_display_name') || ''; }
function profileEmail(){ return meData?.email || localStorage.getItem('brias_email') || ''; }
function profileAge(){
  if(meData && meData.age!=null) return meData.age;
  const a = localStorage.getItem('brias_age');
  return a ? parseInt(a) : null;
}
function applyMeToDrawer(){
  const name = profileName() || localStorage.getItem('brias_username') || '—';
  const dn = document.getElementById('drawerName');
  const dh = document.getElementById('drawerHandle');
  const di = document.getElementById('drawerInitial');
  if(dn) dn.textContent = name;
  if(dh) dh.textContent = profileEmail() || '—';
  if(di) di.textContent = (name.charAt(0)||'?').toUpperCase();
}

async function refreshMe() {
  try {
    const r = await api('/api/me');
    if (!r.ok) return;
    const d = await r.json();
    if (!d.logged_in) return;
    meData = d;
    if(d.email) localStorage.setItem('brias_email', d.email);
    if(d.display_name) localStorage.setItem('brias_display_name', d.display_name);
    if(d.age!=null) localStorage.setItem('brias_age', String(d.age));
    if(d.username) localStorage.setItem('brias_username', d.username);
    applyMeToDrawer();
    if (document.getElementById('settingsOverlay').classList.contains('open')) {
      const active = document.querySelector('.stab.active');
      if (active) {
        const i = Array.from(document.querySelectorAll('.stab')).indexOf(active);
        if (i >= 0) switchTab(i);
      }
    }
  } catch(e) {}
}

async function saveProfile(display_name, age) {
  const ageVal = age===''||age==null?null:parseInt(age);
  try {
    const r = await api('/api/profile', { method:'POST', body:JSON.stringify({display_name, age: ageVal}) });
    if (!r.ok) {
      let detail='';
      try { const d=await r.json(); detail=d.detail||''; } catch{}
      console.error('saveProfile failed', r.status, detail);
      return {ok:false, error: detail || `Could not save (HTTP ${r.status}).`};
    }
    localStorage.setItem('brias_display_name', display_name);
    localStorage.setItem('brias_username', display_name);
    if(ageVal==null) localStorage.removeItem('brias_age'); else localStorage.setItem('brias_age', String(ageVal));
    if(meData){ meData.display_name = display_name; meData.username = display_name; meData.age = ageVal; meData.profile_done = true; }
    applyMeToDrawer();
    await refreshMe();
    if (document.getElementById('settingsOverlay').classList.contains('open')) {
      const active = document.querySelector('.stab.active');
      if (active) {
        const i = Array.from(document.querySelectorAll('.stab')).indexOf(active);
        if (i >= 0) switchTab(i);
      }
    }
    return {ok:true};
  } catch(e) {
    console.error('saveProfile error', e);
    return {ok:false, error:'Network error — could not reach BRIAS.'};
  }
}

let pmField = null;
function openProfileModal(field){
  pmField = field;
  const m = document.getElementById('profileModal');
  const title = document.getElementById('pmTitle');
  const sub = document.getElementById('pmSub');
  const input = document.getElementById('pmInput');
  const err = document.getElementById('pmErr');
  err.textContent=''; err.classList.remove('visible');
  if(field==='name'){
    title.textContent='Your name';
    sub.textContent='What should BRIAS call you?';
    input.type='text'; input.placeholder='Name';
    input.value = profileName();
    input.removeAttribute('min'); input.removeAttribute('max');
  } else {
    title.textContent='Your age';
    sub.textContent='Optional. Helps BRIAS understand context.';
    input.type='number'; input.min='10'; input.max='120'; input.placeholder='Age';
    const a = profileAge(); input.value = a==null?'':String(a);
  }
  m.classList.add('open');
  setTimeout(()=>{ input.focus(); input.select?.(); }, 80);
}
function closeProfileModal(){
  document.getElementById('profileModal').classList.remove('open');
  pmField = null;
}
async function submitProfileModal(){
  const input = document.getElementById('pmInput');
  const err = document.getElementById('pmErr');
  const btn = document.getElementById('pmSaveBtn');
  const v = input.value.trim();
  err.textContent=''; err.classList.remove('visible');
  if(pmField==='name'){
    if(!v){ err.textContent='Please enter a name.'; err.classList.add('visible'); return; }
  } else {
    if(!profileName()){ err.textContent='Please set your name first.'; err.classList.add('visible'); return; }
    if(v && (!/^\d+$/.test(v) || parseInt(v)<10 || parseInt(v)>120)){
      err.textContent='Please enter a number between 10 and 120.'; err.classList.add('visible'); return;
    }
  }
  btn.disabled=true; btn.textContent='Saving…';
  const res = pmField==='name'
    ? await saveProfile(v, profileAge())
    : await saveProfile(profileName(), v===''?null:v);
  btn.disabled=false; btn.textContent='Save';
  if(res.ok){ closeProfileModal(); }
  else { err.textContent = res.error || 'Could not save. Try again.'; err.classList.add('visible'); }
}
function editName(){ openProfileModal('name'); }
function editAge(){ openProfileModal('age'); }
document.addEventListener('keydown', e => {
  const open = document.getElementById('profileModal')?.classList.contains('open');
  if(!open) return;
  if(e.key==='Enter'){ e.preventDefault(); submitProfileModal(); }
  else if(e.key==='Escape'){ closeProfileModal(); }
});

function toggleDrawer() { document.getElementById('drawer').classList.contains('open')?closeDrawer():openDrawer(); }
function openDrawer() { document.getElementById('drawer').classList.add('open'); document.getElementById('menuBtn').classList.add('open'); }
function closeDrawer() { document.getElementById('drawer').classList.remove('open'); document.getElementById('menuBtn').classList.remove('open'); }

const tabs = [
  ()=>`
    <div class="s-section">
      <div class="s-section-title">Profile</div>
      <div class="s-row"><div class="s-row-left"><div class="s-row-label">Name</div></div><button class="s-btn" onclick="editName()">${esc(profileName()||'Set name')}</button></div>
      <div class="s-row"><div class="s-row-left"><div class="s-row-label">Age</div></div><button class="s-btn" onclick="editAge()">${esc(profileAge()==null?'Set age':String(profileAge()))}</button></div>
      <div class="s-row"><div class="s-row-left"><div class="s-row-label">Email</div></div><div class="s-row-val">${esc(profileEmail()||'—')}</div></div>
    </div>

function openSettings() { document.getElementById('settingsOverlay').classList.add('open'); switchTab(0); refreshMe(); }
function closeSettings() { document.getElementById('settingsOverlay').classList.remove('open'); }
function switchTab(i) {
  document.querySelectorAll('.stab').forEach((t,j)=>t.classList.toggle('active',j===i));
  document.getElementById('settingsBody').innerHTML = tabs[i]();
  // init pill position after rendering
  const toggle = document.getElementById('themeToggle');
  if (toggle) toggle.classList.toggle('pill-right', document.body.classList.contains('light'));
}
function setTheme(mode) {
  if (mode==='light') document.body.classList.add('light');
  else document.body.classList.remove('light');
  localStorage.setItem('brias_theme', mode);
  // slide pill
  const toggle = document.getElementById('themeToggle');
  if (toggle) toggle.classList.toggle('pill-right', mode==='light');
  // update active class on buttons
  document.querySelectorAll('.theme-opt').forEach(btn => {
    const isDark = btn.getAttribute('onclick').includes('dark');
    btn.classList.toggle('active', mode==='dark' ? isDark : !isDark);
  });
}

function renderMessages(msgs) {
  const inner = document.getElementById('msgInner');
  if (!msgs.length) { inner.innerHTML=`<div class="welcome" id="welcomeScreen"><div class="welcome-logo">BRIAS</div><div class="welcome-sub">What's on your mind?</div></div>`; return; }
  inner.innerHTML = msgs.map(m=>msgHtml(m.id,m.role,m.content)).join('');
  scrollBottom();
}

function msgHtml(id, role, content) {
  const isUser = role==='user';
  const av = isUser ? '' : `<div class="msg-avatar"><span>B</span></div>`;
  const cp = `<button class="msg-act-btn" onclick="copyMsg(this,'${id}')" title="Copy"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></button>`;
  return `<div class="msg ${isUser?'user':'assistant'}" id="msg-${id}"><div class="msg-inner">${av}<div class="msg-body"><div class="msg-bubble" id="bubble-${id}">${esc(content)}</div><div class="msg-actions">${cp}</div></div></div></div>`;
}

async function copyMsg(btn, id) {
  const b = document.getElementById('bubble-'+id); if (!b) return;
  await navigator.clipboard.writeText(b.textContent);
  btn.style.color='var(--orange)'; setTimeout(()=>btn.style.color='',1500);
}

function updateBtn() {
  if (isStreaming) return;
  const has = document.getElementById('msgInput').value.trim().length>0;
  document.getElementById('actionBtn').className='send-btn '+(has?'active':'inactive');
}
function setStopMode(on) {
  const b = document.getElementById('actionBtn');
  if (on) { b.className='stop-btn'; b.innerHTML='<div class="stop-sq"></div>'; }
  else { b.className='send-btn inactive'; b.innerHTML=`<svg id="iconSend" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>`; }
}
function handleActionBtn() { if (isStreaming) stopGen(); else sendMessage(); }
async function stopGen() { if (activeChatId) await api('/api/chats/'+activeChatId+'/abort',{method:'POST'}); }
async function sendMessage() {
  const i=document.getElementById('msgInput'), c=i.value.trim();
  if (!c||isStreaming||!activeChatId) return;
  i.value=''; autoResize(i); updateBtn();
  await sendAsStream(c, activeChatId);
}

async function sendAsStream(content, chatId) {
  isStreaming=true; setStopMode(true);
  document.getElementById('welcomeScreen')?.remove();
  const inner = document.getElementById('msgInner');
  inner.insertAdjacentHTML('beforeend',`<div class="msg user" id="msg-pending"><div class="msg-inner"><div class="msg-body"><div class="msg-bubble">${esc(content)}</div></div></div></div>`);
  scrollBottom();
  inner.insertAdjacentHTML('beforeend',`<div class="msg assistant" id="typingMsg"><div class="msg-inner"><div class="msg-avatar"><span>B</span></div><div class="msg-body"><div class="msg-bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div></div></div></div>`);
  scrollBottom();
  try {
    const resp = await api('/api/chats/'+chatId+'/messages/stream',{method:'POST',body:JSON.stringify({content})});
    if (!resp.ok) throw new Error();
    const reader=resp.body.getReader(), dec=new TextDecoder();
    let buf='',sb=null,st='',gm=false;
    while(true) {
      const {value,done}=await reader.read(); if (done) break;
      buf+=dec.decode(value,{stream:true}); const lines=buf.split('\n'); buf=lines.pop();
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        let msg; try{msg=JSON.parse(line.slice(6));}catch{continue;}
        if (msg.type==='meta') {
          gm=true; document.getElementById('msg-pending')?.remove(); document.getElementById('typingMsg')?.remove();
          inner.insertAdjacentHTML('beforeend',`<div class="msg assistant" id="streamMsg"><div class="msg-inner"><div class="msg-avatar"><span>B</span></div><div class="msg-body"><div class="msg-bubble" id="streamBubble"><span class="cursor"></span></div></div></div></div>`);
          sb=document.getElementById('streamBubble'); scrollBottom();
        } else if (msg.type==='token') {
          if (!gm){gm=true;document.getElementById('typingMsg')?.remove();inner.insertAdjacentHTML('beforeend',`<div class="msg assistant" id="streamMsg"><div class="msg-inner"><div class="msg-avatar"><span>B</span></div><div class="msg-body"><div class="msg-bubble" id="streamBubble"><span class="cursor"></span></div></div></div></div>`);sb=document.getElementById('streamBubble');}
          st+=msg.text; sb.innerHTML=esc(st)+'<span class="cursor"></span>'; scrollBottom();
        } else if (msg.type==='done') {
      
          const se=document.getElementById('streamMsg'); if(se) se.outerHTML=msgHtml('ai-'+Date.now(),'assistant',msg.full_text||st);
        } else if (msg.type==='error') {
          document.getElementById('typingMsg')?.remove(); inner.insertAdjacentHTML('beforeend',msgHtml('err-'+Date.now(),'assistant',msg.text)); scrollBottom();
        }
      }
    }
  } catch {
    document.getElementById('typingMsg')?.remove();
    setOffline(true);
  } finally { isStreaming=false; setStopMode(false); scrollBottom(); }
}

function setOffline(off) {
  const os = document.getElementById('offlineState');
  const inp = document.getElementById('msgInput');
  const btn = document.getElementById('actionBtn');
  if (off) {
    os.classList.add('visible');
    inp.disabled = true; inp.placeholder = '';
  } else {
    os.classList.remove('visible');
    inp.disabled = false; inp.placeholder = "I'm here.";
    btn.disabled = false;
  }
}
function scrollBottom(){const c=document.getElementById('msgContainer');setTimeout(()=>c.scrollTop=c.scrollHeight,30);}
function autoResize(el){el.style.height='24px';el.style.height=Math.min(el.scrollHeight,140)+'px';}
function handleKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();handleActionBtn();}}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}

init();
</script>
